function renderOperationsMonthly(){
  // Joriy oy boshidan oxirigacha
  const now=new Date();
  const from=new Date(now.getFullYear(),now.getMonth(),1).toISOString().slice(0,10);
  const to=new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().slice(0,10);
  renderOperations(from,to);
}

function renderOperations(fromDate='',toDate='',showAllFlag=''){
  const showAll=showAllFlag==='all';
  const today=new Date().toDateString();
  // Sana filtri yo'q bo'lsa — joriy smena bo'yicha filtrlash; showAll=butun davr
  const useSmena=!fromDate&&!toDate&&!showAll;
  let filtOrders, filtExp, label;
  if(showAll){
    filtOrders=currentBranchId?[...orders].filter(o=>o.branchId===currentBranchId):[...orders];
    filtExp=currentBranchId?[...expenses].filter(e=>e.branchId===currentBranchId):[...expenses];
    label='Butun davr';
  } else if(useSmena){
    filtOrders=orders.filter(o=>o.smenaId===currentSmenaId);
    filtExp=expenses.filter(e=>e.smenaId===currentSmenaId||(!e.smenaId&&new Date(e.date).toDateString()===today));
    label='Joriy smena';
  } else {
    filtOrders=currentBranchId?[...orders].filter(o=>o.branchId===currentBranchId):[...orders];
    filtExp=currentBranchId?[...expenses].filter(e=>e.branchId===currentBranchId):[...expenses];
    if(fromDate){const fd=new Date(fromDate);filtOrders=filtOrders.filter(o=>new Date(o.date)>=fd);filtExp=filtExp.filter(e=>new Date(e.date)>=fd);}
    if(toDate){const td=new Date(toDate);td.setHours(23,59,59);filtOrders=filtOrders.filter(o=>new Date(o.date)<=td);filtExp=filtExp.filter(e=>new Date(e.date)<=td);}
    label='Tanlangan davr';
  }
  const toRev=calcRealRevenue(filtOrders);
  const toSaleSum=filtOrders.reduce((s,o)=>s+o.total,0);
  // Faqat haqiqiy harajatlar (smena_profit, damage, partner_income hisoblanmaydi)
  const toExp=filtExp.filter(e=>e.type!=='smena_profit'&&e.type!=='damage'&&e.type!=='partner_income').reduce((s,e)=>s+e.amount,0);
  // Hamkor to'lovlari — kirim sifatida
  const partnerIncome=filtExp.filter(e=>e.type==='partner_income').reduce((s,e)=>s+Math.abs(e.amount),0);

  // ===== SOF FOYDA: Smena tarixidagi faktual diff yig'indisi =====
  // Yopilgan smenalar uchun: smena.diff (faktual - smena_rev) ni ishlatamiz
  // Bu smena yopilganda kassirning haqiqiy hisoblagan summasi bilan farqni beradi
  const closedSmenaIds=new Set(smenas.filter(s=>s.closed).map(s=>s.id));
  // Filtrlangan smenalar — davr filtriga mos keluvchilar
  let filtSmenas=smenas.filter(s=>s.closed);
  if(fromDate){const fd=new Date(fromDate);filtSmenas=filtSmenas.filter(s=>new Date(s.closeTime||s.openTime)>=fd);}
  if(toDate){const td=new Date(toDate);td.setHours(23,59,59);filtSmenas=filtSmenas.filter(s=>new Date(s.closeTime||s.openTime)<=td);}
  if(useSmena) filtSmenas=[]; // Joriy smena hali yopilmagan

  // Yopilgan smenalar uchun: faktual(kirim) - harajat = haqiqiy foyda
  const closedSmenaProfit=filtSmenas.reduce((sum,s)=>{
    const sOrders=orders.filter(o=>o.smenaId===s.id);
    const sRev=s.faktual!=null?s.faktual:sOrders.reduce((x,o)=>x+o.total,0);
    const sExp=expenses.filter(e=>e.smenaId===s.id&&e.type!=='smena_profit'&&e.type!=='damage'&&e.type!=='partner_income').reduce((x,e)=>x+e.amount,0);
    const sPartnerIncome=expenses.filter(e=>e.smenaId===s.id&&e.type==='partner_income').reduce((x,e)=>x+Math.abs(e.amount),0);
    return sum+(sRev+sPartnerIncome-sExp);
  },0);

  // Joriy (ochiq) smena uchun — hozirgi savdolar asosida
  let currentSmenaProfit=0;
  if(useSmena||showAll){
    const curOrds=useSmena?filtOrders:orders.filter(o=>!closedSmenaIds.has(o.smenaId));
    const curRev=curOrds.reduce((x,o)=>x+o.total,0);
    const curExp=expenses.filter(e=>
      (!closedSmenaIds.has(e.smenaId))&&
      e.type!=='smena_profit'&&e.type!=='damage'&&e.type!=='partner_income'
    ).reduce((x,e)=>x+e.amount,0);
    const curPartner=expenses.filter(e=>(!closedSmenaIds.has(e.smenaId))&&e.type==='partner_income').reduce((x,e)=>x+Math.abs(e.amount),0);
    currentSmenaProfit=curRev+curPartner-curExp;
  } else {
    // Sana filtri bilan — joriy smena qismini ham qo'shamiz
    const curOrds=filtOrders.filter(o=>!closedSmenaIds.has(o.smenaId));
    const curRev=curOrds.reduce((x,o)=>x+o.total,0);
    const curExp=filtExp.filter(e=>!closedSmenaIds.has(e.smenaId)&&e.type!=='smena_profit'&&e.type!=='damage'&&e.type!=='partner_income').reduce((x,e)=>x+e.amount,0);
    const curPartner=filtExp.filter(e=>!closedSmenaIds.has(e.smenaId)&&e.type==='partner_income').reduce((x,e)=>x+Math.abs(e.amount),0);
    currentSmenaProfit=curRev+curPartner-curExp;
  }

  // Jami sof foyda = yopilgan smenalar + joriy smena
  const toProfit=closedSmenaProfit+currentSmenaProfit;
  const bal=toProfit;
  // Ziyon (ubitka) — yaroqsiz mahsulotlar
  const toDamage=filtExp.filter(e=>e.type==='damage').reduce((s,e)=>s+e.amount,0);

  // Daily profit last 7 days
  const last7profit=[...Array(7)].map((_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(6-i));
    const ds=d.toDateString();
    const dayOrds=orders.filter(o=>new Date(o.date).toDateString()===ds);
    const rev=calcRealRevenue(dayOrds);
    const exp=expenses.filter(e=>new Date(e.date).toDateString()===ds&&e.type!=='smena_profit'&&e.type!=='damage'&&e.type!=='partner_income').reduce((s,e)=>s+e.amount,0);
    const profit=rev-exp;
    return{label:d.toLocaleDateString("uz-UZ",{weekday:"short",day:"2-digit"}),profit,rev,exp};
  });
  const maxP=Math.max(...last7profit.map(d=>Math.abs(d.profit)),1);

  // Smena tarixi — yopilgan smenalar
  const closedSmenas=[...smenas].filter(s=>s.closed).reverse().slice(0,15);
  const smenaRows=closedSmenas.map(s=>`
    <tr>
      <td style="color:#6366f1;font-weight:700;font-size:12px">${s.id}</td>
      <td style="color:#64748b;font-size:12px">${fmtDate(s.openTime)}</td>
      <td style="color:#64748b;font-size:12px">${s.closeTime?fmtDate(s.closeTime):'—'}</td>
      <td>${s.closeBy||'—'}</td>
      <td style="font-weight:700;color:${(s.diff||0)>=0?'#16a34a':'#ef4444'}">${(s.diff||0)>=0?'+':''}${fmt(s.diff||0)}</td>
      <td style="color:#94a3b8;font-size:12px;max-width:180px">${s.note||'—'}</td>
      ${currentUser.role==='admin'?`<td><div class="flex gap-4">
        <button class="btn btn-outline btn-sm" onclick="openEditSmenaModal('${s.id}')" title="Tahrirlash">${svgIcon('edit',13)}</button>
        <button class="btn btn-danger btn-sm" onclick="deleteSmenaHistory('${s.id}')" title="O'chirish">${svgIcon('trash',13)}</button>
      </div></td>`:'<td></td>'}
    </tr>`).join('');

  const expRows=[...filtExp].filter(e=>e.type!=='smena_profit'&&e.type!=='damage'&&e.type!=='partner_income').reverse().map(e=>`<tr>
    <td>${badge(e.category||'Boshqa','blue')}</td>
    <td style="color:#64748b">${e.desc||'—'}</td>
    <td style="font-weight:700;color:#ef4444">${fmt(e.amount)}</td>
    <td style="color:#64748b">${fmtDate(e.date)}</td>
    <td>${e.by}</td>
    ${hasPerm('expenses_delete')?`<td><button class="btn btn-danger btn-sm" onclick="deleteExpense(${e.id})">${svgIcon('trash',13)}</button></td>`:'<td></td>'}
  </tr>`).join('');

  const orderRows=filtOrders.map(o=>`<tr><td style="color:#6366f1;font-weight:700">${o.id}</td><td style="color:#64748b">${fmtDate(o.date)}</td><td>${o.cashier}</td><td>${badge(getPayTypeName(o.payType),o.payType==='naqd'?'green':o.payType==='karta'?'blue':'yellow')}</td><td style="font-weight:700">${fmt(o.total)}</td></tr>`).join('');

  const profitBars=last7profit.map(d=>{
    const h=Math.max((Math.abs(d.profit)/maxP)*80,d.profit!==0?4:2);
    const color=d.profit>=0?'#22c55e':'#ef4444';
    return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
      <div style="font-size:9px;color:#94a3b8">${d.profit!==0?(d.profit/1000).toFixed(0)+'K':''}</div>
      <div style="height:${h}px;width:100%;border-radius:4px 4px 0 0;background:${color}"></div>
      <div style="font-size:10px;color:#64748b;text-align:center">${d.label}</div>
    </div>`;
  }).join('');

  document.getElementById('page-content').innerHTML=`
    ${useSmena?`<div style="background:rgba(99,102,241,.06);border:1px solid #c7d2fe;border-radius:12px;padding:10px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <span style="font-size:13px;color:#4338ca;font-weight:600"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:-2px"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg> Joriy smena: <b>${currentSmenaId}</b> &nbsp;|&nbsp; Ochilgan: ${getCurrentSmena()?fmtDate(getCurrentSmena().openTime):'—'}</span>
      <span class="badge badge-green">Faol smena</span>
    </div>`:''}
    <div class="card" style="margin-bottom:16px;padding:14px">
      <div class="flex gap-10 items-center wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:#6366f1"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span style="font-size:13px;font-weight:600;color:#475569">Sana filtr:</span>

function buildReturnableOrderOptions(){
  // Faqat harajat qilinmagan qaytarish elementlari bo'lgan buyurtmalar ko'rsatiladi
  const retOrders=orders.filter(o=>(o.returnedItems||[]).some(r=>!r.expensed));
  if(retOrders.length===0) return '<option value="" disabled>Harajat qilinmagan qaytarishlar yo\'q</option>';
  return retOrders.map(o=>{
    // Faqat hali harajat qilinmagan qaytarish elementlari summasi
    const unexpensedItems=(o.returnedItems||[]).filter(r=>!r.expensed);
    const retAmt=unexpensedItems.reduce((s,r)=>s+r.price*r.qty,0);
    return`<option value="${o.id}" data-amt="${retAmt}">${o.id} — ${fmt(retAmt)}</option>`;
  }).join('');
}

function onExpCatChange(cat){
  const sec=document.getElementById('exp-return-section');
  if(sec) sec.style.display=(cat==='Qaytarish')?'block':'none';
  if(cat!=='Qaytarish'){
    const rItems=document.getElementById('exp-return-items');
    if(rItems) rItems.style.display='none';
    const amtInp=document.getElementById('exp-amount');
    if(amtInp) amtInp.value='';
    const retSel=document.getElementById('exp-return-order');
    if(retSel) retSel.value='';
  }
}

function onReturnOrderSelect(oid){
  const itemsDiv=document.getElementById('exp-return-items');
  const amountInp=document.getElementById('exp-amount');
  if(!oid){if(itemsDiv)itemsDiv.style.display='none';if(amountInp)amountInp.value='';return;}
  const order=orders.find(o=>o.id===oid);
  if(!order||!itemsDiv)return;
  // Faqat hali harajat qilinmagan qaytarish elementlari
  const unexpensedItems=(order.returnedItems||[]).filter(r=>!r.expensed);
  const expensedItems=(order.returnedItems||[]).filter(r=>r.expensed);
  const retAmt=unexpensedItems.reduce((s,r)=>s+r.price*r.qty,0);
  if(amountInp) amountInp.value=retAmt;
  const itemRows=unexpensedItems.map(r=>`
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #fca5a5;font-size:13px">
      <span>${r.name} <span style="color:var(--text2)">x${r.qty}</span></span>
      <span style="font-weight:600;color:#ef4444">-${fmt(r.price*r.qty)}</span>
    </div>`).join('');
  const expensedRows=expensedItems.length>0?`<div style="margin-top:8px;padding-top:8px;border-top:1px dashed #fca5a5">
    <div style="font-size:11px;color:#94a3b8;margin-bottom:4px">Allaqachon harajat qilingan:</div>
    ${expensedItems.map(r=>`<div style="display:flex;justify-content:space-between;font-size:12px;color:#94a3b8"><span>${r.name} x${r.qty}</span><span>${fmt(r.price*r.qty)}</span></div>`).join('')}
  </div>`:'';
  itemsDiv.innerHTML=`<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;padding:12px;margin-bottom:4px">
    <div style="font-size:12px;font-weight:700;color:#ef4444;margin-bottom:8px">Qaytarilgan mahsulotlar (harajat qilinmagan):</div>
    ${itemRows||'<div style="font-size:13px;color:#94a3b8">Yo\'q</div>'}
    <div style="display:flex;justify-content:space-between;padding-top:8px;font-weight:700;font-size:14px;border-top:1px solid #fca5a5;margin-top:4px">
      <span>Jami qaytarish summasi:</span><span style="color:#ef4444">${fmt(retAmt)}</span>
    </div>
    ${expensedRows}
  </div>`;
  itemsDiv.style.display='block';
}

function openExpCatModal(){
  const catList=expCats.map(c=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
    <span style="flex:1;padding:6px 10px;background:rgba(255,255,255,.03);border-radius:8px;font-size:13px">${c}</span>
    <button onclick="deleteExpCat('${c}')" style="background:none;border:none;cursor:pointer;color:#ef4444;display:flex;padding:4px" title="O'chirish">${svgIcon('trash',14)}</button>
  </div>`).join('');
  openModal('Harajat kategoriyalari',`

      <label class="form-label">Yangi kategoriya</label>
      <div class="flex gap-8">
        <input id="new-exp-cat" class="form-input" placeholder="Kategoriya nomi" style="flex:1" />
        <button class="btn btn-primary btn-sm" onclick="addExpCat()">Qo'shish</button>
      </div>

function addExpCat(){
  const v=((document.getElementById('new-exp-cat')||{}).value||'').trim();
  if(!v)return;
  if(expCats.includes(v)){toast('Bu kategoriya allaqachon mavjud!','error');return;}
  expCats.push(v);save();toast('Kategoriya qo\'shildi!');
  openExpCatModal();
}

function deleteExpCat(cat){
  const inUse=expenses.some(e=>e.category===cat);
  if(inUse){toast(`"${cat}" ishlatilmoqda, o'chirib bo'lmaydi!`,'error');return;}
  confirmDialog(`"${cat}" kategoriyasini o'chirishni tasdiqlaysizmi?`,()=>{
    expCats=expCats.filter(c=>c!==cat);save();
    toast('Kategoriya o\'chirildi!','error');
    openExpCatModal();
  });
}

function saveExpense(){
  const cat=((document.getElementById('exp-cat')||{}).value||'').trim();
  const desc=((document.getElementById('exp-desc')||{}).value||'').trim();
  const amount=parseFloat((document.getElementById('exp-amount')||{}).value||0);
  if(!cat||!amount){toast('Kategoriya va summa majburiy!','error');return;}
  const entry={id:Date.now(),category:cat,desc,amount,date:new Date().toISOString(),by:currentUser.name,smenaId:currentSmenaId,branchId:currentBranchId||null};
  if(cat==='Qaytarish'){
    const retOid=((document.getElementById('exp-return-order')||{}).value||'').trim();
    if(!retOid){toast('Qaytarilgan buyurtmani tanlang!','error');return;}
    const order=orders.find(o=>o.id===retOid);
    if(!order){toast('Buyurtma topilmadi!','error');return;}
    const unexpensedItems=(order.returnedItems||[]).filter(r=>!r.expensed);
    if(unexpensedItems.length===0){toast('Bu buyurtma uchun barcha qaytarishlar allaqachon harajat qilingan!','error');return;}
    // Tegishli returnedItems elementlarini "expensed" deb belgilash — qayta harajat qilib bo'lmaydi
    const expensedRetIds=unexpensedItems.map(r=>r.retId);
    orders=orders.map(o=>o.id===retOid?{...o,returnedItems:o.returnedItems.map(r=>expensedRetIds.includes(r.retId)?{...r,expensed:true}:r)}:o);
    entry.returnOrderId=retOid;
    entry.expensedRetIds=expensedRetIds;
    if(!entry.desc) entry.desc=retOid+' buyurtma qaytarish';
  }
  expenses.push(entry);
  save();
  toast('Harajat qo\'shildi!');closeModal();renderOperations();
}

function deleteExpense(id){
  confirmDialog('Harajatni o\'chirishni tasdiqlaysizmi?',()=>{
    const exp=expenses.find(e=>e.id===id);
    if(exp&&exp.category==='Qaytarish'&&exp.returnOrderId&&exp.expensedRetIds){
      orders=orders.map(o=>o.id===exp.returnOrderId?{...o,returnedItems:o.returnedItems.map(r=>exp.expensedRetIds.includes(r.retId)?{...r,expensed:false}:r)}:o);
    }
    expenses=expenses.filter(e=>e.id!==id);

function exportExpensesExcel(fromDate='',toDate='',showAll=false){
  let filtExp=[...expenses].filter(e=>e.type!=='smena_profit'&&e.type!=='damage'&&e.type!=='partner_income');
  if(!showAll){

function exportOrdersExcel(fromDate='',toDate='',showAll=false){
  let filtOrds=[...orders];
  if(!showAll){
    if(fromDate){const fd=new Date(fromDate);filtOrds=filtOrds.filter(o=>new Date(o.date)>=fd);}
    if(toDate){const td=new Date(toDate);td.setHours(23,59,59);filtOrds=filtOrds.filter(o=>new Date(o.date)<=td);}
  }
  if(filtOrds.length===0){toast('Sotuvlar yo\'q!','error');return;}
  const headers=['Buyurtma ID','Sana','Kassir','To\'lov turi','Savdo summasi','Qaytarilgan','Sof summa','Smena ID'];
  const rows=filtOrds.map(o=>{
    const retAmt=(o.returnedItems||[]).reduce((s,r)=>s+r.price*r.qty,0);
    return[o.id, fmtDate(o.date), o.cashier, o.payType, o.total, retAmt, o.total-retAmt, o.smenaId||''];
  });
  const totSale=filtOrds.reduce((s,o)=>s+o.total,0);
  const totRet=filtOrds.reduce((s,o)=>s+(o.returnedItems||[]).reduce((r,i)=>r+i.price*i.qty,0),0);
  rows.push(['JAMI:','','','',totSale,totRet,totSale-totRet,'']);
  const suffix=showAll?'_butun_davr':fromDate||toDate?`_${fromDate||''}${toDate?'_'+toDate:''}`:'_'+new Date().toISOString().slice(0,10);
  downloadXlsx('tushumlar'+suffix+'.xlsx', headers, rows);
  toast('Tushumlar Excel yuklab olindi!');
}

function exportFullReport(fromDate='',toDate='',showAll=false){
  let filtOrds=[...orders];
  let filtExp=[...expenses].filter(e=>e.type!=='smena_profit'&&e.type!=='damage'&&e.type!=='partner_income');
  if(!showAll){
    if(fromDate){const fd=new Date(fromDate);filtOrds=filtOrds.filter(o=>new Date(o.date)>=fd);filtExp=filtExp.filter(e=>new Date(e.date)>=fd);}
    if(toDate){const td=new Date(toDate);td.setHours(23,59,59);filtOrds=filtOrds.filter(o=>new Date(o.date)<=td);filtExp=filtExp.filter(e=>new Date(e.date)<=td);}
  }
  const totSale=filtOrds.reduce((s,o)=>s+o.total,0);
  const totRet=filtOrds.reduce((s,o)=>s+(o.returnedItems||[]).reduce((r,i)=>r+i.price*i.qty,0),0);
  const totExp=filtExp.reduce((s,e)=>s+e.amount,0);
  const profit=totSale-totRet-totExp;
  const headers=['Ko\'rsatkich','Qiymat (so\'m)','Izoh'];
  const suffix=showAll?'_butun_davr':fromDate||toDate?`_${fromDate||''}${toDate?'_'+toDate:''}`:'_'+new Date().toISOString().slice(0,10);
  const rows=[
    ['DAVRIY HISOBOT','',''],
    ['Davr',showAll?'Butun davr':fromDate&&toDate?fromDate+' — '+toDate:fromDate||toDate||'Joriy smena',''],
    ['','',''],
    ['Jami savdo',totSale,filtOrds.length+' ta buyurtma'],
    ['Qaytarilgan mahsulotlar',totRet,''],
    ['Sof savdo summasi',totSale-totRet,''],
    ['','',''],
    ['Jami harajatlar',totExp,filtExp.length+' ta yozuv'],
    ['','',''],
    ['SOF FOYDA',profit,profit>=0?'Foyda':'Zarar'],
    ['','',''],
    ['--- HARAJATLAR TAFSILOTI ---','',''],
    ...filtExp.map(e=>[e.category||'Boshqa', e.amount, e.desc||'']),
    ['','',''],
    ['--- SOTUVLAR TAFSILOTI ---','',''],
    ...filtOrds.map(o=>{const ret=(o.returnedItems||[]).reduce((s,r)=>s+r.price*r.qty,0);return[o.id+' ('+fmtDate(o.date)+')', o.total, 'Qaytarilgan: '+ret];}),
  ];
  downloadXlsx('hisobot'+suffix+'.xlsx', headers, rows);
  toast('To\'liq hisobot Excel yuklab olindi!');
}

function applyTheme(id) {
  const t = THEMES[id] || THEMES.darkglass;
  const root = document.documentElement;
  root.style.setProperty('--bg', t.bg);
  root.style.setProperty('--bg2', t.bg2);
  root.style.setProperty('--accent', t.accent);
  root.style.setProperty('--accent2', t.accent2);
  root.style.setProperty('--accent3', t.accent3);
  root.style.setProperty('--glass', t.glass);
  root.style.setProperty('--glass-border', t.glassBorder);
  if(t.isLight){
    root.style.setProperty('--text', '#1e293b');
    root.style.setProperty('--text2', '#475569');
    root.style.setProperty('--text3', '#94a3b8');
    root.style.setProperty('--glass', 'rgba(255,255,255,.95)');
    root.style.setProperty('--glass-hover', 'rgba(255,255,255,1)');
    root.style.setProperty('--glass-border', 'rgba(0,0,0,.1)');
    document.body.style.color='#1e293b';
    document.body.classList.add('theme-light');
  } else {
    root.style.setProperty('--text', '#e2e8f0');
    root.style.setProperty('--text2', '#94a3b8');
    root.style.setProperty('--text3', '#475569');
    document.body.style.color='#e2e8f0';
    document.body.classList.remove('theme-light');
  }
  document.body.style.background = t.bg;
  document.body.style.backgroundImage =
    `radial-gradient(ellipse at 15% 15%, ${t.accent}18 0%, transparent 50%),
     radial-gradient(ellipse at 85% 85%, ${t.accent2}10 0%, transparent 50%)`;
  currentThemeId = id;
  localStorage.setItem('pos_theme', id);
  document.querySelectorAll('.theme-card').forEach(el => {
    el.classList.toggle('theme-card-active', el.dataset.theme === id);
  });
}

function savePartner(pid){
  const name=((document.getElementById('pt-name')||{}).value||'').trim();
  const phone=((document.getElementById('pt-phone')||{}).value||'').trim();
  const type=(document.getElementById('pt-type')||{}).value||'other';
  const note=((document.getElementById('pt-note')||{}).value||'').trim();
  if(!name){toast('Nom majburiy!','error');return;}
  if(pid&&pid!=='null'){
    partners=partners.map(p=>p.id===pid?{...p,name,phone,type,note}:p);
    toast('Hamkor yangilandi!');
  } else {
    const balType=(document.getElementById('pt-bal-type')||{}).value||'0';
    const balAmt=parseFloat((document.getElementById('pt-bal-amount')||{}).value||0)||0;
    let balance=0;
    const txns=[];
    if(balType==='positive'&&balAmt>0){balance=balAmt;txns.push({id:genId('TXN'),date:new Date().toISOString(),amount:balAmt,type:'debt',desc:'Boshlang\'ich balans',by:currentUser.name,paid:false});}
    else if(balType==='negative'&&balAmt>0){balance=-balAmt;txns.push({id:genId('TXN'),date:new Date().toISOString(),amount:balAmt,type:'owed',desc:'Boshlang\'ich balans (biz qarzdor)',by:currentUser.name,paid:false});}
    partners.push({id:genId('PTN'),name,phone,type,note,balance,transactions:txns});
    toast('Hamkor qo\'shildi!');
  }
  save();
  closeModal();
  renderPartners();
}

function confirmPartnerPayment(pid){
  const amount=parseFloat((document.getElementById('pt-pay-amount')||{}).value||0)||0;
  const desc=((document.getElementById('pt-pay-desc')||{}).value||'').trim();
  if(!amount){toast('Summa kiriting!','error');return;}
  const partner=partners.find(p=>p.id===pid);
  if(!partner)return;
  if(!partner.transactions)partner.transactions=[];
  partner.transactions.push({
    id:genId('TXN'),date:new Date().toISOString(),
    amount,type:'payment',
    desc:desc||'To\'lov qabul qilindi',
    by:currentUser.name,paid:true
  });
  partner.balance=(partner.balance||0)-amount;
  // Kassaga partner_income sifatida qo'shish (smena faktualiga kiradi)
  expenses.push({
    id:genId('EXP'),date:new Date().toISOString(),
    category:'Hamkor to\'lovi',
    desc:'Hamkor: '+partner.name+(desc?' — '+desc:''),
    amount:-amount, // manfiy = kirim
    type:'partner_income',
    by:currentUser.name,
    smenaId:currentSmenaId,
    partnerId:pid
  });
  partners=partners.map(p=>p.id===pid?partner:p);
  save();
  toast(`${fmt(amount)} to'lov qabul qilindi! Kassa qoldig'iga qo'shildi.`);
  closeModal();
  renderPartners();
}

function savePartnerTxn(pid){
  const type=(document.getElementById('pt-txn-type')||{}).value||'debt';
  const amount=parseFloat((document.getElementById('pt-txn-amount')||{}).value||0)||0;
  const desc=((document.getElementById('pt-txn-desc')||{}).value||'').trim();
  if(!amount||!desc){toast('Summa va tavsif majburiy!','error');return;}
  const partner=partners.find(p=>p.id===pid);
  if(!partner)return;
  if(!partner.transactions)partner.transactions=[];
  partner.transactions.push({id:genId('TXN'),date:new Date().toISOString(),amount,type,desc,by:currentUser.name,paid:false});
  partner.balance=(partner.balance||0)+(type==='debt'?amount:-amount);
  partners=partners.map(p=>p.id===pid?partner:p);
  save();
  toast('Tranzaksiya saqlandi!');
  closeModal();
  renderPartners();
}

function payPartnerTxn(pid,txnId){
  const partner=partners.find(p=>p.id===pid);
  if(!partner)return;
  const txn=partner.transactions.find(t=>t.id===txnId);
  if(!txn||txn.paid)return;
  confirmDialog(`${fmt(txn.amount)} to'lovni tasdiqlaysizmi? Kassa qoldig'iga qo'shiladi.`,()=>{
    txn.paid=true;
    partner.balance=(partner.balance||0)-txn.amount;
    expenses.push({
      id:genId('EXP'),date:new Date().toISOString(),
      category:'Hamkor to\'lovi',
      desc:'Hamkor: '+partner.name+' — '+txn.desc,
      amount:-txn.amount,
      type:'partner_income',
      by:currentUser.name,
      smenaId:currentSmenaId,
      partnerId:pid
    });
    partners=partners.map(p=>p.id===pid?partner:p);
    save();
    toast(`${fmt(txn.amount)} to'landi! Kassa qoldig'iga qo'shildi.`);
    openPartnerDetail(pid);
  });
}

function saveBranch(bid){
  const name=((document.getElementById('br-name')||{}).value||'').trim();
  const address=((document.getElementById('br-addr')||{}).value||'').trim();
  const phone=((document.getElementById('br-phone')||{}).value||'').trim();
  const managerId=parseInt((document.getElementById('br-manager')||{}).value||0)||null;
  const note=((document.getElementById('br-note')||{}).value||'').trim();
  if(!name){toast('Filial nomi majburiy!','error');return;}
  if(bid&&bid!=='null'){
    branches=branches.map(b=>b.id===bid?{...b,name,address,phone,managerId,note}:b);
    toast('Filial yangilandi!');
  } else {
    branches.push({id:genId('BR'),name,address,phone,managerId,note,staffIds:[],active:true,createdAt:new Date().toISOString(),by:currentUser.name});
    toast('Filial yaratildi!');
  }
  save();closeModal();renderBranches();
}

function exportAuditExcel(){
  if(!auditLog.length){toast('Audit log bo\'m-bo\'sh!','error');return;}
  const headers=['Sana','Foydalanuvchi','Rol','Amal','Tafsilot','Sahifa'];
  const rows=auditLog.map(a=>[fmtDate(a.date),a.by,a.role||'',a.action,a.details||'',a.page||'']);
  downloadXlsx('audit_log_'+new Date().toISOString().slice(0,10)+'.xlsx', headers, rows);
  toast('Audit log Excel yuklab olindi!');
}

function renderAnalytics(){
  const now=new Date();
  // Local vaqt bilan ishlash (UTC emas)
  const pad=n=>String(n).padStart(2,'0');
  const localDate=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const monthStart=localDate(new Date(now.getFullYear(),now.getMonth(),1));
  const today=localDate(now);
  const pg=document.getElementById('page-content');
  pg.innerHTML=`
    <div class="card" style="margin-bottom:12px;padding:12px 16px">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <div style="display:flex;gap:4px">
          <button class="btn btn-primary btn-sm" onclick="showAnalyticsTab('rating')" id="atab-rating"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:-2px;margin-right:4px"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Sotuv reytingi</button>
          <button class="btn btn-ghost btn-sm" onclick="showAnalyticsTab('cashier')" id="atab-cashier"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:-2px;margin-right:4px"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Kassirlar</button>
          <button class="btn btn-ghost btn-sm" onclick="showAnalyticsTab('margin')" id="atab-margin"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:-2px;margin-right:4px"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Margin</button>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-left:auto;flex-wrap:wrap">
          <span style="font-size:12px;color:var(--text2)">Davr:</span>
          <input type="date" id="ana-from" class="form-input" value="${monthStart}" style="width:140px;padding:5px 8px" onchange="refreshAnalytics()"/>
          <span style="color:var(--text3)">—</span>
          <input type="date" id="ana-to" class="form-input" value="${today}" style="width:140px;padding:5px 8px" onchange="refreshAnalytics()"/>
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('ana-from').value='';document.getElementById('ana-to').value='';refreshAnalytics()">Tozalash</button>
        </div>
      </div>
    </div>
    <div id="analytics-content"></div>`;
  showAnalyticsTab('rating');
}

function refreshAnalytics(){
  const tabs=['rating','cashier','margin'];
  const active=tabs.find(t=>{const b=document.getElementById('atab-'+t);return b&&b.classList.contains('btn-primary');})||'rating';
  showAnalyticsTab(active);
}


function showAnalyticsTab(tab){
  ['rating','cashier','margin'].forEach(t=>{
    const btn=document.getElementById('atab-'+t);
    if(btn){btn.className=t===tab?'btn btn-primary btn-sm':'btn btn-ghost btn-sm';}
  });
  const box=document.getElementById('analytics-content');
  if(!box)return;

  // Sana filtri — local vaqt bilan solishtirish
  const fromVal=((document.getElementById('ana-from')||{}).value)||'';
  const toVal=((document.getElementById('ana-to')||{}).value)||'';
  let filtOrders=currentBranchId?orders.filter(o=>o.branchId===currentBranchId):[...orders];
  if(fromVal){
    const fd=new Date(fromVal+'T00:00:00');
    filtOrders=filtOrders.filter(o=>new Date(o.date)>=fd);
  }
  if(toVal){
    const td=new Date(toVal+'T23:59:59');
    filtOrders=filtOrders.filter(o=>new Date(o.date)<=td);
  }
  const periodLabel=fromVal||toVal?(fromVal+' → '+toVal):'Barcha vaqt';

  if(tab==='rating'){
    // Mahsulot sotuv reytingi — qaytarilgan mahsulotlar hisoblanmaydi
    const productSales={};
    filtOrders.forEach(o=>{
      const returned=o.returnedItems||[];
      (o.items||[]).forEach(item=>{
        // Qaytarilgan miqdorni topamiz
        const retQty=returned.filter(r=>r.pid===item.pid).reduce((s,r)=>s+r.qty,0);
        const netQty=item.qty-retQty;
        if(netQty<=0)return; // to'liq qaytarilgan — hisoblamaymiz
        if(!productSales[item.pid]){productSales[item.pid]={pid:item.pid,name:item.name,qty:0,revenue:0,orders:0,returned:0};}
        productSales[item.pid].qty+=netQty;
        productSales[item.pid].revenue+=item.price*netQty;
        productSales[item.pid].orders++;
        if(retQty>0)productSales[item.pid].returned+=retQty;
      });
    });
    const sorted=Object.values(productSales).sort((a,b)=>b.qty-a.qty);
    const maxQty=(sorted[0]&&sorted[0].qty)||1;
    const rows=sorted.map((p,i)=>`
      <tr>
        <td style="font-weight:700;color:var(--text3)">${i+1}</td>
        <td style="font-weight:600">${badge(p.pid,'purple')} ${p.name}</td>
        <td>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="flex:1;height:8px;background:var(--glass);border-radius:4px;overflow:hidden">
              <div style="height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;width:${Math.round(p.qty/maxQty*100)}%"></div>
            </div>
            <span style="font-weight:700;min-width:40px">${p.qty} ta${p.returned>0?`<span style="font-size:10px;color:#f87171;margin-left:4px">(-${p.returned})</span>`:''}</span>
          </div>
        </td>
        <td style="font-weight:700;color:var(--accent2)">${fmt(p.revenue)}</td>
        <td>${p.orders} sotuv</td>
      </tr>`).join('');
    // Eng kam sotiladigan
    const leastSold=products.filter(p=>!productSales[p.id]).map(p=>({pid:p.id,name:p.name,qty:0}));
    box.innerHTML=`
      <div class="card">
        <div class="card-header"><span class="card-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:-2px;margin-right:4px"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>Sotuv reytingi <span style="font-size:11px;color:var(--text3);font-weight:400">${periodLabel}</span></span>${badge(sorted.length+' ta','green')}</div>
        <div style="overflow:auto"><table><thead><tr><th>#</th><th>Mahsulot</th><th>Sotuv (grafik)</th><th>Tushum</th><th>Buyurtmalar</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text3)">Sotuvlar yo\'q</td></tr>'}</tbody></table></div>
      </div>
      ${leastSold.length>0?`<div class="card"><div class="card-header"><span class="card-title">Hech sotilmagan mahsulotlar</span>${badge(leastSold.length+' ta','red')}</div>
      <div class="flex wrap">${leastSold.map(p=>`<div class="low-stock-item"><span>${p.name}</span>${badge('0 sotuv','red')}</div>`).join('')}</div></div>`:''}`;
  }

  else if(tab==='cashier'){
    // Kassir samaradorligi — qaytarilgan summalar chiqariladi
    const cashierStats={};
    filtOrders.forEach(o=>{
      const retAmt=(o.returnedItems||[]).reduce((s,r)=>s+r.price*r.qty,0);
      const netTotal=o.total-retAmt;
      const allReturned=retAmt>0&&(o.returnedItems||[]).length>0&&o.items.every(item=>(o.returnedItems||[]).filter(r=>r.pid===item.pid).reduce((s,r)=>s+r.qty,0)>=item.qty);
      if(allReturned)return; // to'liq qaytarilgan buyurtma — hisoblamaymiz
      if(!cashierStats[o.cashier]){cashierStats[o.cashier]={name:o.cashier,orders:0,revenue:0,returned:0,avgCheck:0};}
      cashierStats[o.cashier].orders++;
      cashierStats[o.cashier].revenue+=netTotal;
      if(retAmt>0)cashierStats[o.cashier].returned+=retAmt;
    });
    Object.values(cashierStats).forEach(c=>{c.avgCheck=c.orders?Math.round(c.revenue/c.orders):0;});
    const sorted=Object.values(cashierStats).sort((a,b)=>b.revenue-a.revenue);
    const rows=sorted.map((c,i)=>`
      <tr>
        <td style="font-weight:700;color:var(--text3)">${i+1}</td>
        <td style="font-weight:600">${c.name}</td>
        <td style="font-weight:700;text-align:center">${c.orders}</td>
        <td style="font-weight:700;color:var(--accent2)">${fmt(c.revenue)}${c.returned>0?`<div style="font-size:11px;color:#f87171">-${fmt(c.returned)} qaytarilgan</div>`:''}</td>
        <td style="color:var(--text2)">${fmt(c.avgCheck)}</td>
      </tr>`).join('');
    box.innerHTML=`<div class="card">
      <div class="card-header"><span class="card-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:-2px;margin-right:4px"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Kassir samaradorligi <span style="font-size:11px;color:var(--text3);font-weight:400">${periodLabel}</span></span></div>
      <table><thead><tr><th>#</th><th>Kassir</th><th>Sotuvlar soni</th><th>Jami tushum</th><th>O'rtacha chek</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text3)">Ma\'lumot yo\'q</td></tr>'}</tbody></table>
    </div>`;
  }

  else if(tab==='margin'){
    // Foyda marginali
    const prodStats={};
    filtOrders.forEach(o=>{
      const returned=o.returnedItems||[];
      (o.items||[]).forEach(item=>{
        const p=products.find(x=>x.id===item.pid);
        if(!p)return;
        const retQty=returned.filter(r=>r.pid===item.pid).reduce((s,r)=>s+r.qty,0);
        const netQty=item.qty-retQty;
        if(netQty<=0)return; // to'liq qaytarilgan
        const costP=p.cost&&p.cost>0?p.cost:0;
        if(!prodStats[item.pid]){prodStats[item.pid]={pid:item.pid,name:item.name,cost:costP,price:p.price,qty:0,revenue:0,profit:0,hasCost:costP>0};}
        prodStats[item.pid].qty+=netQty;
        prodStats[item.pid].revenue+=item.price*netQty;
        if(costP>0)prodStats[item.pid].profit+=(item.price-costP)*netQty;
      });
    });
    const sorted=Object.values(prodStats).sort((a,b)=>b.profit-a.profit);
    const rows=sorted.map((p,i)=>{
      const margin=p.hasCost&&p.revenue?Math.round(p.profit/p.revenue*100):null;
      return`<tr>
        <td style="font-weight:700;color:var(--text3)">${i+1}</td>
        <td style="font-weight:600">${badge(p.pid,'purple')} ${p.name}</td>
        <td>${p.cost&&p.cost>0?fmt(p.cost)+'<span style="color:var(--text3)"> → </span>'+fmt(p.price):'— → '+fmt(p.price)}</td>
        <td style="font-weight:700;color:${margin===null?'var(--text3)':margin>=30?'#4ade80':margin>=15?'#fbbf24':'#f87171'}">${margin===null?'<span style="font-size:11px">Kirim narxi yo\'q</span>':margin+'%'}</td>
        <td style="font-weight:700;color:${p.profit>0?'var(--accent2)':'#f87171'}">${p.hasCost?fmt(p.profit):'—'}</td>
        <td style="color:var(--text2)">${p.qty} ta</td>
      </tr>`;}).join('');
    box.innerHTML=`<div class="card">
      <div class="card-header"><span class="card-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:-2px;margin-right:4px"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Foyda marginali <span style="font-size:11px;color:var(--text3);font-weight:400">${periodLabel}</span></span></div>
      <table><thead><tr><th>#</th><th>Mahsulot</th><th>Narx (tan → sotish)</th><th>Margin %</th><th>Jami foyda</th><th>Sotilib</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text3)">Ma\'lumot yo\'q</td></tr>'}</tbody></table>
    </div>`;
  }
}

function renderLoyalty(srch){
  srch=srch||'';
  const total=loyaltyCards.reduce((s,c)=>s+c.totalSpent,0);
  let list=loyaltyCards;
  if(srch) list=list.filter(c=>
    c.customerName.toLowerCase().includes(srch.toLowerCase())||
    c.cardNo.toLowerCase().includes(srch.toLowerCase())||
    (c.phone&&c.phone.includes(srch))
  );
  const cards=list.map(c=>`
    <tr>
      <td style="font-weight:700;color:var(--accent2)">${c.cardNo}</td>
      <td style="font-weight:600">${c.customerName}</td>
      <td style="color:var(--text2)">${c.phone||'—'}</td>
      <td><span style="background:rgba(34,197,94,.15);color:#4ade80;border-radius:8px;padding:3px 10px;font-weight:700">${c.discount}%</span></td>
      <td style="font-weight:700;color:var(--accent2)">${fmt(c.totalSpent)}</td>
      <td style="font-size:12px;color:var(--text3)">${fmtDate(c.createdAt)}</td>
      <td><div style="display:flex;gap:6px">
        <button class="btn btn-outline btn-sm" onclick="openLoyaltyModal('${c.id}')">Tahrirlash</button>
        <button class="btn btn-danger btn-sm" onclick="deleteLoyalty('${c.id}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14H6L5 6"/></svg>
        </button>
      </div></td>
    </tr>`).join('');

  document.getElementById('page-content').innerHTML=`
    <div class="stat-grid" style="margin-bottom:16px">
      <div class="stat-card"><div class="stat-card-header"><span class="stat-card-title"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:-2px;margin-right:3px"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Jami kartalar</span></div><div class="stat-value">${loyaltyCards.length}</div></div>
      <div class="stat-card"><div class="stat-card-header"><span class="stat-card-title"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:-2px;margin-right:3px"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Jami xaridlar</span></div><div class="stat-value">${fmt(total)}</div></div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:-2px;margin-right:4px"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Chegirma kartalar</span>
        <button class="btn btn-primary btn-sm" onclick="openLoyaltyModal(null)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Yangi karta
        </button>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:14px">
        <input class="form-input" placeholder="Ism, karta №, telefon..." value="${srch}"
          oninput="renderLoyalty(this.value)" style="flex:1"/>
        ${srch?`<button class="btn btn-ghost btn-sm" onclick="renderLoyalty()">✕</button>`:''}
      </div>
      <div style="overflow:auto">
        <table><thead><tr><th>Karta №</th><th>Mijoz</th><th>Telefon</th><th>Chegirma</th><th>Jami xarid</th><th>Sana</th><th></th></tr></thead>
        <tbody>${cards||'<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--text3)">Hech narsa topilmadi</td></tr>'}</tbody></table>
      </div>
    </div>`;
}


function openLoyaltyModal(id){
  const c=id?loyaltyCards.find(x=>x.id===id):null;
  openModal(c?'Kartani tahrirlash':'Yangi chegirma karta',`
    <div class="form-group"><label class="form-label">Mijoz ismi *</label>
      <input id="lc-name" class="form-input" value="${c?c.customerName:''}" placeholder="Ism Familiya"/></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group"><label class="form-label">Telefon</label>
        <input id="lc-phone" class="form-input" value="${c?c.phone||'':''}" placeholder="+998..."/></div>
      <div class="form-group"><label class="form-label">Chegirma % *</label>
        <input id="lc-disc" type="number" min="1" max="99" class="form-input" value="${c?c.discount:5}" placeholder="5"/></div>
    </div>
    <div class="form-group"><label class="form-label">Karta raqami</label>
      <div style="display:flex;gap:8px">
        <input id="lc-card" class="form-input" value="${c?c.cardNo:''}" placeholder="Avtomatik" style="flex:1"/>
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('lc-card').value='LC'+Date.now().toString(36).toUpperCase().slice(-6)">Generatsiya</button>
      </div></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary btn-md" onclick="saveLoyaltyCard(${c?`'${c.id}'`:'null'})">Saqlash</button>
      <button class="btn btn-ghost btn-md" onclick="closeModal()">Bekor</button>
    </div>`,400);
}

function saveLoyaltyCard(id){
  const name=((document.getElementById('lc-name')||{}).value||'').trim();
  const phone=((document.getElementById('lc-phone')||{}).value||'').trim();
  const discount=parseInt((document.getElementById('lc-disc')||{}).value||5)||5;
  const cardNo=((document.getElementById('lc-card')||{}).value||'').trim()||'LC'+Date.now().toString(36).toUpperCase().slice(-6);
  if(!name){toast('Mijoz ismi majburiy!','error');return;}
  if(id&&id!=='null'){
    loyaltyCards=loyaltyCards.map(c=>c.id===id?{...c,customerName:name,phone,discount,cardNo}:c);
    toast('Karta yangilandi!');
  } else {
    loyaltyCards.push({id:genId('LC'),cardNo,customerName:name,phone,discount,totalSpent:0,createdAt:new Date().toISOString()});
    toast('Yangi karta qo\'shildi!');
  }
  save(); closeModal(); renderLoyalty();
  addAudit('Chegirma karta '+(id&&id!=='null'?'tahrirlandi':'yaratildi'),name,'Chegirma kartalar');
}

function deleteLoyalty(id){
  confirmDialog('Kartani o\'chirishni tasdiqlaysizmi?',()=>{

function saveBankAccount(id){
  const name=((document.getElementById('ba-name')||{}).value||'').trim();
  const bankName=((document.getElementById('ba-bank')||{}).value||'').trim();
  const balance=parseFloat((document.getElementById('ba-bal')||{}).value||0)||0;
  if(!name){toast('Hisob nomi majburiy!','error');return;}
  if(id&&id!=='null'){
    bankAccounts=bankAccounts.map(b=>b.id===id?{...b,name,bankName}:b);
    toast('Hisob yangilandi!');
  } else {
    bankAccounts.push({id:genId('BA'),name,bankName,balance,transactions:[]});
    toast('Yangi hisob qo\'shildi!');
  }
  save(); closeModal(); renderBankAccounts();
}

function openBankTxnModal(bankId, type){
  const b=bankAccounts.find(x=>x.id===bankId);
  if(!b)return;
  openModal(`${type==='income'?'Kirim':'Chiqim'}: ${b.name}`,`
    <div style="background:var(--glass);border:1px solid var(--glass-border);border-radius:10px;padding:12px;margin-bottom:14px">
      <div style="font-size:12px;color:var(--text3)">Joriy balans</div>
      <div style="font-size:20px;font-weight:800;color:var(--accent2)">${fmt(b.balance)}</div>
    </div>
    <div class="form-group"><label class="form-label">Summa *</label>
      <input id="ba-txn-amount" type="number" class="form-input" placeholder="0"/></div>
    <div class="form-group"><label class="form-label">Izoh</label>
      <input id="ba-txn-desc" class="form-input" placeholder="To'lov maqsadi..."/></div>
    <div style="display:flex;gap:10px">
      <button class="btn ${type==='income'?'btn-success':'btn-danger'} btn-md" onclick="saveBankTxn('${bankId}','${type}')">
        ${type==='income'?'Kirim qo\'shish':'Chiqim qilish'}
      </button>
      <button class="btn btn-ghost btn-md" onclick="closeModal()">Bekor</button>
    </div>`,380);
}

function saveBankTxn(bankId, type){
  const amount=parseFloat((document.getElementById('ba-txn-amount')||{}).value||0)||0;
  const desc=((document.getElementById('ba-txn-desc')||{}).value||'').trim();
  if(!amount){toast('Summa kiriting!','error');return;}
  bankAccounts=bankAccounts.map(b=>{
    if(b.id!==bankId)return b;
    const newBal=type==='income'?b.balance+amount:b.balance-amount;
    const txns=b.transactions||[];
    txns.push({id:genId('BTX'),date:new Date().toISOString(),amount,type,desc:desc||type,by:currentUser.name});
    return {...b,balance:newBal,transactions:txns};
  });
  save(); toast(type==='income'?`+${fmt(amount)} kirim qilindi!`:`-${fmt(amount)} chiqim qilindi!`);
  closeModal(); renderBankAccounts();
  addAudit('Bank '+(type==='income'?'kirim':'chiqim'), `${fmt(amount)}: ${desc}`,'Bank hisob');
}

function showBankHistory(bankId){
  const b=bankAccounts.find(x=>x.id===bankId);
  if(!b)return;
  const rows=(b.transactions||[]).slice().reverse().map(t=>`
    <tr>
      <td style="font-size:12px;color:var(--text2)">${fmtDate(t.date)}</td>
      <td style="font-weight:700;color:${t.type==='income'?'#4ade80':'#f87171'}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</td>
      <td>${t.desc||'—'}</td>
      <td style="font-size:12px;color:var(--text3)">${t.by||'—'}</td>
    </tr>`).join('');
  openModal(`${b.name} — Tranzaksiyalar tarixi`,`
    <div style="overflow:auto;max-height:60vh">
      <table><thead><tr><th>Sana</th><th>Summa</th><th>Izoh</th><th>Kim</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text3)">Tranzaksiyalar yo\'q</td></tr>'}</tbody></table>
    </div>`,500);
}

function openWarehouseTransferModal(){
  if(branches.length<2){toast('Kamida 2 ta filial bo\'lishi kerak!','error');return;}
  const branchOpts=branches.map(b=>`<option value="${b.id}">${b.name}</option>`).join('');
  const prodOpts=products.map(p=>`<option value="${p.id}">${p.name} (${p.stock} dona)</option>`).join('');
  openModal('Ombor o\'tkazish — Filiallar o\'rtasida',`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <div class="form-group"><label class="form-label">Qaydan *</label>
        <select id="tr-from" class="form-input">${branchOpts}</select></div>
      <div class="form-group"><label class="form-label">Qayga *</label>
        <select id="tr-to" class="form-input">${branchOpts}</select></div>
    </div>
    <div class="form-group"><label class="form-label">Mahsulot *</label>
      <select id="tr-prod" class="form-input">${prodOpts}</select></div>
    <div class="form-group"><label class="form-label">Miqdor *</label>
      <input id="tr-qty" type="number" min="1" class="form-input" placeholder="1"/></div>
    <div class="form-group"><label class="form-label">Izoh</label>
      <input id="tr-note" class="form-input" placeholder="O'tkazish sababi..."/></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary btn-md" onclick="confirmWarehouseTransfer()">O'tkazish</button>
      <button class="btn btn-ghost btn-md" onclick="closeModal()">Bekor</button>
    </div>`,440);
}

function confirmWarehouseTransfer(){
  const fromId=(document.getElementById('tr-from')||{}).value;
  const toId=(document.getElementById('tr-to')||{}).value;
  const prodId=(document.getElementById('tr-prod')||{}).value;
  const qty=parseInt((document.getElementById('tr-qty')||{}).value||0)||0;
  const note=((document.getElementById('tr-note')||{}).value||'').trim();
  if(!fromId||!toId||fromId===toId){toast('Qaydan va Qayga filiallari farqli bo\'lishi kerak!','error');return;}
  if(!prodId||qty<=0){toast('Mahsulot va miqdorni kiriting!','error');return;}
  const p=products.find(x=>x.id===prodId);
  if(!p){return;}
  if(p.stock<qty){toast(`Yetarli mahsulot yo'q! Qoldiq: ${p.stock} dona`,'error');return;}
  const fromBranch=branches.find(b=>b.id===fromId);
  const toBranch=branches.find(b=>b.id===toId);
  // Stockni o'tkazish — mahsulot global, transfer log saqlaymiz
  products=products.map(x=>x.id===prodId?{...x,stock:x.stock-qty}:x);
  // Transfer log (importHistory da saqlaymiz)
  importHistory.push({
    id:genId('TRF'), date:new Date().toISOString(),
    by:currentUser.name, source:'transfer',
    fromBranch:(fromBranch&&fromBranch.name)||fromId, toBranch:(toBranch&&toBranch.name)||toId,
    items:[{pid:prodId,name:p.name,qty,cost:p.cost||0,price:p.price}],
    note
  });
  save();
  toast(`${qty} ta "${p.name}" → ${(toBranch&&toBranch.name)||''} ga o'tkazildi!`);
  closeModal();
  addAudit('Ombor o\'tkazish', `${qty} × ${p.name}: ${(fromBranch&&fromBranch.name)||''} → ${(toBranch&&toBranch.name)||''}`,'Ombor');
}

function previewProductImg(inp,pid){
  const file=inp.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    window._productImgData=e.target.result;
    toast('Rasm yuklandi. "Saqlash" bosing.');
  };
  reader.readAsDataURL(file);
}

function saveProductImage(pid){
  products=products.map(p=>p.id===pid?{...p,image:window._productImgData||null}:p);
  save();toast('Rasm saqlandi!');closeModal();
  renderWarehouse();
}

function removeProductImage(pid){
  window._productImgData=null;
  products=products.map(p=>p.id===pid?{...p,image:null}:p);
  save();toast('Rasm o\'chirildi!');closeModal();
}

function saveGiftRule(id){
  const name=((document.getElementById('gr-name')||{}).value||'').trim();
  const buyQty=parseInt((document.getElementById('gr-buy')||{}).value||2)||2;
  const freeQty=parseInt((document.getElementById('gr-free')||{}).value||1)||1;
  const productId=(document.getElementById('gr-prod')||{}).value||'';
  if(!appSettings.giftRules)appSettings.giftRules=[];
  if(id&&id!=='null'){
    appSettings.giftRules=appSettings.giftRules.map(r=>r.id===id?{...r,name,buyQty,freeQty,productId}:r);
  } else {
    appSettings.giftRules.push({id:genId('GR'),name:name||`${buyQty}+${freeQty}`,buyQty,freeQty,productId,active:true});
  }
  save();toast('Saqlandi!');closeModal();renderSettings();
}

function toggleGiftRule(id){
  appSettings.giftRules=(appSettings.giftRules||[]).map(r=>r.id===id?{...r,active:!r.active}:r);
  save();renderSettings();
}
function deleteGiftRule(id){
  appSettings.giftRules=(appSettings.giftRules||[]).filter(r=>r.id!==id);
  save();renderSettings();
}

function saveBulkDiscount(id){
  const category=(document.getElementById('bd-cat')||{}).value||'';
  const minQty=parseInt((document.getElementById('bd-qty')||{}).value||5)||5;
  const discountPct=parseInt((document.getElementById('bd-pct')||{}).value||10)||10;
  if(!category){toast('Kategoriya tanlang!','error');return;}
  if(!appSettings.bulkDiscounts)appSettings.bulkDiscounts=[];
  if(id&&id!=='null'){
    appSettings.bulkDiscounts=appSettings.bulkDiscounts.map(d=>d.id===id?{...d,category,minQty,discountPct}:d);
  } else {
    appSettings.bulkDiscounts.push({id:genId('BD'),category,minQty,discountPct,active:true});
  }
  save();toast('Saqlandi!');closeModal();renderSettings();
}

function toggleBulkDiscount(id){
  appSettings.bulkDiscounts=(appSettings.bulkDiscounts||[]).map(d=>d.id===id?{...d,active:!d.active}:d);
  save();renderSettings();
}
function deleteBulkDiscount(id){
  appSettings.bulkDiscounts=(appSettings.bulkDiscounts||[]).filter(d=>d.id!==id);
  save();renderSettings();
}

function saveCompanySettings(){
  appSettings.companyName=((document.getElementById('set-cname')||{}).value||'').trim()||'Pro Cases';
  appSettings.companyPhone=((document.getElementById('set-cphone')||{}).value||'').trim();
  appSettings.companyAddress=((document.getElementById('set-caddr')||{}).value||'').trim();
  appSettings.receiptFooter=((document.getElementById('set-footer')||{}).value||'').trim();
  appSettings.lowStockThreshold=parseInt((document.getElementById('set-threshold')||{}).value||10)||10;
  save();
  toast('Kompaniya sozlamalari saqlandi!');
  addAudit('Sozlamalar yangilandi','Kompaniya ma\'lumotlari','Sozlamalar');
}

function applyCustomAccent(color) {
  const root = document.documentElement;
  root.style.setProperty('--accent', color);
  root.style.setProperty('--accent2', color + 'cc');
  root.style.setProperty('--accent3', color + '99');
  // Lighter variant for accent2/3
  root.style.setProperty('--accent2', color);
  localStorage.setItem('pos_customAccent', color);
  toast('Rang o\'zgartirildi!');
}

function supplierStartPicking(poId){
  const po=purchaseOrders.find(o=>o.id===poId);
  if(!po)return;
  po.status='picking';
  if(!po.timeline)po.timeline=[];
  po.timeline.push({status:'picking',date:new Date().toISOString(),by:currentUser.name,note:'Terib boshlandi'});
  purchaseOrders=purchaseOrders.map(o=>o.id===poId?po:o);
  save();
  toast('Zakaz terib boshlandi!');
  renderSupplierDashboard();
}

function supplierShipOrder(poId){
  const po=purchaseOrders.find(o=>o.id===poId);
  if(!po)return;
  po.status='shipped';
  if(!po.timeline)po.timeline=[];
  po.timeline.push({status:'shipped',date:new Date().toISOString(),by:currentUser.name,note:"Yo'lga solindi"});
  purchaseOrders=purchaseOrders.map(o=>o.id===poId?po:o);
  save();
  toast("Zakaz yo'lga solindi! Omborchi qabul qiladi.");
  renderSupplierDashboard();
}

async function renderUsersWithRefresh(){

  try{
    if(GAS_URL&&currentUser){
      const di=getDeviceInfo();
      const result=await gasCall('setOnline',{
        userId:currentUser.id,name:currentUser.name,avatar:currentUser.avatar,
        page:'Foydalanuvchilar',sessionId:SESSION_ID,
        device:di.device,browser:di.browser,
        loginTime:sessionStorage.getItem('pos_loginTime')||new Date().toISOString()

// Sessiyani yakunlash (admin tomonidan)
async function terminateUserSession(sessionId, userId){
  confirmDialog('Bu sessiyani yakunlashni tasdiqlaysizmi?',async()=>{
    try{
      await gasCall('terminateSession', {sessionId, userId});
      window._onlineSessions=(window._onlineSessions||[]).filter(s=>s.sessionId!==sessionId);
      toast('Sessiya yakunlandi!');
      renderUsers();
    }catch(e){toast('Xato: '+e.message,'error');}
  });
}

async function terminateAllSessions(userId){
  confirmDialog('Bu foydalanuvchining BARCHA sessiyalarini yakunlashni tasdiqlaysizmi?',async()=>{

      window._onlineSessions=(window._onlineSessions||[]).filter(s=>String(s.id)!==String(userId));
      toast('Barcha sessiyalar yakunlandi!');
      renderUsers();
    }catch(e){toast('Xato: '+e.message,'error');}
  });
}

function previewAvatar(inp){
  const file=inp.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    window._avatarData=e.target.result;
    const prev=document.getElementById('avatar-preview');
    if(prev)prev.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    toast('Rasm yuklandi!');
  };
  reader.readAsDataURL(file);
}

function clearAvatar(){
  window._avatarData=null;
  const uId=userEditId;
  const u=uId?users.find(x=>x.id===uId):null;
  const prev=document.getElementById('avatar-preview');
  if(prev)prev.innerHTML=`<span style="font-size:22px;font-weight:800">${u?u.avatar:'?'}</span>`;

function toggleRoleCb(roleId){
  if(!window._selectedRoles) window._selectedRoles=[];
  const roleColors={
    admin:{color:'#7c3aed',bg:'rgba(124,58,237,.15)'},
    cashier:{color:'#2563eb',bg:'rgba(37,99,235,.15)'},
    supplier:{color:'#0ea5e9',bg:'rgba(14,165,233,.15)'},
    warehouse:{color:'#10b981',bg:'rgba(16,185,129,.15)'},
    accountant:{color:'#f59e0b',bg:'rgba(245,158,11,.15)'},
    viewer:{color:'#64748b',bg:'rgba(100,116,139,.15)'},
  };
  const btn=document.getElementById('role-cb-'+roleId);
  if(!btn)return;
  const isNowSelected=btn.dataset.selected==='1';
  if(isNowSelected){
    // Oxirgi rolni olib tashlab bo'lmaydi
    if(window._selectedRoles.length<=1){toast('Kamida 1 ta rol bo\'lishi kerak!','error');return;}
    window._selectedRoles=window._selectedRoles.filter(r=>r!==roleId);
    btn.dataset.selected='0';
    const rc=roleColors[roleId]||{color:'var(--text2)',bg:'var(--glass)'};
    btn.style.borderColor='rgba(255,255,255,.1)';
    btn.style.background='var(--glass)';
    btn.style.color='var(--text2)';
    // Checkmark olib tashlash
    const cm=btn.querySelector('span');if(cm)cm.remove();
  } else {
    window._selectedRoles.push(roleId);
    btn.dataset.selected='1';
    const rc=roleColors[roleId]||{color:'#6366f1',bg:'rgba(99,102,241,.15)'};
    btn.style.borderColor=rc.color;
    btn.style.background=rc.bg;
    btn.style.color=rc.color;
    // Checkmark qo'shish
    const cm=document.createElement('span');
    cm.style.cssText=`position:absolute;top:4px;right:4px;width:14px;height:14px;border-radius:50%;background:${rc.color};display:flex;align-items:center;justify-content:center`;
    cm.innerHTML='<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20,6 9,17 4,12"/></svg>';
    btn.appendChild(cm);
  }
}

function saveUser(){
  const name=((document.getElementById('u-name')||{}).value||'').trim();
  const login=((document.getElementById('u-login')||{}).value||'').trim();
  const pass=((document.getElementById('u-pass')||{}).value||'').trim();
  const avatarUrl=window._avatarData||null;

  // Tanlangan rollar (array)
  const roles=window._selectedRoles&&window._selectedRoles.length>0?window._selectedRoles:['cashier'];
  // Asosiy rol: admin > supplier > warehouse > cashier > accountant > viewer
  const rolePriority=['admin','supplier','warehouse','cashier','accountant','viewer'];
  const primaryRole=rolePriority.find(r=>roles.includes(r))||roles[0];

  if(!name||!login||!pass){toast('Barcha maydonlarni to\'ldiring!','error');return;}
  if(!userEditId&&users.find(u=>u.login===login)){toast('Bu login allaqachon mavjud!','error');return;}

  // Admin tanlansa — barcha ruxsatlar
  const perms=primaryRole==='admin'?{...ADMIN_PERMS}:(roles.includes('admin')?{...ADMIN_PERMS}:undefined);

  if(userEditId){
    users=users.map(u=>u.id===userEditId?{
      ...u, name, password:pass,
      role:primaryRole, roles,

// ===== XLSX BUILDER (minimal) =====
function makeXlsx(headers, rows){
  // Build a proper .xlsx file using SpreadsheetML XML inside a ZIP-like structure
  // We'll use the data: URI with a proper XLSX structure via a mini builder
  const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const allRows=[headers,...rows];
  let sharedStrings=[];
  let ssMap={};
  function si(val){
    const k=String(val);
    if(ssMap[k]===undefined){ssMap[k]=sharedStrings.length;sharedStrings.push(k);}
    return ssMap[k];
  }
  // Pre-register all strings
  allRows.forEach(row=>row.forEach(cell=>{ if(isNaN(cell)||cell==='')si(cell); }));

  const cellAddr=(r,c)=>String.fromCharCode(65+c)+(r+1);
  let sheetRows='';
  allRows.forEach((row,r)=>{
    let cells='';
    row.forEach((val,c)=>{
      const addr=cellAddr(r,c);
      if(val!==''&&!isNaN(val)&&val!==null&&val!==undefined){
        cells+=`<c r="${addr}"><v>${val}</v></c>`;
      } else {
        cells+=`<c r="${addr}" t="s"><v>${si(val)}</v></c>`;
      }
    });
    sheetRows+=`<row r="${r+1}">${cells}</row>`;
  });

  const sheet=`<?xml version="1.0" encoding="UTF-8"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>${sheetRows}</sheetData></worksheet>`;
  const ssXml=`<?xml version="1.0" encoding="UTF-8"?><sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="${sharedStrings.length}" uniqueCount="${sharedStrings.length}">${sharedStrings.map(s=>`<si><t xml:space="preserve">${esc(s)}</t></si>`).join('')}</sst>`;
  const wb=`<?xml version="1.0" encoding="UTF-8"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="Sheet1" sheetId="1" r:id="rId1"/></sheets></workbook>`;
  const wbRels=`<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/></Relationships>`;
  const contentTypes=`<?xml version="1.0" encoding="UTF-8"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/><Override PartName="/xl/sharedStrings.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml"/></Types>`;
  const rels=`<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`;

  // Build ZIP manually using a simple zip builder
  function strToU8(str){
    const buf=new TextEncoder().encode(str);return buf;
  }
  function u8ToBase64(u8){
    let s='';u8.forEach(b=>s+=String.fromCharCode(b));return btoa(s);
  }

  // Use a simple approach: build ZIP with stored (no compression) entries
  function makeZip(files){
    const enc=new TextEncoder();
    let localHeaders=[];
    let centralDir=[];
    let offset=0;
    const u8arr=[];

    files.forEach(({name,data})=>{
      const nameBytes=enc.encode(name);
      const dataBytes=enc.encode(data);
      // CRC32
      let crc=0xFFFFFFFF;
      for(let i=0;i<dataBytes.length;i++){
        crc^=dataBytes[i];
        for(let j=0;j<8;j++) crc=(crc&1)?(crc>>>1)^0xEDB88320:(crc>>>1);
      }
      crc^=0xFFFFFFFF;

      const localHeader=new Uint8Array(30+nameBytes.length);
      const dv=new DataView(localHeader.buffer);
      dv.setUint32(0,0x04034B50,true); // sig
      dv.setUint16(4,20,true); // version
      dv.setUint16(6,0,true); // flags
      dv.setUint16(8,0,true); // no compression
      dv.setUint16(10,0,true); dv.setUint16(12,0,true); // time/date
      dv.setUint32(14,crc,true);
      dv.setUint32(18,dataBytes.length,true);
      dv.setUint32(22,dataBytes.length,true);
      dv.setUint16(26,nameBytes.length,true);
      dv.setUint16(28,0,true);
      localHeader.set(nameBytes,30);

      const centralEntry=new Uint8Array(46+nameBytes.length);
      const cdv=new DataView(centralEntry.buffer);
      cdv.setUint32(0,0x02014B50,true);
      cdv.setUint16(4,20,true);cdv.setUint16(6,20,true);
      cdv.setUint16(8,0,true);cdv.setUint16(10,0,true);
      cdv.setUint16(12,0,true);cdv.setUint16(14,0,true);
      cdv.setUint32(16,crc,true);
      cdv.setUint32(20,dataBytes.length,true);
      cdv.setUint32(24,dataBytes.length,true);
      cdv.setUint16(28,nameBytes.length,true);
      cdv.setUint16(30,0,true);cdv.setUint16(32,0,true);
      cdv.setUint16(34,0,true);cdv.setUint16(36,0,true);
      cdv.setUint32(38,0,true);
      cdv.setUint32(42,offset,true);
      centralEntry.set(nameBytes,46);

      u8arr.push(localHeader,dataBytes);
      centralDir.push(centralEntry);
      offset+=localHeader.length+dataBytes.length;
    });

    const cdSize=centralDir.reduce((s,b)=>s+b.length,0);
    const eocd=new Uint8Array(22);
    const edv=new DataView(eocd.buffer);
    edv.setUint32(0,0x06054B50,true);
    edv.setUint16(4,0,true);edv.setUint16(6,0,true);
    edv.setUint16(8,files.length,true);edv.setUint16(10,files.length,true);
    edv.setUint32(12,cdSize,true);
    edv.setUint32(16,offset,true);
    edv.setUint16(20,0,true);

    const all=[...u8arr,...centralDir,eocd];
    const total=all.reduce((s,b)=>s+b.length,0);
    const out=new Uint8Array(total);
    let pos=0;
    all.forEach(b=>{out.set(b,pos);pos+=b.length;});
    return out;
  }

  const zipBytes=makeZip([
    {name:'[Content_Types].xml',data:contentTypes},
    {name:'_rels/.rels',data:rels},
    {name:'xl/workbook.xml',data:wb},
    {name:'xl/_rels/workbook.xml.rels',data:wbRels},
    {name:'xl/worksheets/sheet1.xml',data:sheet},
    {name:'xl/sharedStrings.xml',data:ssXml},
  ]);
  return zipBytes;
}

function downloadXlsx(filename, headers, rows){
  const bytes=makeXlsx(headers,rows);
  const blob=new Blob([bytes],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}

function importExcelProducts(input){
  const file=input.files[0];
  if(!file)return;
  const isXlsx=file.name.endsWith('.xlsx');

  if(isXlsx){
    const reader=new FileReader();
    reader.onload=async function(e){
      try{
        const rows=await parseXlsxRows(e.target.result);
        if(!rows||rows.length<2){toast('Fayl bo\'sh yoki satr topilmadi!','error');return;}
        processProductRows(rows.slice(1));
      }catch(err){
        toast('XLSX xato: '+err.message,'error');
        console.error(err);
      }
    };
    reader.readAsArrayBuffer(file);
  } else {
    const reader=new FileReader();
    reader.onload=function(e){
      const text=e.target.result.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
      const lines=text.split('\n').filter(l=>l.trim()&&!l.startsWith('('));
      if(lines.length<2){toast('Fayl bo\'sh yoki noto\'g\'ri format!','error');return;}
      const sep=lines[0].includes('\t')?'\t':',';
      const rows=lines.map(l=>l.split(sep).map(c=>c.trim().replace(/^"|"$/g,'')));
      processProductRows(rows.slice(1));
    };
    reader.readAsText(file,'UTF-8');
  }
  input.value='';
}

function parseXlsxRows(arrayBuffer){
  const bytes = new Uint8Array(arrayBuffer);
  const dv = new DataView(arrayBuffer);

  // ---- ZIP reader ----
  function readZip(){
    const files={};
    // Find End of Central Directory to locate central dir
    let eocdPos=-1;
    for(let i=bytes.length-22;i>=0;i--){
      if(dv.getUint32(i,true)===0x06054B50){eocdPos=i;break;}
    }
    if(eocdPos<0) throw new Error('ZIP EOCD not found');
    const cdOffset=dv.getUint32(eocdPos+16,true);
    const cdCount=dv.getUint16(eocdPos+10,true);
    let p=cdOffset;
    for(let n=0;n<cdCount;n++){
      if(dv.getUint32(p,true)!==0x02014B50) break;
      const fnLen=dv.getUint16(p+28,true);
      const extraLen=dv.getUint16(p+30,true);
      const cmtLen=dv.getUint16(p+32,true);
      const localOffset=dv.getUint32(p+42,true);
      const nameBytes=bytes.slice(p+46,p+46+fnLen);
      const name=new TextDecoder().decode(nameBytes);
      // Read local file header
      const lhExtraLen=dv.getUint16(localOffset+28,true);
      const dataStart=localOffset+30+fnLen+lhExtraLen;
      const compSize=dv.getUint32(localOffset+18,true);
      const compMethod=dv.getUint16(localOffset+8,true);
      if(compMethod===0){
        // Stored - no compression
        files[name]=bytes.slice(dataStart,dataStart+compSize);
      } else {
        // Deflate - use DecompressionStream if available
        files[name]={compressed:bytes.slice(dataStart,dataStart+compSize),method:compMethod,uncompSize:dv.getUint32(localOffset+22,true)};
      }
      p+=46+fnLen+extraLen+cmtLen;
    }
    return files;
  }

  async function decompressEntry(entry){
    if(entry instanceof Uint8Array) return entry;
    // Use DecompressionStream (raw deflate)
    try{
      const ds=new DecompressionStream('deflate-raw');
      const writer=ds.writable.getWriter();
      writer.write(entry.compressed);
      writer.close();
      const chunks=[];
      const reader=ds.readable.getReader();
      while(true){const{done,value}=await reader.read();if(done)break;chunks.push(value);}
      const out=new Uint8Array(entry.uncompSize);
      let off=0;chunks.forEach(c=>{out.set(c,off);off+=c.length;});
      return out;
    }catch(e){throw new Error('Deflate decompress failed: '+e.message);}
  }

  const files=readZip();

  // Return promise since decompression may be async
  return (async()=>{
    // Decompress needed files
    async function getXml(name){
      const f=files[name];
      if(!f)return null;
      const u8=await decompressEntry(f);
      return new TextDecoder().decode(u8);
    }

    // Shared strings
    let sharedStrings=[];
    const ssXml=await getXml('xl/sharedStrings.xml');
    if(ssXml){
      const matches=[...ssXml.matchAll(/<t(?:\s[^>]*)?>([^<]*)<\/t>/g)];
      sharedStrings=matches.map(m=>m[1]
        .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#xD;/g,''));
    }

    // Sheet
    const sheetXml=await getXml('xl/worksheets/sheet1.xml');
    if(!sheetXml) throw new Error('sheet1.xml topilmadi');

    // Parse rows
    const rowMatches=[...sheetXml.matchAll(/<row\b[^>]*>([\s\S]*?)<\/row>/g)];
    const result=[];
    rowMatches.forEach(rm=>{
      const cellMatches=[...rm[1].matchAll(/<c\b([^>]*)>([\s\S]*?)<\/c>/g)];
      if(!cellMatches.length)return;
      // find column addresses
      const colIdx=cm=>{
        const rAttr=(cm[1].match(/r="([A-Z]+)\d+"/)||[])[1]||'';
        return rAttr.split('').reduce((n,c)=>n*26+(c.charCodeAt(0)-64),0)-1;
      };
      const maxCol=Math.max(...cellMatches.map(colIdx));
      const cells=new Array(maxCol+1).fill('');
      cellMatches.forEach(cm=>{
        const c=colIdx(cm);
        const isStr=cm[1].includes('t="s"');
        const isInline=cm[1].includes('t="inlineStr"');
        const vMatch=cm[2].match(/<v>([^<]*)<\/v>/);
        const tMatch=cm[2].match(/<t[^>]*>([^<]*)<\/t>/);
        if(isInline&&tMatch) cells[c]=tMatch[1];
        else if(isStr&&vMatch) cells[c]=sharedStrings[parseInt(vMatch[1])]||'';
        else if(vMatch) cells[c]=vMatch[1];
      });
      result.push(cells);
    });
    return result;
  })();
}

function processProductRows(dataRows){
  const preview=[];
  const errors=[];
  dataRows.forEach((cols,i)=>{
    // A=ID(ixtiyoriy), B=Nomi, C=KirimNarx, D=SotishNarx, E=Kategoriya, F=Miqdor
    let [idCol,name,cost,price,category,stock]=cols;
    if(!name||!price){
      if(idCol||name||cost||price||category||stock)
        errors.push(`Qator ${i+2}: Nomi va Sotish narxi majburiy`);
      return;
    }
    let autoId=(idCol||'').toString().trim().toUpperCase();
    if(!autoId)autoId=generateAutoId();
    // avoid duplicate IDs
    if(products.find(p=>p.id===autoId)||preview.find(p=>p.id===autoId)){
      autoId=generateAutoId();
    }
    preview.push({id:autoId,name:String(name),cost:parseFloat(cost)||0,price:parseFloat(price)||0,category:String(category||'Boshqa'),stock:parseInt(stock)||0,_preview:true});
  });
  if(preview.length===0){toast('Kiritish uchun to\'g\'ri ma\'lumot topilmadi!','error');document.getElementById('excel-preview').style.display='none';return;}
  const errHtml=errors.length>0?`<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:12px;margin-bottom:12px;font-size:12px;color:#dc2626">${errors.map(e=>`<div>! ${e}</div>`).join('')}</div>`:'';
  const rows=preview.map(p=>`<tr><td>${badge(p.id,'purple')}</td><td style="font-weight:600">${p.name}</td><td style="color:#64748b">${fmt(p.cost)}</td><td style="color:#6366f1;font-weight:700">${fmt(p.price)}</td><td>${badge(p.category,'blue')}</td><td>${p.stock}</td></tr>`).join('');
  const previewDiv=document.getElementById('excel-preview');
  previewDiv.style.display='block';
  previewDiv.innerHTML=`
    ${errHtml}
    <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px">
      <div style="font-size:13px;font-weight:700;color:#16a34a;margin-bottom:10px">${preview.length} ta mahsulot tayyor — tasdiqlang:</div>
      <div style="overflow:auto;max-height:200px">
        <table style="width:100%"><thead><tr style="background:rgba(255,255,255,.03)"><th>ID</th><th>Nomi</th><th>Kirim narxi</th><th>Sotish narxi</th><th>Kategoriya</th><th>Miqdor</th></tr></thead>
        <tbody>${rows}</tbody></table>
      </div>
      <div class="flex gap-10" style="margin-top:12px">
        <button class="btn btn-success btn-md" onclick="confirmExcelImport()">${svgIcon('check',16)} ${preview.length} ta mahsulotni kiritish</button>
        <button class="btn btn-ghost btn-md" onclick="document.getElementById('excel-preview').style.display='none'">Bekor</button>
      </div>
    </div>`;
  window._excelImportData=preview;
}

function confirmExcelImport(){
  const list = window._excelImportData || [];
  if(!list.length)return;
  const addedItems=[];
  list.forEach(p=>{
    if(!products.find(pr=>pr.id===p.id)){
      products.push(p);
      addedItems.push({pid:p.id,name:p.name,qty:p.stock,cost:p.cost||0,price:p.price});
    }
  });
  if(addedItems.length>0){
    importHistory.push({id:genId('IMP'),date:new Date().toISOString(),by:currentUser.name,items:addedItems,source:'excel'});
  }
  save();
  toast(list.length+' ta mahsulot muvaffaqiyatli kiritildi!');
  window._excelImportData=[];
  document.getElementById('excel-preview').style.display='none';
  renderWarehouse('bulk');
}
