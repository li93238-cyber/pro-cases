<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Cases</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f8fafc;color:#1e293b;transition:background .3s,color .3s}
body.dark{background:#0f172a;color:#e2e8f0}
body.dark .topbar{background:#1e293b;border-color:#334155;box-shadow:0 2px 8px rgba(0,0,0,.3)}
body.dark .topbar-title{color:#f1f5f9}
body.dark .user-name{color:#f1f5f9}
body.dark .menu-btn{color:#94a3b8}
body.dark .card{background:#1e293b;box-shadow:0 2px 12px rgba(0,0,0,.3)}
body.dark .card-title{color:#f1f5f9}
body.dark .card-header .card-title{color:#f1f5f9}
body.dark .stat-card{background:#1e293b;box-shadow:0 2px 12px rgba(0,0,0,.3)}
body.dark .stat-card-title{color:#94a3b8}
body.dark .stat-value{color:#f1f5f9}
body.dark .stat-sub{color:#64748b}
body.dark table thead tr{background:#0f172a}
body.dark th{color:#64748b}
body.dark td{border-color:#1e293b;color:#cbd5e1}
body.dark .form-input{background:#0f172a;border-color:#334155;color:#e2e8f0}
body.dark .form-input:focus{border-color:#6366f1}
body.dark .form-label{color:#94a3b8}
body.dark .btn-outline{background:#1e293b;color:#818cf8;border-color:#6366f1}
body.dark .btn-ghost{color:#94a3b8}
body.dark .paytype-btn{background:#0f172a;border-color:#334155;color:#94a3b8}
body.dark .tab-bar{background:#1e293b}
body.dark .tab-btn{color:#64748b}
body.dark .tab-btn.active{background:#0f172a;color:#818cf8}
body.dark .summary-box{background:#0f172a}
body.dark .summary-row{color:#94a3b8}
body.dark .nakleyka{border-color:#334155}
body.dark .modal{background:#1e293b}
body.dark .modal-header{border-color:#334155}
body.dark .modal-title{color:#f1f5f9}
body.dark .overlay{background:rgba(0,0,0,.7)}
body.dark .user-card{border-color:#334155}
body.dark .low-stock-item{background:#1a1200;border-color:#854d0e}
body.dark select.form-input option{background:#0f172a}
body.dark .chart-label-val{color:#64748b}
body.dark .chart-label-day{color:#64748b}
body.dark .badge-blue{background:#1e3a5f;color:#93c5fd}
body.dark .badge-green{background:#14532d;color:#86efac}
body.dark .badge-red{background:#450a0a;color:#fca5a5}
body.dark .badge-yellow{background:#422006;color:#fcd34d}
body.dark .badge-purple{background:#2e1065;color:#c4b5fd}
body.dark .badge-gray{background:#1e293b;color:#64748b}
body.dark .warn-box{background:#422006;color:#fcd34d}
body.dark .loading-overlay{background:rgba(15,23,42,.92)}
body.dark .skeleton{background:linear-gradient(90deg,#1e293b 25%,#334155 50%,#1e293b 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
body.dark .inv-scan-box{background:#0f172a;border-color:#334155}
body.dark .inv-item-green{background:#052e16;border-color:#16a34a}
body.dark .inv-item-red{background:#2d0000;border-color:#dc2626}
body.dark .inv-item-neutral{background:#1e293b;border-color:#334155}
body.dark .price-hist-row{border-color:#334155}
body.dark .price-hist-row td{color:#94a3b8}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
body.dark ::-webkit-scrollbar-track{background:#1e293b}
body.dark ::-webkit-scrollbar-thumb{background:#475569}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes modalIn{from{transform:scale(0.95);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.app{display:flex;min-height:100vh}
/* SIDEBAR */
.sidebar{width:240px;min-height:100vh;background:linear-gradient(180deg,#1e1b4b,#312e81);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;transition:width .3s}
.sidebar.collapsed{width:70px}
.sidebar-logo{padding:20px 16px;display:flex;align-items:center;gap:12;border-bottom:1px solid rgba(255,255,255,.1)}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#a78bfa);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;flex-shrink:0}
.logo-text{color:#fff;font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden}
.nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:4}
.nav-item{background:transparent;border:none;cursor:pointer;border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.7);text-align:left;width:100%;transition:all .2s;font-size:14px;font-weight:500}
.nav-item:hover{background:rgba(99,102,241,.15);color:#a5b4fc}
.nav-item.active{background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;box-shadow:0 4px 15px rgba(99,102,241,.35)}
.nav-item span.label{white-space:nowrap;overflow:hidden}
.sidebar-bottom{padding:12px 8px;border-top:1px solid rgba(255,255,255,.1)}
/* TOPBAR */
.topbar{background:#fff;border-bottom:1px solid #f1f5f9;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:18px;font-weight:700;color:#1e293b}
.menu-btn{background:none;border:none;cursor:pointer;color:#64748b;display:flex;padding:6px;border-radius:8px}
.user-info{display:flex;align-items:center;gap:12px}
.user-name{font-size:13px;font-weight:700;color:#1e293b;text-align:right}
.user-role{font-size:11px;color:#94a3b8}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#a78bfa);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.page-content{flex:1;padding:24px;animation:fadeIn .3s ease}
/* CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);border-left:4px solid}
.stat-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.stat-card-title{font-size:13px;color:#64748b;font-weight:500}
.stat-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.stat-value{font-size:24px;font-weight:800;color:#1e293b}
.stat-sub{font-size:12px;color:#94a3b8;margin-top:4px}
/* TABLE */
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:16px;font-weight:700;color:#1e293b}
table{width:100%;border-collapse:collapse}
thead tr{background:#f8fafc}
th{padding:10px 12px;text-align:left;font-size:12px;color:#94a3b8;font-weight:600}
td{padding:10px 12px;border-bottom:1px solid #f1f5f9;font-size:13px}
/* BADGE */
.badge{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block}
.badge-blue{background:#eff6ff;color:#2563eb}
.badge-green{background:#f0fdf4;color:#16a34a}
.badge-red{background:#fef2f2;color:#dc2626}
.badge-yellow{background:#fffbeb;color:#d97706}
.badge-purple{background:#faf5ff;color:#7c3aed}
.badge-gray{background:#f8fafc;color:#64748b}
/* BTN */
.btn{border:none;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .2s;border-radius:10px}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-md{padding:10px 18px;font-size:14px}
.btn-lg{padding:14px 28px;font-size:16px}
.btn-primary{background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff}
.btn-danger{background:linear-gradient(135deg,#ef4444,#f87171);color:#fff}
.btn-success{background:linear-gradient(135deg,#22c55e,#4ade80);color:#fff}
.btn-warning{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#fff}
.btn-outline{background:#fff;color:#6366f1;border:1.5px solid #6366f1}
.btn-ghost{background:transparent;color:#64748b}
/* FORM */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:6px}
.form-input{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;color:#1e293b;background:#fff;outline:none;transition:border-color .2s;font-family:inherit}
.form-input:focus{border-color:#6366f1}
.form-input:disabled{background:#f8fafc}
.input-wrap{position:relative;display:flex;align-items:center}
.input-icon{position:absolute;left:12px;color:#94a3b8;display:flex;pointer-events:none}
.input-wrap .form-input{padding-left:38px}
.input-pw-btn{position:absolute;right:12px;background:none;border:none;cursor:pointer;color:#94a3b8;display:flex}
select.form-input{cursor:pointer}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;width:100%;max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:modalIn .2s ease}
.modal-header{padding:20px 24px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:18px;font-weight:700;color:#1e293b}
.modal-close{background:none;border:none;cursor:pointer;color:#94a3b8;padding:4px;border-radius:6px;display:flex;align-items:center}
.modal-body{padding:24px}
/* TOAST */
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:10px;color:#fff;font-size:14px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.15);animation:slideIn .3s ease;display:flex;align-items:center;gap:8px}
.toast-success{background:#22c55e}
.toast-error{background:#ef4444}
.toast-info{background:#3b82f6}
/* LOGIN */
.login-page{min-height:100vh;background:linear-gradient(135deg,#1e1b4b,#312e81,#4338ca);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.login-bubble{position:absolute;border-radius:50%;background:rgba(255,255,255,.04)}
.login-card{background:rgba(255,255,255,.98);border-radius:24px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 25px 80px rgba(0,0,0,.4);position:relative;animation:modalIn .4s ease}
.login-logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#6366f1,#a78bfa);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 24px rgba(99,102,241,.4);color:#fff;font-size:30px;font-weight:800}
.login-title{text-align:center;margin-bottom:32px}
.login-h1{font-size:26px;font-weight:800;color:#1e293b;margin-bottom:8px}
.login-sub{color:#64748b;font-size:14px}
/* CASHIER */
.cashier-grid{display:grid;grid-template-columns:1fr 360px;gap:20px;min-height:calc(100vh - 112px)}
.cart-table-wrap{flex:1;overflow:auto}
.pay-panel{display:flex;flex-direction:column;gap:14px}
.summary-box{background:#f8fafc;border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:8px}
.summary-row{display:flex;justify-content:space-between;font-size:13px;color:#64748b}
.summary-total{display:flex;justify-content:space-between;font-size:18px;font-weight:800;color:#6366f1}
.paytype-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.paytype-btn{padding:10px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#64748b;transition:all .2s;font-family:inherit}
.paytype-btn.active-naqd{border-color:#22c55e;background:#f0fdf4;color:#16a34a}
.paytype-btn.active-karta{border-color:#3b82f6;background:#eff6ff;color:#2563eb}
.paytype-btn.active-aralash{border-color:#f59e0b;background:#fffbeb;color:#d97706}
.paytype-btn.active-avto{border-color:#8b5cf6;background:#faf5ff;color:#7c3aed}
/* TOGGLE */
.toggle-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.toggle{width:52px;height:28px;border-radius:14px;border:none;cursor:pointer;position:relative;transition:all .3s}
.toggle-knob{position:absolute;top:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .3s;box-shadow:0 2px 4px rgba(0,0,0,.2)}
/* CHART */
.chart-wrap{display:flex;align-items:flex-end;gap:8px;height:160px}
.chart-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.chart-bar{width:100%;border-radius:6px 6px 0 0;transition:height .5s ease}
.chart-label-val{font-size:10px;color:#94a3b8;font-weight:500}
.chart-label-day{font-size:11px;color:#64748b;font-weight:500}
/* TABS */
.tab-bar{display:flex;gap:4px;background:#f1f5f9;border-radius:12px;padding:4px}
.tab-btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:transparent;color:#64748b;transition:all .2s;font-family:inherit}
.tab-btn.active{background:#fff;color:#6366f1;box-shadow:0 2px 8px rgba(0,0,0,.08)}
/* LOW STOCK */
.low-stock-item{background:#fffbeb;border:1px solid #fcd34d;border-radius:10px;padding:8px 14px;display:inline-flex;align-items:center;gap:8px;margin:4px}
/* RECEIPT */
.receipt{font-family:monospace}
.receipt-header{text-align:center;margin-bottom:16px}
.receipt-items{border-top:1px dashed #ccc;border-bottom:1px dashed #ccc;padding:12px 0;margin-bottom:12px}
.receipt-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
/* USER CARDS */
.user-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.user-card{border:1.5px solid #f1f5f9;border-radius:14px;padding:20px;transition:box-shadow .2s;cursor:default}
.user-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08)}
/* NAKLEYKA */
.nakleyka{border:2px dashed #e2e8f0;border-radius:12px;padding:20px;text-align:center;margin-bottom:16px}
/* WARN BOX */
.warn-box{font-size:12px;color:#f59e0b;margin:0 0 16px;background:#fffbeb;padding:8px 12px;border-radius:8px}
/* INVENTORY */
.inv-scan-box{background:#f8fafc;border:2px solid #e2e8f0;border-radius:14px;padding:20px;margin-bottom:16px}
.inv-item-green{background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.inv-item-red{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.inv-item-neutral{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.price-hist-row td{padding:8px 12px;border-bottom:1px solid #f1f5f9;font-size:13px}
/* DIVIDER */
.divider{height:1px;background:#e2e8f0;margin:8px 0}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-8{gap:8px}.gap-10{gap:10px}.gap-12{gap:12px}.gap-16{gap:16px}.flex-1{flex:1}.wrap{flex-wrap:wrap}
.hidden{display:none}
.text-center{text-align:center}
.mt-auto{margin-top:auto}
.w-full{width:100%}
.two-cols{display:grid;grid-template-columns:2fr 1fr;gap:16px}
/* LOADING */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:spin .7s linear infinite}
.spinner-sm{width:18px;height:18px;border-width:2px}
.skeleton{background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
body.dark .skeleton{background:linear-gradient(90deg,#1e293b 25%,#334155 50%,#1e293b 75%);background-size:200% 100%}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;backdrop-filter:blur(3px)}
body.dark .loading-overlay{background:rgba(15,23,42,.88)}
.loading-text{font-size:14px;font-weight:600;color:#6366f1;animation:pulse 1.5s ease-in-out infinite}
.page-content{animation:slideUp .28s ease}
.stat-card{animation:scaleIn .3s ease both}
.stat-card:nth-child(1){animation-delay:.04s}
.stat-card:nth-child(2){animation-delay:.08s}
.stat-card:nth-child(3){animation-delay:.12s}
.stat-card:nth-child(4){animation-delay:.16s}
.card{animation:scaleIn .25s ease both}
.modal{animation:scaleIn .18s ease}
/* BTN loading state */
.btn-loading{position:relative;pointer-events:none;opacity:.8}
.btn-loading::after{content:'';position:absolute;right:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
body.dark .loading-overlay{background:rgba(15,23,42,.9)}
/* Page transition */
.page-transition{animation:fadeIn .22s ease}
.chat-fab{position:fixed;bottom:24px;right:24px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#818cf8);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 4px 20px rgba(99,102,241,.4);z-index:500;transition:transform .2s}
.chat-fab:hover{transform:scale(1.08)}
.chat-badge{position:absolute;top:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:#ef4444;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #fff}
.chat-panel{position:fixed;bottom:88px;right:24px;width:340px;height:480px;background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.18);z-index:500;display:flex;flex-direction:column;animation:modalIn .2s ease}
body.dark .chat-panel{background:#1e293b;border:1px solid #334155}
.chat-header{padding:14px 18px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:15px}
body.dark .chat-header{border-color:#334155}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.chat-msg{max-width:80%;padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.4}
.chat-msg-me{background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.chat-msg-other{background:#f1f5f9;color:#1e293b;align-self:flex-start;border-bottom-left-radius:4px}
body.dark .chat-msg-other{background:#0f172a;color:#e2e8f0}
.chat-msg-name{font-size:10px;font-weight:700;margin-bottom:2px;opacity:.7}
.chat-msg-time{font-size:10px;margin-top:3px;opacity:.6;text-align:right}
.chat-input-row{padding:10px;border-top:1px solid #f1f5f9;display:flex;gap:6px}
body.dark .chat-input-row{border-color:#334155}
.chat-input{flex:1;padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;background:#fff;color:#1e293b;outline:none;font-family:inherit}
body.dark .chat-input{background:#0f172a;border-color:#334155;color:#e2e8f0}
.chat-to-btn{font-size:11px;padding:3px 9px;border-radius:12px;border:1.5px solid #e2e8f0;background:#f8fafc;color:#64748b;cursor:pointer;font-weight:600;transition:all .15s}
.chat-to-btn.active{border-color:#6366f1;background:#eff6ff;color:#6366f1}
body.dark .chat-to-btn{background:#0f172a;border-color:#334155;color:#94a3b8}
body.dark .chat-to-btn.active{border-color:#6366f1;background:#1e1b4b;color:#818cf8}
/* SMENA */
.smena-stat{background:#f8fafc;border-radius:12px;padding:16px;text-align:center;margin-bottom:12px}
body.dark .smena-stat{background:#0f172a}

<script>
// ===== LOCALSTORAGE STORAGE =====
// Default permissions for cashier role
const DEFAULT_PERMS = {
  dashboard:true, cashier:true, orders:true, warehouse:false, inventory:false, operations:false,
  warehouse_add:false, warehouse_bulk:false, warehouse_delete:false, warehouse_edit:false,
  orders_return:true, expenses_add:false, expenses_delete:false
};
const ADMIN_PERMS = {
  dashboard:true,cashier:true,orders:true,warehouse:true,inventory:true,operations:true,
  warehouse_add:true,warehouse_bulk:true,warehouse_delete:true,warehouse_edit:true,
  orders_return:true,expenses_add:true,expenses_delete:true
};
const DEFAULT_USERS = [
  {id:1,name:"Admin",login:"admin",password:"admin123",role:"admin",avatar:"A",mustChangePw:false,perms:ADMIN_PERMS},
  {id:2,name:"Kassir Aziz",login:"aziz",password:"aziz123",role:"cashier",avatar:"K",mustChangePw:false,perms:{...DEFAULT_PERMS,cashier:true,dashboard:true,orders:true}}
];
const DEFAULT_PRODUCTS = [
  {id:"P001",name:"Coca-Cola 0.5L",price:8000,category:"Ichimliklar",stock:120},
  {id:"P002",name:"Non",price:3000,category:"Oziq-ovqat",stock:50},
  {id:"P003",name:"Suv 1.5L",price:5000,category:"Ichimliklar",stock:80},
  {id:"P004",name:"Sut 1L",price:12000,category:"Oziq-ovqat",stock:30},
  {id:"P005",name:"Shaker",price:25000,category:"Texnika",stock:10}
];
const DEFAULT_ORDERS = [];
const DEFAULT_EXPENSES = [];
const DEFAULT_CATEGORIES = ["Oziq-ovqat","Ichimliklar","Texnika","Kiyim","Boshqa"];

const DEFAULT_EXP_CATS = ['Ijara','Elektr','Sув','Ish haqi','Transport','Oziq-ovqat','Boshqa'];

// ============================================================
//  GAS API LAYER — fetch() orqali (GitHub Pages dan tashqi API chaqirish)
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxRjl0FvZm2iUTWkTNHQsL9VWmTPWtmKtohAEW98RF92tEOXZEk9oGzsbnbin1wKqtpFg/exec';

async function gasCall(action, payload={}) {
  if (!GAS_URL) throw new Error('GAS_URL sozlanmagan');
  const formData = new FormData();
  formData.append('action', action);
  formData.append('payload', JSON.stringify(payload));
  const res = await fetch(GAS_URL, { method: 'POST', body: formData, redirect: 'follow' });
  const text = await res.text();
  if (text.trim().startsWith('<')) {
    console.error('GAS HTML response:', text.slice(0,200));
    throw new Error('GAS noto\'g\'ri javob qaytardi. Deploy sozlamalarini tekshiring.');
  }
  let json;
  try { json = JSON.parse(text); }
  catch(e) { throw new Error('GAS javob JSON emas: ' + text.slice(0,100)); }
  if (!json.ok) throw new Error(json.error || 'GAS xatosi');
  return json.data;
}

// Local cache uchun (sahifa render qilishda foydalaniladi)
function lsGet(key, def) {
  return (window._gasData && window._gasData[key] !== undefined) ? window._gasData[key] : def;
}
function lsSet(key, val) {
  if (!window._gasData) window._gasData = {};
  window._gasData[key] = val;
}

let users     = DEFAULT_USERS;
let products  = DEFAULT_PRODUCTS;
let orders    = DEFAULT_ORDERS;
let expenses  = DEFAULT_EXPENSES;
let categories= DEFAULT_CATEGORIES;
let inventories = [];
let priceHistory = [];
let expCats   = DEFAULT_EXP_CATS;
let chatMessages = [];
let smenas    = []; // [{id, openTime, openBy, closeTime, closeBy, faktual, diff, note}]
let debts     = []; // [{id, customerName, phone, workplace, amount, paidAmount, note, items, date, by, status, smenaId, paidDate}]
let damages   = []; // [{id, pid, name, amount, note, date, by, smenaId}]
let payTypes  = [
  {id:'naqd',name:'Naqd',color:'#22c55e'},
  {id:'karta',name:'Karta',color:'#3b82f6'},
  {id:'aralash',name:'Aralash',color:'#f59e0b'},
  {id:'avto',name:'Avto',color:'#8b5cf6'}
];

// Faol smena ID — GAS dan ma'lumot kelgandan keyin DOMContentLoaded da o'rnatiladi
let currentSmenaId = null;

let _savePending = {};
let _saveTimer = null;

function save(sections=null) {
  // Local cache yangilash (darhol UI uchun)
  lsSet('users', users); lsSet('products', products); lsSet('orders', orders);
  lsSet('expenses', expenses); lsSet('categories', categories);
  lsSet('inventories', inventories); lsSet('priceHistory', priceHistory);
  lsSet('expCats', expCats); lsSet('smenas', smenas);
  lsSet('currentSmenaId', currentSmenaId); lsSet('debts', debts);
  lsSet('damages', damages); lsSet('payTypes', payTypes);

  const toSave = sections || ['users','products','orders','expenses','categories','inventories','priceHistory','expCats','smenas','meta','debts','damages','payTypes'];
  toSave.forEach(s => { _savePending[s] = true; });

  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(flushSave, 400);
}

async function flushSave() {
  const pending = {..._savePending};
  _savePending = {};
  const promises = [];
  if(pending.users)        promises.push(gasCall('saveUsers', users));
  if(pending.products)     promises.push(gasCall('saveProducts', products));
  if(pending.orders)       promises.push(gasCall('saveOrders', orders));
  if(pending.expenses)     promises.push(gasCall('saveExpenses', expenses));
  if(pending.categories)   promises.push(gasCall('saveCategories', categories));
  if(pending.expCats)      promises.push(gasCall('saveExpCats', expCats));
  if(pending.inventories)  promises.push(gasCall('saveInventories', inventories));
  if(pending.priceHistory) promises.push(gasCall('savePriceHistory', priceHistory));
  if(pending.smenas)       promises.push(gasCall('saveSmenas', smenas));
  if(pending.debts)        promises.push(gasCall('saveDebts', debts));
  if(pending.damages)      promises.push(gasCall('saveDamages', damages));
  if(pending.payTypes)     promises.push(gasCall('savePayTypes', payTypes));
  if(pending.meta)         promises.push(gasCall('saveMeta', {currentSmenaId}));
  try {
    showSyncIndicator('saving');
    await Promise.all(promises);
    showSyncIndicator('saved');
  } catch(e) {
    console.error('Save error:', e);
    showSyncIndicator('error');
  }
}

function showSyncIndicator(state) {
  let el = document.getElementById('sync-indicator');
  if (!el) return;
  if (state === 'saved') {
    el.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg> Saqlandi';
    el.style.color = '#16a34a';
    setTimeout(() => { if(el) el.innerHTML = ''; }, 2000);
  } else if (state === 'saving') {
    el.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin .6s linear infinite"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg> Saqlanmoqda...';

    currentUser=u;

let autoSyncInterval=null;
function startAutoSync(){
  if(!GAS_URL)return;
  if(autoSyncInterval)clearInterval(autoSyncInterval);
  autoSyncInterval=setInterval(async ()=>{
    if(!currentUser)return;
    try{
      const allData=await gasCall('loadAll');
      users=allData.users||users; products=allData.products||products;
      orders=allData.orders||orders; expenses=allData.expenses||expenses;
      categories=allData.categories||categories; expCats=allData.expCats||expCats;
      inventories=allData.inventories||inventories; priceHistory=allData.priceHistory||priceHistory;
      smenas=allData.smenas||smenas; debts=allData.debts||debts; damages=allData.damages||damages;
      payTypes=(allData.payTypes&&allData.payTypes.length)?allData.payTypes:payTypes;
      if((allData.meta||{}).currentSmenaId) currentSmenaId=allData.meta.currentSmenaId;
      // Joriy ko'rinayotgan sahifani qayta render qilish (foydalanuvchi ish jarayonini buzmasdan)
      const activePage=(document.querySelector('.nav-item.active')||{}).dataset.page;
      if(activePage && !['cashier'].includes(activePage)){
        // Kassa sahifasini qayta render qilmaymiz (savat tozalanib qolmasligi uchun)
        const skipPages=['cashier'];
        if(!skipPages.includes(activePage)){
          switch(activePage){
            case'dashboard':renderDashboard();break;
            case'orders':renderOrders();break;
            case'warehouse':renderWarehouse();break;
            case'inventory':renderInventoryList();break;
            case'operations':renderOperations();break;
            case'users':renderUsers();break;
            case'debts':renderDebtsPage();break;
          }
        }
      }
    }catch(e){console.warn('AutoSync error',e);}
  },20000);
}

// ===== REVENUE HELPERS =====
// Haqiqiy tushum: yopilgan smenalar faktual + joriy smena savdo (qaytarilgansiz)
function calcRealRevenue(orderList){
  let rev=0;
  // Yopilgan smena bo'yicha: o'sha smena faktual summasini ishlatamiz
  const closedSmenaIds=new Set(smenas.filter(s=>s.closed).map(s=>s.id));
  // Joriy smena orderlari uchun: to'liq sotilgan summa (qaytarilgan AYIRILMAYDI)
  // Chunki qaytarish — pul kassadan chiqmaydi, faqat tovar qaytadi.
  // Kassadan pul chiqishi faqat "Harajat > Qaytarish" orqali alohida amalga oshiriladi.
  orderList.forEach(o=>{
    if(closedSmenaIds.has(o.smenaId)){
      // Bu smena uchun faktual hisob alohida — smena darajasida (quyida qo'shiladi)
    } else {
      // Joriy/ochiq smena — to'liq sotilgan summa, qaytarilgan ayirilmaydi
      rev+=o.total;
    }
  });
  // Yopilgan smenalar uchun faktual qo'shamiz (faqat shu orderlar tegishli smena faktual)
  const smenaMap={};
  smenas.filter(s=>s.closed&&s.faktual!=null).forEach(s=>{smenaMap[s.id]=s;});
  // Qaysi smena orderlar bor? Orderlar ichida yopilgan smena ID lari
  const coveredSmenas=new Set();
  orderList.forEach(o=>{if(closedSmenaIds.has(o.smenaId))coveredSmenas.add(o.smenaId);});
  coveredSmenas.forEach(sid=>{if(smenaMap[sid])rev+=smenaMap[sid].faktual;});
  return rev;
}

// Savdo summasi (sotilgan summa, qaytarilganni hisobga olmasdan — kassa qoldiqqa mos)
function orderNetTotal(o){
  return o.total;
}

// ===== QR KAMERA SKANER (mobil/desktop kamera orqali QR o'qish) =====
let _qrStream=null;
let _qrAnimFrame=null;

async function openQrScanner(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    toast('Bu qurilma/brauzer kamerani qo\'llamaydi!','error');
    return;
  }
  openModal('QR kod skanerlash',`
    <div style="position:relative;border-radius:14px;overflow:hidden;background:#000;aspect-ratio:1/1;max-width:360px;margin:0 auto">
      <video id="qr-video" playsinline autoplay muted style="width:100%;height:100%;object-fit:cover"></video>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none">
        <div style="width:70%;height:70%;border:3px solid #6366f1;border-radius:16px;box-shadow:0 0 0 9999px rgba(0,0,0,.35)"></div>
      </div>
      <canvas id="qr-canvas" style="display:none"></canvas>
    </div>
    <div id="qr-status" style="text-align:center;margin-top:14px;font-size:13px;color:#64748b">Kamerani QR kodga qarating...</div>
    <button class="btn btn-ghost btn-md w-full" style="justify-content:center;margin-top:12px" onclick="closeQrScanner()">Yopish</button>
  `,400);
  try{
    _qrStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const video=document.getElementById('qr-video');
    if(!video){stopQrStream();return;}
    video.srcObject=_qrStream;
    await video.play();
    scanQrFrame();
  }catch(e){
    console.error('Camera error:',e);
    const st=document.getElementById('qr-status');
    if(st){st.textContent='Kameraga ruxsat berilmadi yoki kamera topilmadi.';st.style.color='#ef4444';}
  }
}

function scanQrFrame(){
  const video=document.getElementById('qr-video');
  const canvas=document.getElementById('qr-canvas');
  if(!video||!canvas||!_qrStream){return;}
  if(video.readyState===video.HAVE_ENOUGH_DATA){
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    try{
      const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
      if(typeof jsQR==='function'){
        const code=jsQR(imgData.data,imgData.width,imgData.height);
        if(code&&code.data){
          onQrDetected(code.data);
          return;
        }
      }
    }catch(e){}
  }
  _qrAnimFrame=requestAnimationFrame(scanQrFrame);
}

function onQrDetected(text){
  playBeep('success');
  const st=document.getElementById('qr-status');
  if(st){st.textContent='Topildi: '+text;st.style.color='#16a34a';}
  const inp=document.getElementById('id-input');
  if(inp){
    inp.value=text.trim();
  }
  stopQrStream();
  setTimeout(()=>{
    closeModal();
    addToCart();
  },350);
}

function stopQrStream(){
  if(_qrAnimFrame){cancelAnimationFrame(_qrAnimFrame);_qrAnimFrame=null;}
  if(_qrStream){
    _qrStream.getTracks().forEach(t=>t.stop());
    _qrStream=null;
  }
}

function closeQrScanner(){
  stopQrStream();
  closeModal();
}

function addToCart(autoTrigger=false){
  if(autoTrigger && !autoMode) return;
  const inp=document.getElementById('id-input');
  const id=((inp||{}).value||'').trim();
  if(!id)return;
  const p=products.find(pr=>pr.id.toLowerCase()===id.toLowerCase());
  if(!p){toast('Mahsulot topilmadi: '+id,'error');playBeep('error');inp.value='';return;}
  if(p.stock<=0){toast('Mahsulot tugagan!','error');playBeep('error');inp.value='';return;}
  const ex=cart.findIndex(i=>i.pid===p.id);
  if(ex>=0)cart[ex].qty++;
  else cart.push({pid:p.id,name:p.name,price:p.price,qty:1});
  inp.value='';
  playBeep('success');
  const ca=document.getElementById('cart-area');
  if(ca)ca.innerHTML=renderCartTable();
  updateSummary();
  if(autoMode)inp.focus();
}

function changeQty(i,d){
  if(cart[i].qty+d<1)return;
  cart[i].qty+=d;
  const ca=document.getElementById('cart-area');
  if(ca)ca.innerHTML=renderCartTable();
  updateSummary();
}

function removeCart(i){
  cart.splice(i,1);
  const ca=document.getElementById('cart-area');
  if(ca)ca.innerHTML=renderCartTable();
  updateSummary();
}

function clearCart(){cart=[];const ca=document.getElementById('cart-area');if(ca)ca.innerHTML=renderCartTable();updateSummary();}

function addPayType(){
  const name=((document.getElementById('new-paytype-name')||{}).value||'').trim();
  const color=(document.getElementById('new-paytype-color')||{}).value||'#6366f1';
  if(!name){toast('Nomi kiritilmagan!','error');return;}
  const id=name.toLowerCase().replace(/[^a-z0-9а-яёўқғҳ]+/gi,'_').replace(/^_+|_+$/g,'')||'pt'+Date.now();
  if(payTypes.find(pt=>pt.id===id)){toast('Bu nom bilan to\'lov turi mavjud!','error');return;}
  payTypes.push({id,name,color});
  save();
  toast('To\'lov turi qo\'shildi!');
  openPayTypesModal();
}

function deletePayType(id){
  if(payTypes.length<=1){toast('Kamida 1 ta to\'lov turi bo\'lishi kerak!','error');return;}
  const inUse=orders.some(o=>o.payType===id);
  if(inUse){toast('Bu to\'lov turi buyurtmalarda ishlatilgan, o\'chirib bo\'lmaydi!','error');return;}
  if(!confirm('Bu to\'lov turini o\'chirishni tasdiqlaysizmi?'))return;
  payTypes=payTypes.filter(pt=>pt.id!==id);
  save();
  toast('To\'lov turi o\'chirildi!','error');
  openPayTypesModal();
}

function doSell(){
  if(cart.length===0){toast('Savat bo\'m-bo\'sh!','error');return;}
  const disc=parseInt((document.getElementById('discount-input')||{}).value||0)||0;
  const sub=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const da=Math.round(sub*(disc/100));
  const total=sub-da;
  if(currentPayType==='aralash'){
    const c=parseFloat((document.getElementById('cash-paid')||{}).value)||0;
    const k=parseFloat((document.getElementById('card-paid')||{}).value)||0;
    if(c+k<total){toast('To\'lov yetarli emas!','error');return;}
  }
  const oid=genId('ORD');
  orders.push({id:oid,date:new Date().toISOString(),items:cart.map(i=>({...i})),total,discount:da,payType:currentPayType,cashier:currentUser.name,returnedItems:[],smenaId:currentSmenaId});
  products=products.map(p=>{const ci=cart.find(i=>i.pid===p.id);return ci?{...p,stock:p.stock-ci.qty}:p;});
  save();
  const receipt={id:oid,items:cart.map(i=>({...i})),total,discount:da,payType:currentPayType,date:new Date().toISOString(),cashier:currentUser.name};
  cart=[];
  toast('Sotuv muvaffaqiyatli amalga oshirildi!');
  showReceipt(receipt);
  renderCashier();
}

function showReceipt(r){
  const itemRows=r.items.map(i=>`<div class="receipt-row"><span>${i.name} x${i.qty}</span><span>${fmt(i.price*i.qty)}</span></div>`).join('');
  openModal('Chek',`
    <div class="receipt">
      <div class="receipt-header">
        <div style="font-size:18px;font-weight:800">PRO CASES</div>
        <div style="font-size:12px;color:#64748b">${fmtDate(r.date)}</div>
        <div style="font-size:12px;color:#64748b">Chek: ${r.id}</div>
        <div style="font-size:12px;color:#64748b">Kassir: ${r.cashier}</div>
      </div>
      <div class="receipt-items">${itemRows}</div>
      ${r.discount>0?`<div class="receipt-row" style="color:#ef4444"><span>Chegirma:</span><span>-${fmt(r.discount)}</span></div>`:''}
      <div class="receipt-row" style="font-size:16px;font-weight:800;margin-top:8px"><span>JAMI:</span><span>${fmt(r.total)}</span></div>
      <div style="text-align:center;margin-top:16px;font-size:12px;color:#64748b">To'lov: ${getPayTypeName(r.payType)} | Rahmat!</div>
      <button class="btn btn-primary btn-md w-full" style="justify-content:center;margin-top:16px" onclick="window.print()">${svgIcon('print',16)} Chop etish</button>

// ===== ORDERS =====
function renderOrders(opts={}){
  if(typeof opts==='string') opts={search:opts};
  const search=opts.search||'';
  const fromDate=opts.fromDate||'';
  const toDate=opts.toDate||'';
  const status=opts.status||'';
  const cassirF=opts.cassirF||'';
  const cashierList=[...new Set(orders.map(o=>o.cashier))];
  let filtered=[...orders].reverse();
  if(search) filtered=filtered.filter(o=>o.id.includes(search.toUpperCase())||o.cashier.toLowerCase().includes(search.toLowerCase()));
  if(fromDate){const fd=new Date(fromDate);filtered=filtered.filter(o=>new Date(o.date)>=fd);}
  if(toDate){const td=new Date(toDate);td.setHours(23,59,59);filtered=filtered.filter(o=>new Date(o.date)<=td);}
  if(cassirF) filtered=filtered.filter(o=>o.cashier===cassirF);
  if(status==='active') filtered=filtered.filter(o=>!(o.returnedItems||{}).length);
  else if(status==='partial') filtered=filtered.filter(o=>(o.returnedItems||{}).length>0&&!o.items.every(item=>(o.returnedItems||[]).filter(r=>r.pid===item.pid).reduce((s,r)=>s+r.qty,0)>=item.qty));
  else if(status==='returned') filtered=filtered.filter(o=>(o.returnedItems||{}).length>0&&o.items.every(item=>(o.returnedItems||[]).filter(r=>r.pid===item.pid).reduce((s,r)=>s+r.qty,0)>=item.qty));

  const rows=filtered.map(o=>{
    const allRet=(o.returnedItems||{}).length>0&&o.items.every(item=>{
      const rq=(o.returnedItems||[]).filter(r=>r.pid===item.pid).reduce((s,r)=>s+r.qty,0);
      return rq>=item.qty;
    });
    const retAmt=(o.returnedItems||[]).reduce((s,r)=>s+r.price*r.qty,0);
    const netAmt=o.total-retAmt;
    const statusBadge=allRet?badge('Qaytarilgan','red'):((o.returnedItems||{}).length>0?badge('Qisman','yellow'):badge('Faol','green'));
    const retBtn=!allRet&&hasPerm('orders_return')?`<button class="btn btn-outline btn-sm" onclick="openReturnModal('${o.id}')">${svgIcon('ret',14)} Qaytarish</button>`:'';
    const itemCount=o.items.length;

    // Har bir mahsulot uchun alohida qator
    return o.items.map((item,idx)=>{
      const itemRetEntries=(o.returnedItems||[]).filter(r=>r.pid===item.pid);
      const itemRet=itemRetEntries.reduce((s,r)=>s+r.qty,0);
      const hasUnexpensed=itemRetEntries.some(r=>!r.expensed);
      const hasExpensed=itemRetEntries.some(r=>r.expensed);
      const itemTotal=item.price*item.qty;
      const isFirst=idx===0;
      let retLabel='';
      if(itemRet>0){
        if(hasUnexpensed) retLabel=` · <span style="color:#ef4444">${itemRet} ta qaytarilgan (kassadan ayrilmagan)</span>`;
        else if(hasExpensed) retLabel=` · <span style="color:#16a34a">${itemRet} ta qaytarilgan (kassadan ayrilgan)</span>`;
      }
      return`<tr style="${idx>0?'border-top:1px dashed #f1f5f9':''}">
        ${isFirst?`<td rowspan="${itemCount}" style="color:#6366f1;font-weight:700;vertical-align:top">${o.id}</td>`:''}
        ${isFirst?`<td rowspan="${itemCount}" style="color:#64748b;vertical-align:top">${fmtDate(o.date)}</td>`:''}
        ${isFirst?`<td rowspan="${itemCount}" style="vertical-align:top">${o.cashier}</td>`:''}
        <td>
          <div style="font-weight:600;font-size:13px">${item.name}</div>
          <div style="font-size:11px;color:#94a3b8">${item.pid} · ${item.qty} ta × ${fmt(item.price)}${retLabel}</div>
        </td>
        <td style="font-weight:700">${fmt(itemTotal)}</td>
        ${isFirst?`<td rowspan="${itemCount}" style="vertical-align:top">${badge(getPayTypeName(o.payType),o.payType==='naqd'?'green':o.payType==='karta'?'blue':'yellow')}</td>`:''}
        ${isFirst?`<td rowspan="${itemCount}" style="color:#ef4444;font-size:13px;vertical-align:top">${retAmt>0?'−'+fmt(retAmt):'—'}</td>`:''}
        ${isFirst?`<td rowspan="${itemCount}" style="font-weight:700;color:#16a34a;vertical-align:top">${fmt(netAmt)}</td>`:''}
        ${isFirst?`<td rowspan="${itemCount}" style="vertical-align:top">${statusBadge}</td>`:''}
        ${isFirst?`<td rowspan="${itemCount}" style="vertical-align:top">${retBtn}</td>`:''}
      </tr>`;
    }).join('');
  }).join('');

  const curOpts=JSON.stringify({search,fromDate,toDate,status,cassirF}).replace(/"/g,'&quot;');
  document.getElementById('page-content').innerHTML=`
    <div class="card" style="margin-bottom:16px;padding:14px">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:10px;align-items:end;flex-wrap:wrap">
        <div>
          <div class="form-label" style="margin-bottom:4px">Qidirish</div>
          <input class="form-input" placeholder="ID yoki kassir..." value="${search}" oninput="renderOrders({search:this.value,fromDate:'${fromDate}',toDate:'${toDate}',status:'${status}','cassirF':'${cassirF}'})" />
        </div>
        <div>
          <div class="form-label" style="margin-bottom:4px">Boshlanish sanasi</div>
          <input type="date" class="form-input" value="${fromDate}" onchange="renderOrders({search:'${search}',fromDate:this.value,toDate:'${toDate}',status:'${status}','cassirF':'${cassirF}'})" />
        </div>
        <div>
          <div class="form-label" style="margin-bottom:4px">Tugash sanasi</div>
          <input type="date" class="form-input" value="${toDate}" onchange="renderOrders({search:'${search}',fromDate:'${fromDate}',toDate:this.value,status:'${status}','cassirF':'${cassirF}'})" />
        </div>
        <div>
          <div class="form-label" style="margin-bottom:4px">Kassir</div>
          <select class="form-input" onchange="renderOrders({search:'${search}',fromDate:'${fromDate}',toDate:'${toDate}',status:'${status}','cassirF':this.value})">
            <option value="">Barchasi</option>
            ${cashierList.map(c=>`<option value="${c}"${c===cassirF?' selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <div>
          <div class="form-label" style="margin-bottom:4px">Holat</div>
          <select class="form-input" onchange="renderOrders({search:'${search}',fromDate:'${fromDate}',toDate:'${toDate}',status:this.value,'cassirF':'${cassirF}'})">
            <option value="">Barchasi</option>
            <option value="active"${status==='active'?' selected':''}>Faol</option>
            <option value="partial"${status==='partial'?' selected':''}>Qisman qaytarilgan</option>
            <option value="returned"${status==='returned'?' selected':''}>To'liq qaytarilgan</option>
          </select>
        </div>
      </div>
      ${fromDate||toDate||status||cassirF?`<div style="margin-top:10px"><button class="btn btn-ghost btn-sm" onclick="renderOrders()">Filtrlarni tozalash</button> <span class="badge badge-blue">${filtered.length} ta natija</span></div>`:''}
    </div>
    <div class="card"><div style="overflow:auto"><table><thead><tr><th>ID</th><th>Sana</th><th>Kassir</th><th>Mahsulot</th><th>Mahsulot summasi</th><th>To'lov</th><th>Qaytarilgan</th><th>Sof summa</th><th>Holat</th><th></th></tr></thead>
    <tbody>${rows||'<tr><td colspan="10" style="text-align:center;padding:20px;color:#94a3b8">Buyurtmalar yo\'q</td></tr>'}</tbody></table></div></div>`;
}

function openReturnModal(oid){
  const order=orders.find(o=>o.id===oid);
  if(!order)return;
  returnOrderId=oid;
  const rows=order.items.map(item=>{
    const alrRet=(order.returnedItems||[]).filter(r=>r.pid===item.pid).reduce((s,r)=>s+r.qty,0);
    const maxRet=item.qty-alrRet;
    return`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f1f5f9">
      <input type="checkbox" id="ret-chk-${item.pid}" ${maxRet<=0?'disabled':''} onchange="toggleRetQty('${item.pid}')" style="width:18px;height:18px;cursor:pointer" />
      <div style="flex:1"><div style="font-size:14px;font-weight:600">${item.name}</div><div style="font-size:12px;color:#94a3b8">Sotilgan: ${item.qty} | Qaytarish mumkin: ${maxRet}</div></div>
      <input type="number" id="ret-qty-${item.pid}" min="1" max="${maxRet}" value="1" style="width:60px;padding:6px 8px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;display:none" />
    </div>`;
  }).join('');
  openModal('Mahsulot qaytarish',`
    <p style="margin:0 0 16px;color:#64748b;font-size:14px">Chek: <b>${order.id}</b></p>
    ${rows}
    <div class="flex gap-10" style="margin-top:20px">
      <button class="btn btn-warning btn-md" onclick="doReturn()">${svgIcon('ret',16)} Qaytarish</button>
      <button class="btn btn-ghost btn-md" onclick="closeModal()">Bekor qilish</button>
    </div>`);
}

function toggleRetQty(pid){
  const chk=document.getElementById('ret-chk-'+pid);
  const qty=document.getElementById('ret-qty-'+pid);
  if(qty)qty.style.display=chk.checked?'block':'none';
}

function doReturn(){
  const order=orders.find(o=>o.id===returnOrderId);
  if(!order)return;
  const toReturn=order.items.filter(item=>{
    const chk=document.getElementById('ret-chk-'+item.pid);
    return chk&&chk.checked&&!chk.disabled;
  }).map(item=>{
    const qEl=document.getElementById('ret-qty-'+item.pid);
    const alrRet=(order.returnedItems||[]).filter(r=>r.pid===item.pid).reduce((s,r)=>s+r.qty,0);
    const maxRet=item.qty-alrRet;
    const qty=Math.min(maxRet,Math.max(1,parseInt((qEl||{}).value||1)));
    return{retId:genId('RET'),pid:item.pid,name:item.name,qty,price:item.price,expensed:false};
  });
  if(toReturn.length===0){toast('Qaytarish uchun mahsulot tanlang!','error');return;}
  const retAmt=toReturn.reduce((s,i)=>s+i.price*i.qty,0);
  // Faqat stock qaytariladi, kassadan summa ayirilmaydi
  // Kassadan ayirish uchun Harajat > "Qaytarish" kategoriyasidan amalga oshiriladi
  orders=orders.map(o=>o.id===returnOrderId?{...o,returnedItems:[...(o.returnedItems||[]),...toReturn]}:o);
  products=products.map(p=>{const ri=toReturn.find(r=>r.pid===p.id);return ri?{...p,stock:p.stock+ri.qty}:p;});
  save();
  toast(`Mahsulot qaytarildi (${fmt(retAmt)}). Kassadan ayirish uchun "Harajat > Qaytarish" dan foydalaning.`,'info');
  closeModal();
  renderOrders();
}

function addBulkRow(){
  const tb=document.getElementById('bulk-body');
  if(!tb)return;
  const r=document.createElement('tr');
  r.innerHTML=renderBulkRow(bulkRows).replace(/<tr[^>]*>/,'').replace('</tr>','');
  r.id='bulk-row-'+bulkRows;
  tb.appendChild(r);
  bulkRows++;
}

function saveBulk(){
  const added=[];
  document.querySelectorAll('[id^="bulk-row-"]').forEach(row=>{
    const i=row.id.replace('bulk-row-','');
    let id=((document.getElementById('br-id-'+i)||{}).value||'').trim().toUpperCase();
    const name=((document.getElementById('br-name-'+i)||{}).value||'').trim();
    const price=parseFloat((document.getElementById('br-price-'+i)||{}).value||0);
    const cost=parseFloat((document.getElementById('br-cost-'+i)||{}).value||0);
    const cat=((document.getElementById('br-cat-'+i)||{}).value||'').trim();
    const stock=parseInt((document.getElementById('br-stock-'+i)||{}).value||0);
    if(name&&price&&cat){
      if(!id)id=generateAutoId();
      if(!products.find(p=>p.id===id)){products.push({id,name,price,cost:cost||0,category:cat,stock});added.push(name);}
    }
  });
  if(added.length===0){toast('Kamida 1 ta to\'liq mahsulot kiriting!','error');return;}
  save();
  toast(added.length+' ta mahsulot qo\'shildi!');
  bulkRows=1;renderWarehouse('bulk');
}

function generateAutoId(){
  // Find max numeric part from existing IDs
  let maxNum=0;
  products.forEach(p=>{
    const m=p.id.match(/(\d+)$/);
    if(m)maxNum=Math.max(maxNum,parseInt(m[1]));
  });
  const next=maxNum+1;
  return 'P'+String(next).padStart(3,'0');
}

function autoFillId(){
  const el=document.getElementById('f-id');
  if(el)el.value=generateAutoId();
}

function autoFillIdOnName(){

function addSingleProduct(){
  let id=((document.getElementById('f-id')||{}).value||'').trim().toUpperCase();
  if(!id)id=generateAutoId();
  const name=((document.getElementById('f-name')||{}).value||'').trim();
  const price=parseFloat((document.getElementById('f-price')||{}).value||0);
  const cost=parseFloat((document.getElementById('f-cost')||{}).value||0);
  const cat=((document.getElementById('f-cat')||{}).value||'').trim();
  const stock=parseInt((document.getElementById('f-stock')||{}).value||0);
  if(!name||!price||!cat){toast('Nomi, narx va kategoriya majburiy!','error');return;}
  if(products.find(p=>p.id===id)){toast('Bu ID allaqachon mavjud: '+id,'error');return;}
  products.push({id,name,price,cost:cost||0,category:cat,stock});
  save();
  toast(`Mahsulot qo'shildi! ID: ${id}`);
  renderWarehouse('add');
}

function deleteProduct(id){
  if(currentUser.role!=='admin'){toast('Ruxsat yo\'q!','error');return;}
  const p=products.find(pr=>pr.id===id);
  if(!p)return;
  if(!confirm(`"${p.name}" mahsulotini o'chirishni tasdiqlaysizmi?`))return;
  products=products.filter(pr=>pr.id!==id);
  save();
  toast('Mahsulot o\'chirildi!','error');
  renderWarehouse('stock');
}

function saveEditProduct(id){
  const p=products.find(pr=>pr.id===id);
  if(!p)return;
  const name=((document.getElementById('ep-name')||{}).value||'').trim();
  const price=parseFloat((document.getElementById('ep-price')||{}).value||0);
  const cost=parseFloat((document.getElementById('ep-cost')||{}).value||0);
  const cat=(document.getElementById('ep-cat')||{}).value||p.category;
  if(!name||!price){toast('Nomi va narx majburiy!','error');return;}
  if(price!==p.price){
    priceHistory.push({pid:id,pname:p.name,oldPrice:p.price,newPrice:price,oldCost:p.cost||0,newCost:cost,date:new Date().toISOString(),by:currentUser.name});
  }
  products=products.map(pr=>pr.id===id?{...pr,name,price,cost:cost||0,category:cat}:pr);
  save();
  toast('Mahsulot yangilandi!');
  closeModal();
  renderWarehouse('stock');
}

function drawBarcode(canvasId, text){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const container=canvas.parentElement;
  if(!container)return;
  // QRCode.js div ichiga chiqaradi, canvas o'rniga div ishlatamiz
  const qrDiv=document.createElement('div');
  qrDiv.id=canvasId+'-qr';
  qrDiv.style.display='inline-block';
  canvas.style.display='none';
  canvas.insertAdjacentElement('afterend', qrDiv);
  try{
    new QRCode(qrDiv, {
      text: text,
      width: 128,
      height: 128,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  }catch(e){
    qrDiv.innerHTML='<div style="font-size:11px;color:#ef4444">QR xato</div>';
  }
}

function renderOperations(fromDate='',toDate='',showAllFlag=''){
  const showAll=showAllFlag==='all';
  const today=new Date().toDateString();
  // Sana filtri yo'q bo'lsa — joriy smena bo'yicha filtrlash; showAll=butun davr
  const useSmena=!fromDate&&!toDate&&!showAll;
  let filtOrders, filtExp, label;
  if(showAll){
    filtOrders=[...orders];
    filtExp=[...expenses];
    label='Butun davr';
  } else if(useSmena){
    filtOrders=orders.filter(o=>o.smenaId===currentSmenaId);
    filtExp=expenses.filter(e=>e.smenaId===currentSmenaId||(!e.smenaId&&new Date(e.date).toDateString()===today));
    label='Joriy smena';
  } else {
    filtOrders=orders;
    filtExp=expenses;
    if(fromDate){const fd=new Date(fromDate);filtOrders=filtOrders.filter(o=>new Date(o.date)>=fd);filtExp=filtExp.filter(e=>new Date(e.date)>=fd);}
    if(toDate){const td=new Date(toDate);td.setHours(23,59,59);filtOrders=filtOrders.filter(o=>new Date(o.date)<=td);filtExp=filtExp.filter(e=>new Date(e.date)<=td);}
    label='Tanlangan davr';
  }
  const toRev=calcRealRevenue(filtOrders);
  const toSaleSum=filtOrders.reduce((s,o)=>s+o.total,0);
  // Faqat haqiqiy harajatlar (smena_profit hisoblanmaydi, chunki u faktual ichida hisobga olingan)
  const toExp=filtExp.filter(e=>e.type!=='smena_profit').reduce((s,e)=>s+e.amount,0);
  // Smena foydalari yig'indisi — faqat ko'rsatish/statistika uchun (bal ga qo'shilmaydi)
  const toSmenaProfit=filtExp.filter(e=>e.type==='smena_profit').reduce((s,e)=>s+(e.profit||0),0);
  // Sof foyda: tushum - harajatlar
  const toProfit=toRev-toExp;
  // Kassa qoldig'i: tushum (yopilgan smenalarda faktual, ochiqda sotilgan summa) - harajatlar
  // Qaytarilgan tovar summasi kassadan AYIRILMAYDI — faqat "Harajat > Qaytarish" orqali chiqim qilinganda ayriladi
  const bal=toProfit;
  // Ziyon (ubitka) — yaroqsiz mahsulotlar
  const toDamage=filtExp.filter(e=>e.type==='damage').reduce((s,e)=>s+e.amount,0);

  // Daily profit last 7 days
  const last7profit=[...Array(7)].map((_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(6-i));
    const ds=d.toDateString();
    const dayOrds=orders.filter(o=>new Date(o.date).toDateString()===ds);
    const rev=calcRealRevenue(dayOrds);
    const exp=expenses.filter(e=>new Date(e.date).toDateString()===ds&&e.type!=='smena_profit').reduce((s,e)=>s+e.amount,0);
    const profit=rev-exp;
    return{label:d.toLocaleDateString("uz-UZ",{weekday:"short",day:"2-digit"}),profit,rev,exp};
  });
  const maxP=Math.max(...last7profit.map(d=>Math.abs(d.profit)),1);

  // Smena tarixi — yopilgan smenalar
  const closedSmenas=[...smenas].filter(s=>s.closed).reverse().slice(0,15);
  const smenaRows=closedSmenas.map(s=>`
    <tr>
      <td style="color:#6366f1;font-weight:700;font-size:12px">${s.id}</td>
      <td style="color:#64748b;font-size:12px">${fmtDate(s.openTime)}</td>
      <td style="color:#64748b;font-size:12px">${s.closeTime?fmtDate(s.closeTime):'—'}</td>
      <td>${s.closeBy||'—'}</td>
      <td style="font-weight:700;color:${(s.diff||0)>=0?'#16a34a':'#ef4444'}">${(s.diff||0)>=0?'+':''}${fmt(s.diff||0)}</td>
      <td style="color:#94a3b8;font-size:12px;max-width:180px">${s.note||'—'}</td>
      ${currentUser.role==='admin'?`<td><div class="flex gap-4">
        <button class="btn btn-outline btn-sm" onclick="openEditSmenaModal('${s.id}')" title="Tahrirlash">${svgIcon('edit',13)}</button>
        <button class="btn btn-danger btn-sm" onclick="deleteSmenaHistory('${s.id}')" title="O'chirish">${svgIcon('trash',13)}</button>
      </div></td>`:'<td></td>'}
    </tr>`).join('');

  const expRows=[...filtExp].filter(e=>e.type!=='smena_profit').reverse().map(e=>`<tr>
    <td>${badge(e.category||'Boshqa','blue')}</td>
    <td style="color:#64748b">${e.desc||'—'}</td>
    <td style="font-weight:700;color:#ef4444">${fmt(e.amount)}</td>
    <td style="color:#64748b">${fmtDate(e.date)}</td>
    <td>${e.by}</td>
    ${hasPerm('expenses_delete')?`<td><button class="btn btn-danger btn-sm" onclick="deleteExpense(${e.id})">${svgIcon('trash',13)}</button></td>`:'<td></td>'}
  </tr>`).join('');

      </div>
    </div>

        <label class="form-label">Qaytarilgan buyurtmani tanlang <span style="color:#ef4444">*</span></label>
        <select id="exp-return-order" class="form-input" onchange="onReturnOrderSelect(this.value)">
          <option value="">— Buyurtma tanlang —</option>

    <div class="form-group"><label class="form-label">Summa (so'm) <span style="color:#ef4444">*</span></label><input id="exp-amount" type="number" class="form-input" placeholder="50000" /></div>
    <div class="flex gap-10"><button class="btn btn-primary btn-md" onclick="saveExpense()">${svgIcon('check',16)} Saqlash</button><button class="btn btn-ghost btn-md" onclick="closeModal()">Bekor</button></div>`,480);

function buildReturnableOrderOptions(){
  // Faqat harajat qilinmagan qaytarish elementlari bo'lgan buyurtmalar ko'rsatiladi
  const retOrders=orders.filter(o=>(o.returnedItems||[]).some(r=>!r.expensed));
  if(retOrders.length===0) return '<option value="" disabled>Harajat qilinmagan qaytarishlar yo\'q</option>';
  return retOrders.map(o=>{
    // Faqat hali harajat qilinmagan qaytarish elementlari summasi
    const unexpensedItems=(o.returnedItems||[]).filter(r=>!r.expensed);
    const retAmt=unexpensedItems.reduce((s,r)=>s+r.price*r.qty,0);
    return`<option value="${o.id}" data-amt="${retAmt}">${o.id} — ${fmt(retAmt)}</option>`;
  }).join('');
}

function onExpCatChange(cat){
  const sec=document.getElementById('exp-return-section');
  if(sec) sec.style.display=(cat==='Qaytarish')?'block':'none';
  if(cat!=='Qaytarish'){
    const rItems=document.getElementById('exp-return-items');
    if(rItems) rItems.style.display='none';
    const amtInp=document.getElementById('exp-amount');
    if(amtInp) amtInp.value='';
    const retSel=document.getElementById('exp-return-order');
    if(retSel) retSel.value='';
  }
}

function onReturnOrderSelect(oid){
  const itemsDiv=document.getElementById('exp-return-items');
  const amountInp=document.getElementById('exp-amount');
  if(!oid){if(itemsDiv)itemsDiv.style.display='none';if(amountInp)amountInp.value='';return;}
  const order=orders.find(o=>o.id===oid);
  if(!order||!itemsDiv)return;
  // Faqat hali harajat qilinmagan qaytarish elementlari
  const unexpensedItems=(order.returnedItems||[]).filter(r=>!r.expensed);
  const expensedItems=(order.returnedItems||[]).filter(r=>r.expensed);
  const retAmt=unexpensedItems.reduce((s,r)=>s+r.price*r.qty,0);
  if(amountInp) amountInp.value=retAmt;
  const itemRows=unexpensedItems.map(r=>`
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #fca5a5;font-size:13px">
      <span>${r.name} <span style="color:#94a3b8">x${r.qty}</span></span>
      <span style="font-weight:600;color:#ef4444">-${fmt(r.price*r.qty)}</span>
    </div>`).join('');
  const expensedRows=expensedItems.length>0?`<div style="margin-top:8px;padding-top:8px;border-top:1px dashed #fca5a5">
    <div style="font-size:11px;color:#94a3b8;margin-bottom:4px">Allaqachon harajat qilingan:</div>
    ${expensedItems.map(r=>`<div style="display:flex;justify-content:space-between;font-size:12px;color:#94a3b8"><span>${r.name} x${r.qty}</span><span>${fmt(r.price*r.qty)}</span></div>`).join('')}
  </div>`:'';
  itemsDiv.innerHTML=`<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;padding:12px;margin-bottom:4px">
    <div style="font-size:12px;font-weight:700;color:#ef4444;margin-bottom:8px">Qaytarilgan mahsulotlar (harajat qilinmagan):</div>
    ${itemRows||'<div style="font-size:13px;color:#94a3b8">Yo\'q</div>'}
    <div style="display:flex;justify-content:space-between;padding-top:8px;font-weight:700;font-size:14px;border-top:1px solid #fca5a5;margin-top:4px">
      <span>Jami qaytarish summasi:</span><span style="color:#ef4444">${fmt(retAmt)}</span>
    </div>
    ${expensedRows}
  </div>`;
  itemsDiv.style.display='block';
}

function openExpCatModal(){
  const catList=expCats.map(c=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
    <span style="flex:1;padding:6px 10px;background:#f8fafc;border-radius:8px;font-size:13px">${c}</span>
    <button onclick="deleteExpCat('${c}')" style="background:none;border:none;cursor:pointer;color:#ef4444;display:flex;padding:4px" title="O'chirish">${svgIcon('trash',14)}</button>
  </div>`).join('');
  openModal('Harajat kategoriyalari',`
    <div class="form-group">
      <label class="form-label">Yangi kategoriya</label>
      <div class="flex gap-8">
        <input id="new-exp-cat" class="form-input" placeholder="Kategoriya nomi" style="flex:1" />
        <button class="btn btn-primary btn-sm" onclick="addExpCat()">Qo'shish</button>
      </div>
    </div>
    <div style="max-height:260px;overflow:auto;margin-bottom:12px">
      <div id="exp-cat-list">${catList||'<p style="color:#94a3b8;font-size:13px">Kategoriyalar yo\'q</p>'}</div>
    </div>
    <button class="btn btn-ghost btn-md w-full" style="justify-content:center" onclick="openExpModal()">Orqaga</button>`,400);
}

function addExpCat(){
  const v=((document.getElementById('new-exp-cat')||{}).value||'').trim();
  if(!v)return;
  if(expCats.includes(v)){toast('Bu kategoriya allaqachon mavjud!','error');return;}
  expCats.push(v);save();toast('Kategoriya qo\'shildi!');
  openExpCatModal();
}

function deleteExpCat(cat){
  const inUse=expenses.some(e=>e.category===cat);
  if(inUse){toast(`"${cat}" ishlatilmoqda, o'chirib bo'lmaydi!`,'error');return;}
  if(!confirm(`"${cat}" kategoriyasini o'chirishni tasdiqlaysizmi?`))return;
  expCats=expCats.filter(c=>c!==cat);save();
  toast('Kategoriya o\'chirildi!','error');
  openExpCatModal();
}

function saveExpense(){
  const cat=((document.getElementById('exp-cat')||{}).value||'').trim();
  const desc=((document.getElementById('exp-desc')||{}).value||'').trim();
  const amount=parseFloat((document.getElementById('exp-amount')||{}).value||0);
  if(!cat||!amount){toast('Kategoriya va summa majburiy!','error');return;}
  const entry={id:Date.now(),category:cat,desc,amount,date:new Date().toISOString(),by:currentUser.name,smenaId:currentSmenaId};
  if(cat==='Qaytarish'){
    const retOid=((document.getElementById('exp-return-order')||{}).value||'').trim();
    if(!retOid){toast('Qaytarilgan buyurtmani tanlang!','error');return;}
    const order=orders.find(o=>o.id===retOid);
    if(!order){toast('Buyurtma topilmadi!','error');return;}
    const unexpensedItems=(order.returnedItems||[]).filter(r=>!r.expensed);
    if(unexpensedItems.length===0){toast('Bu buyurtma uchun barcha qaytarishlar allaqachon harajat qilingan!','error');return;}
    // Tegishli returnedItems elementlarini "expensed" deb belgilash — qayta harajat qilib bo'lmaydi
    const expensedRetIds=unexpensedItems.map(r=>r.retId);
    orders=orders.map(o=>o.id===retOid?{...o,returnedItems:o.returnedItems.map(r=>expensedRetIds.includes(r.retId)?{...r,expensed:true}:r)}:o);
    entry.returnOrderId=retOid;
    entry.expensedRetIds=expensedRetIds;
    if(!entry.desc) entry.desc=retOid+' buyurtma qaytarish';
  }
  expenses.push(entry);
  save();
  toast('Harajat qo\'shildi!');closeModal();renderOperations();
}

function deleteExpense(id){
  if(!confirm('Harajatni o\'chirishni tasdiqlaysizmi?'))return;
  const exp=expenses.find(e=>e.id===id);
  // Agar "Qaytarish" harajati o'chirilsa — tegishli returnedItems larni qayta "expensed:false" qilamiz
  if(exp&&exp.category==='Qaytarish'&&exp.returnOrderId&&exp.expensedRetIds){
    orders=orders.map(o=>o.id===exp.returnOrderId?{...o,returnedItems:o.returnedItems.map(r=>exp.expensedRetIds.includes(r.retId)?{...r,expensed:false}:r)}:o);
  }
  expenses=expenses.filter(e=>e.id!==id);
  save();
  toast('Harajat o\'chirildi!','error');
  renderOperations();
}

  const pass=((document.getElementById('u-pass')||{}).value||'').trim();

  if(!userEditId&&users.find(u=>u.login===login)){toast('Bu login allaqachon mavjud!','error');return;}
  if(userEditId){
    users=users.map(u=>u.id===userEditId?{...u,name,password:pass,role,avatar:name.charAt(0).toUpperCase()}:u);
    if(currentUser.id===userEditId)currentUser={...currentUser,name,password:pass,role,avatar:name.charAt(0).toUpperCase()};

  users=users.filter(usr=>usr.id!==uid);
  save();
  toast('Foydalanuvchi o\'chirildi!','error');
  renderUsers();
}

// ===== XLSX BUILDER (minimal) =====
function makeXlsx(headers, rows){
  // Build a proper .xlsx file using SpreadsheetML XML inside a ZIP-like structure
  // We'll use the data: URI with a proper XLSX structure via a mini builder
  const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const allRows=[headers,...rows];
  let sharedStrings=[];
  let ssMap={};
  function si(val){
    const k=String(val);
    if(ssMap[k]===undefined){ssMap[k]=sharedStrings.length;sharedStrings.push(k);}
    return ssMap[k];
  }
  // Pre-register all strings
  allRows.forEach(row=>row.forEach(cell=>{ if(isNaN(cell)||cell==='')si(cell); }));

  const cellAddr=(r,c)=>String.fromCharCode(65+c)+(r+1);
  let sheetRows='';
  allRows.forEach((row,r)=>{
    let cells='';
    row.forEach((val,c)=>{
      const addr=cellAddr(r,c);
      if(val!==''&&!isNaN(val)&&val!==null&&val!==undefined){
        cells+=`<c r="${addr}"><v>${val}</v></c>`;
      } else {
        cells+=`<c r="${addr}" t="s"><v>${si(val)}</v></c>`;
      }
    });
    sheetRows+=`<row r="${r+1}">${cells}</row>`;
  });

  const sheet=`<?xml version="1.0" encoding="UTF-8"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>${sheetRows}</sheetData></worksheet>`;
  const ssXml=`<?xml version="1.0" encoding="UTF-8"?><sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="${sharedStrings.length}" uniqueCount="${sharedStrings.length}">${sharedStrings.map(s=>`<si><t xml:space="preserve">${esc(s)}</t></si>`).join('')}</sst>`;
  const wb=`<?xml version="1.0" encoding="UTF-8"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="Sheet1" sheetId="1" r:id="rId1"/></sheets></workbook>`;
  const wbRels=`<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/></Relationships>`;
  const contentTypes=`<?xml version="1.0" encoding="UTF-8"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/><Override PartName="/xl/sharedStrings.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml"/></Types>`;
  const rels=`<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`;

  // Build ZIP manually using a simple zip builder
  function strToU8(str){
    const buf=new TextEncoder().encode(str);return buf;
  }
  function u8ToBase64(u8){
    let s='';u8.forEach(b=>s+=String.fromCharCode(b));return btoa(s);
  }

  // Use a simple approach: build ZIP with stored (no compression) entries
  function makeZip(files){
    const enc=new TextEncoder();
    let localHeaders=[];
    let centralDir=[];
    let offset=0;
    const u8arr=[];

    files.forEach(({name,data})=>{
      const nameBytes=enc.encode(name);
      const dataBytes=enc.encode(data);
      // CRC32
      let crc=0xFFFFFFFF;
      for(let i=0;i<dataBytes.length;i++){
        crc^=dataBytes[i];
        for(let j=0;j<8;j++) crc=(crc&1)?(crc>>>1)^0xEDB88320:(crc>>>1);
      }
      crc^=0xFFFFFFFF;

      const localHeader=new Uint8Array(30+nameBytes.length);
      const dv=new DataView(localHeader.buffer);
      dv.setUint32(0,0x04034B50,true); // sig
      dv.setUint16(4,20,true); // version
      dv.setUint16(6,0,true); // flags
      dv.setUint16(8,0,true); // no compression
      dv.setUint16(10,0,true); dv.setUint16(12,0,true); // time/date
      dv.setUint32(14,crc,true);
      dv.setUint32(18,dataBytes.length,true);
      dv.setUint32(22,dataBytes.length,true);
      dv.setUint16(26,nameBytes.length,true);
      dv.setUint16(28,0,true);
      localHeader.set(nameBytes,30);

      const centralEntry=new Uint8Array(46+nameBytes.length);
      const cdv=new DataView(centralEntry.buffer);
      cdv.setUint32(0,0x02014B50,true);
      cdv.setUint16(4,20,true);cdv.setUint16(6,20,true);
      cdv.setUint16(8,0,true);cdv.setUint16(10,0,true);
      cdv.setUint16(12,0,true);cdv.setUint16(14,0,true);
      cdv.setUint32(16,crc,true);
      cdv.setUint32(20,dataBytes.length,true);
      cdv.setUint32(24,dataBytes.length,true);
      cdv.setUint16(28,nameBytes.length,true);
      cdv.setUint16(30,0,true);cdv.setUint16(32,0,true);
      cdv.setUint16(34,0,true);cdv.setUint16(36,0,true);
      cdv.setUint32(38,0,true);
      cdv.setUint32(42,offset,true);
      centralEntry.set(nameBytes,46);

      u8arr.push(localHeader,dataBytes);
      centralDir.push(centralEntry);
      offset+=localHeader.length+dataBytes.length;
    });

    const cdSize=centralDir.reduce((s,b)=>s+b.length,0);
    const eocd=new Uint8Array(22);
    const edv=new DataView(eocd.buffer);
    edv.setUint32(0,0x06054B50,true);
    edv.setUint16(4,0,true);edv.setUint16(6,0,true);
    edv.setUint16(8,files.length,true);edv.setUint16(10,files.length,true);
    edv.setUint32(12,cdSize,true);
    edv.setUint32(16,offset,true);
    edv.setUint16(20,0,true);

    const all=[...u8arr,...centralDir,eocd];
    const total=all.reduce((s,b)=>s+b.length,0);
    const out=new Uint8Array(total);
    let pos=0;
    all.forEach(b=>{out.set(b,pos);pos+=b.length;});
    return out;
  }

  const zipBytes=makeZip([
    {name:'[Content_Types].xml',data:contentTypes},
    {name:'_rels/.rels',data:rels},
    {name:'xl/workbook.xml',data:wb},
    {name:'xl/_rels/workbook.xml.rels',data:wbRels},
    {name:'xl/worksheets/sheet1.xml',data:sheet},
    {name:'xl/sharedStrings.xml',data:ssXml},
  ]);
  return zipBytes;
}

function downloadXlsx(filename, headers, rows){
  const bytes=makeXlsx(headers,rows);
  const blob=new Blob([bytes],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}

function importExcelProducts(input){
  const file=input.files[0];
  if(!file)return;
  const isXlsx=file.name.endsWith('.xlsx');

  if(isXlsx){
    const reader=new FileReader();
    reader.onload=async function(e){
      try{
        const rows=await parseXlsxRows(e.target.result);
        if(!rows||rows.length<2){toast('Fayl bo\'sh yoki satr topilmadi!','error');return;}
        processProductRows(rows.slice(1));
      }catch(err){
        toast('XLSX xato: '+err.message,'error');
        console.error(err);
      }
    };
    reader.readAsArrayBuffer(file);
  } else {
    const reader=new FileReader();
    reader.onload=function(e){
      const text=e.target.result.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
      const lines=text.split('\n').filter(l=>l.trim()&&!l.startsWith('('));
      if(lines.length<2){toast('Fayl bo\'sh yoki noto\'g\'ri format!','error');return;}
      const sep=lines[0].includes('\t')?'\t':',';
      const rows=lines.map(l=>l.split(sep).map(c=>c.trim().replace(/^"|"$/g,'')));
      processProductRows(rows.slice(1));
    };
    reader.readAsText(file,'UTF-8');
  }
  input.value='';
}

function parseXlsxRows(arrayBuffer){
  const bytes = new Uint8Array(arrayBuffer);
  const dv = new DataView(arrayBuffer);

  // ---- ZIP reader ----
  function readZip(){
    const files={};
    // Find End of Central Directory to locate central dir
    let eocdPos=-1;
    for(let i=bytes.length-22;i>=0;i--){
      if(dv.getUint32(i,true)===0x06054B50){eocdPos=i;break;}
    }
    if(eocdPos<0) throw new Error('ZIP EOCD not found');
    const cdOffset=dv.getUint32(eocdPos+16,true);
    const cdCount=dv.getUint16(eocdPos+10,true);
    let p=cdOffset;
    for(let n=0;n<cdCount;n++){
      if(dv.getUint32(p,true)!==0x02014B50) break;
      const fnLen=dv.getUint16(p+28,true);
      const extraLen=dv.getUint16(p+30,true);
      const cmtLen=dv.getUint16(p+32,true);
      const localOffset=dv.getUint32(p+42,true);
      const nameBytes=bytes.slice(p+46,p+46+fnLen);
      const name=new TextDecoder().decode(nameBytes);
      // Read local file header
      const lhExtraLen=dv.getUint16(localOffset+28,true);
      const dataStart=localOffset+30+fnLen+lhExtraLen;
      const compSize=dv.getUint32(localOffset+18,true);
      const compMethod=dv.getUint16(localOffset+8,true);
      if(compMethod===0){
        // Stored - no compression
        files[name]=bytes.slice(dataStart,dataStart+compSize);
      } else {
        // Deflate - use DecompressionStream if available
        files[name]={compressed:bytes.slice(dataStart,dataStart+compSize),method:compMethod,uncompSize:dv.getUint32(localOffset+22,true)};
      }
      p+=46+fnLen+extraLen+cmtLen;
    }
    return files;
  }

  async function decompressEntry(entry){
    if(entry instanceof Uint8Array) return entry;
    // Use DecompressionStream (raw deflate)
    try{
      const ds=new DecompressionStream('deflate-raw');
      const writer=ds.writable.getWriter();
      writer.write(entry.compressed);
      writer.close();
      const chunks=[];
      const reader=ds.readable.getReader();
      while(true){const{done,value}=await reader.read();if(done)break;chunks.push(value);}
      const out=new Uint8Array(entry.uncompSize);
      let off=0;chunks.forEach(c=>{out.set(c,off);off+=c.length;});
      return out;
    }catch(e){throw new Error('Deflate decompress failed: '+e.message);}
  }

  const files=readZip();

  // Return promise since decompression may be async
  return (async()=>{
    // Decompress needed files
    async function getXml(name){
      const f=files[name];
      if(!f)return null;
      const u8=await decompressEntry(f);
      return new TextDecoder().decode(u8);
    }

    // Shared strings
    let sharedStrings=[];
    const ssXml=await getXml('xl/sharedStrings.xml');
    if(ssXml){
      const matches=[...ssXml.matchAll(/<t(?:\s[^>]*)?>([^<]*)<\/t>/g)];
      sharedStrings=matches.map(m=>m[1]
        .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#xD;/g,''));
    }

    // Sheet
    const sheetXml=await getXml('xl/worksheets/sheet1.xml');
    if(!sheetXml) throw new Error('sheet1.xml topilmadi');

    // Parse rows
    const rowMatches=[...sheetXml.matchAll(/<row\b[^>]*>([\s\S]*?)<\/row>/g)];
    const result=[];
    rowMatches.forEach(rm=>{
      const cellMatches=[...rm[1].matchAll(/<c\b([^>]*)>([\s\S]*?)<\/c>/g)];
      if(!cellMatches.length)return;
      // find column addresses
      const colIdx=cm=>{
        const rAttr=(cm[1].match(/r="([A-Z]+)\d+"/)||[])[1]||'';
        return rAttr.split('').reduce((n,c)=>n*26+(c.charCodeAt(0)-64),0)-1;
      };
      const maxCol=Math.max(...cellMatches.map(colIdx));
      const cells=new Array(maxCol+1).fill('');
      cellMatches.forEach(cm=>{
        const c=colIdx(cm);
        const isStr=cm[1].includes('t="s"');
        const isInline=cm[1].includes('t="inlineStr"');
        const vMatch=cm[2].match(/<v>([^<]*)<\/v>/);
        const tMatch=cm[2].match(/<t[^>]*>([^<]*)<\/t>/);
        if(isInline&&tMatch) cells[c]=tMatch[1];
        else if(isStr&&vMatch) cells[c]=sharedStrings[parseInt(vMatch[1])]||'';
        else if(vMatch) cells[c]=vMatch[1];
      });
      result.push(cells);
    });
    return result;
  })();
}

function processProductRows(dataRows){
  const preview=[];
  const errors=[];
  dataRows.forEach((cols,i)=>{
    // A=ID(ixtiyoriy), B=Nomi, C=KirimNarx, D=SotishNarx, E=Kategoriya, F=Miqdor
    let [idCol,name,cost,price,category,stock]=cols;
    if(!name||!price){
      if(idCol||name||cost||price||category||stock)
        errors.push(`Qator ${i+2}: Nomi va Sotish narxi majburiy`);
      return;
    }
    let autoId=(idCol||'').toString().trim().toUpperCase();
    if(!autoId)autoId=generateAutoId();
    // avoid duplicate IDs
    if(products.find(p=>p.id===autoId)||preview.find(p=>p.id===autoId)){
      autoId=generateAutoId();
    }
    preview.push({id:autoId,name:String(name),cost:parseFloat(cost)||0,price:parseFloat(price)||0,category:String(category||'Boshqa'),stock:parseInt(stock)||0,_preview:true});
  });
  if(preview.length===0){toast('Kiritish uchun to\'g\'ri ma\'lumot topilmadi!','error');document.getElementById('excel-preview').style.display='none';return;}
  const errHtml=errors.length>0?`<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:12px;margin-bottom:12px;font-size:12px;color:#dc2626">${errors.map(e=>`<div>! ${e}</div>`).join('')}</div>`:'';
  const rows=preview.map(p=>`<tr><td>${badge(p.id,'purple')}</td><td style="font-weight:600">${p.name}</td><td style="color:#64748b">${fmt(p.cost)}</td><td style="color:#6366f1;font-weight:700">${fmt(p.price)}</td><td>${badge(p.category,'blue')}</td><td>${p.stock}</td></tr>`).join('');
  const previewDiv=document.getElementById('excel-preview');
  previewDiv.style.display='block';
  previewDiv.innerHTML=`
    ${errHtml}
    <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px">
      <div style="font-size:13px;font-weight:700;color:#16a34a;margin-bottom:10px">${preview.length} ta mahsulot tayyor — tasdiqlang:</div>
      <div style="overflow:auto;max-height:200px">
        <table style="width:100%"><thead><tr style="background:#f8fafc"><th>ID</th><th>Nomi</th><th>Kirim narxi</th><th>Sotish narxi</th><th>Kategoriya</th><th>Miqdor</th></tr></thead>
        <tbody>${rows}</tbody></table>
      </div>
      <div class="flex gap-10" style="margin-top:12px">
        <button class="btn btn-success btn-md" onclick="confirmExcelImport()">${svgIcon('check',16)} ${preview.length} ta mahsulotni kiritish</button>
        <button class="btn btn-ghost btn-md" onclick="document.getElementById('excel-preview').style.display='none'">Bekor</button>
      </div>
    </div>`;
  window._excelImportData=preview;
}

function confirmExcelImport(){
  const list = window._excelImportData || [];
  if(!list.length)return;
  list.forEach(p=>{if(!products.find(pr=>pr.id===p.id))products.push(p);});
  save();
  toast(list.length+' ta mahsulot muvaffaqiyatli kiritildi!');
  window._excelImportData=[];
  document.getElementById('excel-preview').style.display='none';
  renderWarehouse('bulk');
}

    items:[],
    status:'open'

function renderActiveInventory(){

  // Build scanned items display
