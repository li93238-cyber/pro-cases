let activeInv = null; // {id, date, by, items:{pid,factual}[], status:'open'|'closed'}

function renderInventoryList(){
  const rows=[...inventories].reverse().map(inv=>{
    const total=inv.items.length;
    const ok=inv.items.filter(i=>{const p=products.find(pr=>pr.id===i.pid);return p&&i.factual===p.stock;}).length;
    const bad=total-ok;
    return`<tr>
      <td style="color:#6366f1;font-weight:700">${inv.id}</td>
      <td style="color:#64748b">${fmtDate(inv.date)}</td>
      <td>${inv.by}</td>
      <td>${badge(total+' ta','blue')}</td>
      <td>${ok>0?badge(ok+' mos','green'):''} ${bad>0?badge(bad+' farq','red'):''}</td>
      <td>${inv.status==='open'?badge('Ochiq','yellow'):badge('Yakunlangan','green')}</td>
      <td><button class="btn btn-outline btn-sm" onclick="viewInvDetail('${inv.id}')">${svgIcon('edit',14)} Ko'rish</button></td>
    </tr>`;
  }).join('');
  document.getElementById('page-content').innerHTML=`
    <div class="flex justify-between items-center" style="margin-bottom:16px">
      <div style="font-size:14px;color:#64748b">Barcha inventarizatsiyalar tarixi</div>
      <button class="btn btn-primary btn-md" onclick="startNewInventory()">${svgIcon('plus',16)} Yangi inventarizatsiya</button>
    </div>
    <div class="card">
      <table><thead><tr><th>ID</th><th>Sana</th><th>Bajaruvchi</th><th>Mahsulotlar</th><th>Natija</th><th>Holat</th><th></th></tr></thead>
      <tbody>${rows||'<tr><td colspan="7" style="text-align:center;padding:20px;color:#94a3b8">Inventarizatsiya yo\'q</td></tr>'}</tbody></table>
    </div>`;
}

function startNewInventory(){
  const inv={
    id:'INV-'+Date.now().toString(36).toUpperCase(),
    date:new Date().toISOString(),
    by:currentUser.name,
    items:[],
    status:'open'
  };
  activeInv=inv;
  renderActiveInventory();
}

function renderActiveInventory(){
  if(!activeInv){renderInventoryList();return;}
  // Build scanned items display
  const scannedHtml=activeInv.items.length===0
    ?`<div style="text-align:center;padding:40px;color:#94a3b8"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 12px;display:block"><path d="M3 5v14"/><path d="M8 5v14"/><path d="M12 5v14"/><path d="M17 5v14"/><path d="M21 5v14"/></svg><p style="margin:0">Barkod skaner orqali mahsulot qo'shing</p></div>`
    :activeInv.items.map(item=>{
      const p=products.find(pr=>pr.id===item.pid);
      if(!p)return'';
      const ok=item.factual===p.stock;
      const cls=ok?'inv-item-green':'inv-item-red';
      const icon=ok?`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>`:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
      return`<div class="${cls}">
        <div>
          <div style="font-weight:700;font-size:14px">${p.name} ${badge(p.id,'purple')}</div>
          <div style="font-size:12px;margin-top:3px;color:#64748b">Bazada: <b>${p.stock}</b> ta &nbsp;|&nbsp; Fakticheski: <b style="color:${ok?'#16a34a':'#dc2626'}">${item.factual}</b> ta ${ok?'':'&nbsp;'+badge('Farq: '+(item.factual-p.stock),'red')}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:20px">${icon}</span>
          <button onclick="removeInvItem('${item.pid}')" style="background:none;border:none;cursor:pointer;color:#94a3b8;display:flex;padding:2px">${svgIcon('trash',14)}</button>
        </div>
      </div>`;
    }).join('');

  const okCount=activeInv.items.filter(i=>{const p=products.find(pr=>pr.id===i.pid);return p&&i.factual===p.stock;}).length;
  const badCount=activeInv.items.length-okCount;

  document.getElementById('page-content').innerHTML=`
    <div class="flex items-center gap-10" style="margin-bottom:16px">
      <button class="btn btn-ghost btn-sm" onclick="renderInventoryList()" style="color:#64748b">Orqaga</button>
      <div style="font-size:16px;font-weight:700">Inventarizatsiya: ${activeInv.id}</div>
      <div style="flex:1"></div>
      ${activeInv.items.length>0?`
        <span style="font-size:13px;color:#64748b">${svgIcon('check',13)} <b style="color:#16a34a">${okCount}</b> mos &nbsp; X <b style="color:#dc2626">${badCount}</b> farq</span>
        <button class="btn btn-success btn-md" onclick="finishInventory()">${svgIcon('check',16)} Yakunlash</button>
      `:''}
    </div>
    <div class="inv-scan-box">
      <div style="font-size:14px;font-weight:700;color:#475569;margin-bottom:12px;display:flex;align-items:center;gap:8px">
        ${svgIcon('barcode',16)} Barkod skaner
      </div>
      <div class="flex gap-8">
        <input id="inv-scan-input" class="form-input" placeholder="Mahsulot ID (Enter)" style="flex:1;font-size:16px" onkeydown="if(event.key==='Enter')invScanProduct()" autofocus />
        <button class="btn btn-outline btn-md" onclick="openInvQrScanner()" title="Kamera orqali QR skanerlash" style="padding:10px 14px">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h3l2-3h6l2 3h3a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
        <button class="btn btn-primary btn-md" onclick="invScanProduct()">${svgIcon('barcode',16)} Skanerlash</button>
      </div>
      <div style="font-size:12px;color:#94a3b8;margin-top:8px">Pistolet orqali ID skanerlang yoki qo'lda kiriting. Har safar skanlashda fakticheski soni +1 bo'ladi.</div>
    </div>
    <div id="inv-items-list">${scannedHtml}</div>`;
  (document.getElementById('inv-scan-input')||{}).focus();
}

async function openInvQrScanner(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    toast('Bu qurilma/brauzer kamerani qo\'llamaydi!','error');return;
  }
  openModal('QR kod skanerlash (Inventarizatsiya)',`
    <div style="position:relative;border-radius:14px;overflow:hidden;background:#000;aspect-ratio:1/1;max-width:360px;margin:0 auto">
      <video id="inv-qr-video" playsinline autoplay muted style="width:100%;height:100%;object-fit:cover"></video>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none">
        <div style="width:70%;height:70%;border:3px solid #6366f1;border-radius:16px;box-shadow:0 0 0 9999px rgba(0,0,0,.35)"></div>
      </div>
      <canvas id="inv-qr-canvas" style="display:none"></canvas>
    </div>
    <div id="inv-qr-status" style="text-align:center;margin-top:14px;font-size:13px;color:#64748b">Kamerani QR kodga qarating...</div>
    <button class="btn btn-ghost btn-md w-full" style="justify-content:center;margin-top:12px" onclick="closeModal()">Yopish</button>
  `,400);
  let invQrStream=null;
  let invQrFrame=null;
  try{
    invQrStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const video=document.getElementById('inv-qr-video');
    if(!video){if(invQrStream)invQrStream.getTracks().forEach(t=>t.stop());return;}
    video.srcObject=invQrStream;
    await video.play();
    const scan=()=>{
      const canvas=document.getElementById('inv-qr-canvas');
      if(!video||!canvas||!invQrStream){return;}
      if(video.readyState===video.HAVE_ENOUGH_DATA){
        canvas.width=video.videoWidth;canvas.height=video.videoHeight;
        const ctx=canvas.getContext('2d');ctx.drawImage(video,0,0,canvas.width,canvas.height);
        try{
          const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
          if(typeof jsQR==='function'){
            const code=jsQR(imgData.data,imgData.width,imgData.height);
            if(code&&code.data){
              invQrStream.getTracks().forEach(t=>t.stop());
              playBeep('success');
              closeModal();
              const inp=document.getElementById('inv-scan-input');
              if(inp){inp.value=code.data.trim();invScanProduct();}
              return;
            }
          }
        }catch(e){}
      }
      invQrFrame=requestAnimationFrame(scan);
    };
    invQrFrame=requestAnimationFrame(scan);
    // Stop stream when modal closes
    const origClose=window._origCloseModal||closeModal;
    window._invCleanup=()=>{
      if(invQrFrame)cancelAnimationFrame(invQrFrame);
      if(invQrStream)invQrStream.getTracks().forEach(t=>t.stop());
    };
  }catch(e){
    const st=document.getElementById('inv-qr-status');
    if(st){st.textContent='Kameraga ruxsat berilmadi.';st.style.color='#ef4444';}
  }
}

function invScanProduct(){
  const inp=document.getElementById('inv-scan-input');
  const id=((inp||{}).value||'').trim().toUpperCase();
  if(!id){return;}
  const p=products.find(pr=>pr.id===id);
  if(!p){toast('Mahsulot topilmadi: '+id,'error');playBeep('error');inp.value='';return;}
  const existing=activeInv.items.find(i=>i.pid===id);
  if(existing){
    existing.factual=(existing.factual||0)+1;
  } else {
    activeInv.items.push({pid:id,factual:1});
  }
  playBeep('scan');
  inp.value='';
  renderActiveInventory();
}

function removeInvItem(pid){
  activeInv.items=activeInv.items.filter(i=>i.pid!==pid);
  renderActiveInventory();
}

function finishInventory(){
  if(activeInv.items.length===0){toast('Hech bir mahsulot skanlanmadi!','error');return;}
  const okCount=activeInv.items.filter(i=>{const p=products.find(pr=>pr.id===i.pid);return p&&i.factual===p.stock;}).length;
  const badCount=activeInv.items.length-okCount;
  confirmDialog(`Inventarizatsiyani yakunlaysizmi? Mos: ${okCount} ta, Farq: ${badCount} ta`,()=>{
    activeInv.status='closed';
    inventories.push({...activeInv});
    save();
    const inv=activeInv;
    activeInv=null;
    toast('Inventarizatsiya yakunlandi!');
    viewInvDetail(inv.id);
  });
}
function viewInvDetail(invId){
  const inv=inventories.find(i=>i.id===invId);
  if(!inv){renderInventoryList();return;}
  const rows=inv.items.map(item=>{
    const p=products.find(pr=>pr.id===item.pid);
    if(!p)return`<tr><td colspan="5" style="color:var(--text2)">${item.pid} - mahsulot o'chirilgan</td></tr>`;
    const ok=item.factual===p.stock;
    const diff=item.factual-p.stock;
    return`<tr style="background:${ok?'#f0fdf4':'#fef2f2'}">
      <td>${badge(p.id,'purple')}</td>
      <td style="font-weight:600">${p.name}</td>
      <td>${badge(p.category,'blue')}</td>
      <td style="font-weight:700;text-align:center">${p.stock}</td>
      <td style="font-weight:700;text-align:center;color:${ok?'#16a34a':'#dc2626'}">${item.factual}</td>
      <td style="text-align:center">${ok?badge('Mos','green'):badge((diff>0?'+':'')+diff+' ta','red')}</td>
    </tr>`;
  }).join('');
  const okCount=inv.items.filter(i=>{const p=products.find(pr=>pr.id===i.pid);return p&&i.factual===p.stock;}).length;
  const badCount=inv.items.length-okCount;
  document.getElementById('page-content').innerHTML=`
    <div class="flex items-center gap-10" style="margin-bottom:16px">
      <button class="btn btn-ghost btn-sm" onclick="renderInventoryList()" style="color:#64748b">Orqaga</button>
      <div style="font-size:16px;font-weight:700">Inventarizatsiya natijasi: ${inv.id}</div>
    </div>
    <div class="stat-grid" style="margin-bottom:16px">
      <div class="stat-card" style="border-color:#6366f1"><div class="stat-card-header"><span class="stat-card-title">Sana</span></div><div class="stat-value" style="font-size:16px">${fmtDate(inv.date)}</div><div class="stat-sub">Bajaruvchi: ${inv.by}</div></div>
      <div class="stat-card" style="border-color:#22c55e"><div class="stat-card-header"><span class="stat-card-title">Mos mahsulotlar</span></div><div class="stat-value" style="color:#16a34a">${okCount}</div><div class="stat-sub">Qoldiq to'g'ri</div></div>
      <div class="stat-card" style="border-color:#ef4444"><div class="stat-card-header"><span class="stat-card-title">Farq (peresort/kamomat)</span></div><div class="stat-value" style="color:#dc2626">${badCount}</div><div class="stat-sub">Tekshirish talab qilinadi</div></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Batafsil natija</span>${inv.status==='open'?badge('Ochiq','yellow'):badge('Yakunlangan','green')}</div>
      <div style="overflow:auto">
      <table><thead><tr><th>ID</th><th>Mahsulot</th><th>Kategoriya</th><th style="text-align:center">Bazada</th><th style="text-align:center">Fakticheski</th><th style="text-align:center">Natija</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="6" style="text-align:center;padding:20px;color:#94a3b8">Ma\'lumot yo\'q</td></tr>'}</tbody></table>
      </div>
    </div>`;
}

function calcSmenaDiff(smenaRev){
  const faktual=parseFloat((document.getElementById('smena-faktual')||{}).value||0)||0;
  const diff=faktual-smenaRev;
  const box=document.getElementById('smena-diff-box');
  const val=document.getElementById('smena-diff-val');
  if(!box||!val)return;
  if(faktual===0){box.style.display='none';return;}
  box.style.display='block';
  box.style.background=diff>=0?'#f0fdf4':'#fef2f2';
  val.style.color=diff>=0?'#16a34a':'#ef4444';
  val.textContent=(diff>=0?'+ ':'')+fmt(diff);
}

function closeSmena(smenaRev){
  const faktual=parseFloat((document.getElementById('smena-faktual')||{}).value||0)||0;
  const note=((document.getElementById('smena-note')||{}).value||'').trim();
  if(!faktual){toast('Fakticheski summani kiriting!','error');return;}
  const diff=faktual-smenaRev;
  const closedSmenaId=currentSmenaId;

  // Joriy smenani yopish
  smenas=smenas.map(s=>s.id===closedSmenaId?{...s,closed:true,closeTime:new Date().toISOString(),closeBy:currentUser.name,faktual,smenaRev,diff,note}:s);

  // Smena foydasi harajat sifatida saqlash
  expenses.push({
    id:Date.now(),
    category:'Smena foydasi',
    desc:`Smena #${closedSmenaId} yopildi. Fakticheski: ${fmt(faktual)}, Tushum: ${fmt(smenaRev)}${note?'. '+note:''}`,
    amount:Math.abs(diff),
    type:'smena_profit',
    profit:diff,
    smenaId:closedSmenaId,
    branchId:currentBranchId||null,
    date:new Date().toISOString(),
    by:currentUser.name
  });

  // Yangi smena ochish
  currentSmenaId='SM-'+Date.now().toString(36).toUpperCase();
  smenas.push({id:currentSmenaId,openTime:new Date().toISOString(),openBy:currentUser.name,closed:false,branchId:currentBranchId||null});

  save();
  closeModal();
  toast(diff>=0?`Smena yopildi! Foyda: +${fmt(diff)}`:`Smena yopildi. Kamomad: ${fmt(diff)}`);
  isMobile()?renderMobileCashier():renderCashier();
}

function openEditSmenaModal(smenaId){
  const s=smenas.find(x=>x.id===smenaId);
  if(!s)return;
  openModal('Smenani tahrirlash',`
    <div style="background:rgba(255,255,255,.03);border-radius:10px;padding:12px;margin-bottom:16px;font-size:12px;color:#64748b">
      Smena: <b style="color:#6366f1">${s.id}</b><br>
      Ochilgan: ${fmtDate(s.openTime)} · Yopilgan: ${s.closeTime?fmtDate(s.closeTime):'—'}
    </div>
    <div class="form-group"><label class="form-label">Fakticheski summa (so'm)</label><input id="edit-smena-faktual" type="number" class="form-input" value="${s.faktual||0}" /></div>
    <div class="form-group"><label class="form-label">Izoh</label><input id="edit-smena-note" class="form-input" value="${s.note||''}" /></div>
    <div class="flex gap-10">
      <button class="btn btn-primary btn-md" onclick="saveSmenaEdit('${smenaId}')">${svgIcon('check',16)} Saqlash</button>
      <button class="btn btn-ghost btn-md" onclick="closeModal()">Bekor</button>
    </div>`,420);
}

function saveSmenaEdit(smenaId){
  const s=smenas.find(x=>x.id===smenaId);
  if(!s)return;
  const faktual=parseFloat((document.getElementById('edit-smena-faktual')||{}).value||0);
  const note=((document.getElementById('edit-smena-note')||{}).value||'').trim();
  const diff=faktual-(s.smenaRev||0);

  smenas=smenas.map(x=>x.id===smenaId?{...x,faktual,diff,note}:x);

  // Bog'liq smena_profit harajatini ham yangilash
  expenses=expenses.map(e=>{
    if(e.type==='smena_profit'&&e.smenaId===smenaId){
      return{...e,amount:Math.abs(diff),profit:diff,desc:`Smena #${smenaId} yopildi. Fakticheski: ${fmt(faktual)}, Tushum: ${fmt(s.smenaRev||0)}${note?'. '+note:''}`};
    }
    return e;
  });

  save();
  closeModal();
  toast('Smena ma\'lumotlari yangilandi!');
  renderOperations();
}

function deleteSmenaHistory(smenaId){
  if(currentUser.role!=='admin'){toast('Ruxsat yo\'q!','error');return;}
  confirmDialog('Bu smena tarixini o\'chirishni tasdiqlaysizmi?',()=>{
    smenas=smenas.filter(s=>s.id!==smenaId);
    expenses=expenses.filter(e=>!(e.type==='smena_profit'&&e.smenaId===smenaId));
    save();
    toast('Smena tarixi o\'chirildi!','error');
    renderOperations();
  });
}

function exportDebtsExcel(fromDate='',toDate='',statusF='',custF=''){
  let filtered=[...debts];
  if(fromDate){const fd=new Date(fromDate);filtered=filtered.filter(d=>new Date(d.date)>=fd);}
  if(toDate){const td=new Date(toDate);td.setHours(23,59,59);filtered=filtered.filter(d=>new Date(d.date)<=td);}
  if(statusF)filtered=filtered.filter(d=>d.status===statusF);
  if(custF)filtered=filtered.filter(d=>d.customerName.toLowerCase().includes(custF.toLowerCase())||d.phone.includes(custF));
  if(filtered.length===0){toast('Qarzlar yo\'q!','error');return;}
  const headers=['ID','Sana','Mijoz ismi','Telefon','Ish joyi','Mahsulot','Summa','To\'langan','Qoldiq','Holat','Izoh','Kim berdi'];
  const rows=filtered.map(d=>{
    const itemsText=d.items.map(i=>`${i.name}x${i.qty}`).join(', ');
    return[d.id,fmtDate(d.date),d.customerName,d.phone,d.workplace||'',itemsText,d.amount,d.paidAmount,d.amount-d.paidAmount,d.status==='paid'?'To\'langan':'Ochiq',d.note||'',d.by];
  });
  const totAmt=filtered.reduce((s,d)=>s+d.amount,0);
  const totPaid=filtered.reduce((s,d)=>s+d.paidAmount,0);
  rows.push(['JAMI:','','','','','',totAmt,totPaid,totAmt-totPaid,'','','']);
  downloadXlsx('qarzlar_'+new Date().toISOString().slice(0,10)+'.xlsx', headers, rows);
  toast('Qarzlar Excel yuklab olindi!');
}

      </div>
    </div>

    </div>
    <div class="flex gap-10">
      <button class="btn btn-success btn-md" onclick="confirmDebtPay()">${svgIcon('check',16)} Tasdiqlash</button>
      <button class="btn btn-ghost btn-md" onclick="closeModal()">Bekor</button>
    </div>`,420);
}

function confirmDebtPay(){
  const d=debts.find(x=>x.id===_payDebtId);
  if(!d)return;
  const remaining=d.amount-d.paidAmount;
  const payAmt=parseFloat((document.getElementById('debt-pay-amount')||{}).value||0);
  if(!payAmt||payAmt<=0){toast('To\'lov summasini kiriting!','error');return;}
  if(payAmt>remaining){toast('Kiritilgan summa qoldiqdan ko\'p!','error');return;}

  const newPaid=d.paidAmount+payAmt;
  const fullyPaid=newPaid>=d.amount;

  debts=debts.map(x=>x.id===d.id?{...x,paidAmount:newPaid,status:fullyPaid?'paid':'open',paidDate:fullyPaid?new Date().toISOString():x.paidDate}:x);

  // To'lov kassaga orders orqali qo'shiladi
  const oid=genId('ORD');
  orders.push({
    id:oid, date:new Date().toISOString(),
    items:fullyPaid?d.items.map(i=>({...i})):[{pid:'DEBT-PAY',name:'Qarz to\'lovi: '+d.customerName,qty:1,price:payAmt}],
    total:payAmt, discount:0, payType:'naqd',
    cashier:currentUser.name, returnedItems:[],
    smenaId:currentSmenaId, fromDebt:d.id,
    isPartialDebtPay:!fullyPaid
  });

  // Qarz summasi vs mahsulot narxi farqi — smena tarixiga yozish
  // Masalan: mahsulot 5000, qarz 10000 → qo'shimcha foyda 5000 bor
  // Bu qo'shimcha farqni `expenses` da `smena_profit` sifatida qayd qilamiz
  const actualAmount=d.actualAmount||(d.items||[]).reduce((s,i)=>s+i.price*i.qty,0)||payAmt;
  // To'liq to'langanda faqat
  if(fullyPaid){
    const extraProfit=d.amount-actualAmount;
    if(extraProfit!==0){
      expenses.push({
        id:genId('EXP'), date:new Date().toISOString(),
        category:'Qarz farqi', type:'smena_profit',
        desc:`Qarz to'lovi: ${d.customerName} (Mahsulot: ${fmt(actualAmount)}, Qarz: ${fmt(d.amount)})`,
        amount:0, profit:extraProfit,
        by:currentUser.name, smenaId:currentSmenaId
      });
    }
  }

  save();
  closeModal();
  toast(fullyPaid?'Qarz to\'liq yopildi!':'Qisman to\'lov qabul qilindi: '+fmt(payAmt));
  renderDebtsPage();
}

    const readPolyline=isRead?'<polyline points="8,8 14,14 30,2" style="transform:translateX(-7px)"/>':"";
    const readMark=isMe?`<span style="font-size:10px;opacity:.7;margin-top:2px;text-align:right;display:block">
      <svg width="14" height="10" viewBox="0 0 24 16" fill="none" stroke="${readMarkColor}" stroke-width="2.5"><polyline points="1,8 7,14 23,2"/>${readPolyline}</svg>
    </span>`:(!isRead?'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#6366f1;margin-left:6px;vertical-align:middle" title="Yangi xabar"></span>':'');
    return`${dateDiv}<div style="display:flex;flex-direction:column;align-self:${isMe?'flex-end':'flex-start'};max-width:70%">
      ${!isMe?`<div style="font-size:11px;font-weight:700;color:#6366f1;margin-bottom:3px;margin-left:4px">${m.name}</div>`:''}
      <div style="padding:10px 14px;border-radius:${isMe?'14px 14px 4px 14px':'14px 14px 14px 4px'};background:${isMe?'linear-gradient(135deg,#6366f1,#818cf8)':isRead?'#f1f5f9':'#eff6ff'};color:${isMe?'#fff':'#1e293b'};font-size:14px;line-height:1.5;word-break:break-word;${!isRead&&!isMe?'border:1.5px solid #c7d2fe;':''}">
        ${m.text}${readMark}
        <div style="font-size:10px;margin-top:4px;text-align:right;opacity:.65">${timeStr}${!isRead&&!isMe?' · <b style="color:#6366f1">Yangi</b>':isRead&&!isMe?' · <span style="opacity:.7">O\'qildi</span>':''}</div>
      </div>
    </div>`;
  }).join('');
  box.innerHTML=html;
  box.scrollTop=box.scrollHeight;
  chatLastRead=Date.now();
  lsSet('chatLastRead',chatLastRead);
  updateNavChatBadge();
}

// ===== SMENA EDIT/DELETE =====
function editSmenaEntry(id){
  const e=expenses.find(x=>x.id===id);
  if(!e)return;
  openModal('Smena yozuvini tahrirlash',`
    <div class="form-group">
      <label class="form-label">Foyda summasi (so'm)</label>
      <input id="edit-smena-amount" type="number" class="form-input" value="${Math.abs(e.profit||e.amount)}" />
    </div>
    <div class="form-group">
      <label class="form-label">Izoh</label>
      <input id="edit-smena-desc" class="form-input" value="${e.desc||''}" />
    </div>
    <div class="flex gap-10">
      <button class="btn btn-primary btn-md" onclick="saveSmenaEdit(${id})">${svgIcon('check',16)} Saqlash</button>
      <button class="btn btn-ghost btn-md" onclick="closeModal()">Bekor</button>
    </div>`,400);
}

function saveSmenaEdit(id){
  const amount=parseFloat((document.getElementById('edit-smena-amount')||{}).value||0);
  const desc=((document.getElementById('edit-smena-desc')||{}).value||'').trim();
  if(!amount){toast('Summa majburiy!','error');return;}
  expenses=expenses.map(e=>e.id===id?{...e,amount,profit:amount,desc}:e);
  save();
  toast('Smena yozuvi yangilandi!');
  closeModal();
  renderOperations();
}

function deleteSmenaEntry(id){
  confirmDialog('Bu smena yozuvini o\'chirishni tasdiqlaysizmi?',()=>{
    expenses=expenses.filter(e=>e.id!==id);
    save();
    toast('Smena yozuvi o\'chirildi!','error');
    renderOperations();
  });
}

async function sendChatMsg(){
  if(!currentUser)return;
  const inp=document.getElementById('chat-page-input');
  const text=((inp||{}).value||'').trim();
  if(!text)return;
  inp.value='';
  const msg={uid:currentUser.id,name:currentUser.name,avatar:currentUser.avatar,text,toUid:chatToUid,time:Date.now()};
  chatMessages.push(msg);
  if(chatMessages.length>500)chatMessages=chatMessages.slice(-500);
  refreshChatMessages();
  if(GAS_URL){
    try { await gasCall('sendChat', msg); } catch(e){ console.error('Chat send error',e); }
  }
}

async function checkNewChatMessages(){
  if(!currentUser||!GAS_URL)return;
  try{
    const newMsgs=await gasCall('getChat',{since:chatLastMsgTime});
    if(newMsgs&&newMsgs.length>0){
      const relevant=newMsgs.filter(m=>!chatMessages.find(c=>c.uid===m.uid&&c.time===m.time));
      relevant.forEach(m=>chatMessages.push(m));
      chatMessages.sort((a,b)=>a.time-b.time);
      if(chatMessages.length>500)chatMessages=chatMessages.slice(-500);
      chatLastMsgTime=Math.max(...newMsgs.map(m=>m.time),chatLastMsgTime);
      const incomingForMe=relevant.filter(m=>m.uid!==currentUser.id&&(!m.toUid||m.toUid===''||String(m.toUid)===String(currentUser.id)));
      if(incomingForMe.length>0){
        playBeep('chat');
        if(chatOnPage)refreshChatMessages();
      }
    }
  }catch(e){}
}

// ===== SOUND BEEP =====
function playBeep(type='success'){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    if(type==='success'){
      osc.frequency.setValueAtTime(880,ctx.currentTime);
      osc.frequency.setValueAtTime(1100,ctx.currentTime+0.08);
      gain.gain.setValueAtTime(0.3,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime+0.25);
    } else if(type==='error'){
      osc.frequency.setValueAtTime(300,ctx.currentTime);
      osc.frequency.setValueAtTime(200,ctx.currentTime+0.1);
      gain.gain.setValueAtTime(0.3,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime+0.3);
    } else if(type==='chat'){
      // Pleasant ding for new message
      const osc2=ctx.createOscillator();
      const gain2=ctx.createGain();
      osc2.connect(gain2);gain2.connect(ctx.destination);
      osc.frequency.setValueAtTime(660,ctx.currentTime);
      gain.gain.setValueAtTime(0.2,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.3);
      osc2.frequency.setValueAtTime(880,ctx.currentTime+0.1);
      gain2.gain.setValueAtTime(0.15,ctx.currentTime+0.1);
      gain2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.35);
      osc2.start(ctx.currentTime+0.1);osc2.stop(ctx.currentTime+0.35);
      return;
      // Short double beep for inventory scan
      osc.frequency.setValueAtTime(1200,ctx.currentTime);
      gain.gain.setValueAtTime(0.25,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime+0.12);
    }
  }catch(e){}
}

function confirmReset(){
  confirmDialog('DIQQAT! Barcha buyurtmalar, harajatlar tozalanadi. Davom etasizmi?',()=>{
    orders=[];
    expenses=[];
    save();
    toast("Ma'lumotlar tozalandi!",'info');
    renderUsers();
  });
}
