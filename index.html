<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Cases</title>
<style>
/* ============================================================
   PRO CASES — DARK GLASS THEME (Glassmorphism)
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07071a;--bg2:#0d0d24;
  --glass:rgba(255,255,255,.04);--glass-hover:rgba(255,255,255,.07);
  --glass-border:rgba(255,255,255,.08);--glass-strong:rgba(255,255,255,.1);
  --accent:#6366f1;--accent2:#a78bfa;--accent3:#818cf8;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#475569;
  --success:#22c55e;--warning:#f59e0b;--danger:#ef4444;--info:#38bdf8;
  --radius:16px;--radius-sm:10px;--radius-lg:20px;
}
body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);background-image:radial-gradient(ellipse at 15% 15%,rgba(99,102,241,.12) 0%,transparent 50%),radial-gradient(ellipse at 85% 85%,rgba(139,92,246,.08) 0%,transparent 50%);background-attachment:fixed;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:rgba(255,255,255,.02)}::-webkit-scrollbar-thumb{background:rgba(99,102,241,.3);border-radius:3px}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes modalIn{from{transform:scale(.96) translateY(8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes spin{to{transform:rotate(360deg)}}
/* Push bildirishnoma animatsiyalari */
@keyframes pushIn{from{opacity:0;transform:translateX(60px) scale(.9)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes pushOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(60px)}}

@keyframes pushIn{from{opacity:0;transform:translateX(60px) scale(.9)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes pushOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(60px)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 12px rgba(99,102,241,.3)}50%{box-shadow:0 0 24px rgba(99,102,241,.6)}}
.app{display:flex;min-height:100vh}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.sidebar{width:240px;min-height:100vh;background:rgba(7,7,26,.85);backdrop-filter:blur(20px);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;transition:width .3s;overflow:hidden}
.sidebar.collapsed{width:68px}
.sidebar-logo{padding:20px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--glass-border)}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;flex-shrink:0;box-shadow:0 4px 14px rgba(99,102,241,.4)}
.logo-text{color:#fff;font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden}
.nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:3px}
.nav-item{background:transparent;border:none;cursor:pointer;border-radius:var(--radius-sm);padding:10px 12px;display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.5);text-align:left;width:100%;font-size:13.5px;font-weight:500;font-family:inherit;transition:all .18s,transform .08s;position:relative}
.nav-item:hover{background:var(--glass-hover);color:rgba(255,255,255,.85)}
.nav-item.active{background:linear-gradient(135deg,rgba(99,102,241,.3),rgba(129,140,248,.15));color:#fff;border:1px solid rgba(99,102,241,.35);box-shadow:0 4px 16px rgba(99,102,241,.2),inset 0 1px 0 rgba(255,255,255,.06)}
.nav-item:active{transform:scale(.97)}
.nav-item span.label{white-space:nowrap;overflow:hidden}
.sidebar-bottom{padding:10px 8px;border-top:1px solid var(--glass-border);flex-shrink:0}
.sidebar .nav{overflow-y:auto;overflow-x:hidden}
.sidebar .nav::-webkit-scrollbar{width:3px}
.sidebar .nav::-webkit-scrollbar-thumb{background:rgba(99,102,241,.3);border-radius:2px}
.topbar{background:rgba(7,7,26,.8);backdrop-filter:blur(16px);border-bottom:1px solid var(--glass-border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:17px;font-weight:700;color:#f1f5f9}
.menu-btn{background:var(--glass);border:1px solid var(--glass-border);cursor:pointer;color:var(--text2);display:flex;padding:7px;border-radius:9px;transition:all .15s}
.menu-btn:hover{background:var(--glass-hover);color:var(--text)}
.user-info{display:flex;align-items:center;gap:10px}
.user-name{font-size:13px;font-weight:700;color:var(--text);text-align:right}
.user-role{font-size:11px;color:var(--text2)}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0;box-shadow:0 0 12px rgba(99,102,241,.4)}
.page-content{flex:1;padding:22px;animation:slideUp .26s ease}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(12px);border-radius:var(--radius);padding:18px;border-left:none;position:relative;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.stat-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.5}
.stat-card:hover{border-color:rgba(99,102,241,.3);box-shadow:0 8px 32px rgba(99,102,241,.1)}
.stat-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.stat-card-title{font-size:12px;color:var(--text2);font-weight:500;letter-spacing:.02em}
.stat-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.stat-value{font-size:22px;font-weight:800;color:var(--text)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.card{background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(12px);border-radius:var(--radius);padding:20px;margin-bottom:14px;transition:border-color .2s}
.card:hover{border-color:rgba(255,255,255,.12)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:15px;font-weight:700;color:var(--text)}
table{width:100%;border-collapse:collapse}
thead tr{background:rgba(255,255,255,.03)}
th{padding:10px 12px;text-align:left;font-size:11px;color:var(--text2);font-weight:600;letter-spacing:.05em;text-transform:uppercase}
td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;color:var(--text)}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block}
.badge-blue{background:rgba(56,189,248,.15);color:#7dd3fc;border:1px solid rgba(56,189,248,.2)}
.badge-green{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.badge-red{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.badge-yellow{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.badge-purple{background:rgba(139,92,246,.15);color:#c4b5fd;border:1px solid rgba(139,92,246,.2)}
.badge-gray{background:rgba(255,255,255,.06);color:var(--text2);border:1px solid var(--glass-border)}
.btn{border:none;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .18s;border-radius:var(--radius-sm);font-family:inherit}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-md{padding:9px 16px;font-size:13px}
.btn-lg{padding:13px 26px;font-size:15px}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.35)}
.btn-primary:hover{box-shadow:0 6px 20px rgba(99,102,241,.5);transform:translateY(-1px)}
.btn-danger{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;box-shadow:0 4px 14px rgba(239,68,68,.25)}
.btn-success{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;box-shadow:0 4px 14px rgba(34,197,94,.25)}
.btn-warning{background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff;box-shadow:0 4px 14px rgba(245,158,11,.25)}
.btn-outline{background:var(--glass);color:var(--accent2);border:1px solid rgba(99,102,241,.4)}
.btn-outline:hover{background:rgba(99,102,241,.15);border-color:var(--accent)}
.btn-ghost{background:transparent;color:var(--text2)}
.btn-ghost:hover{background:var(--glass);color:var(--text)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:.02em}
.form-input{width:100%;padding:9px 12px;border:1px solid var(--glass-border);border-radius:var(--radius-sm);font-size:13px;color:var(--text);background:rgba(255,255,255,.05);outline:none;transition:border-color .18s,background .18s;font-family:inherit}
.form-input:focus{border-color:rgba(99,102,241,.6);background:rgba(99,102,241,.06)}
.form-input::placeholder{color:var(--text3)}
.form-input:disabled{background:var(--glass);opacity:.6}
select.form-input option{background:#12122a;color:var(--text)}
.input-wrap{position:relative;display:flex;align-items:center}
.input-icon{position:absolute;left:12px;color:var(--text3);display:flex;pointer-events:none}
.input-wrap .form-input{padding-left:38px}
.input-pw-btn{position:absolute;right:10px;background:none;border:none;cursor:pointer;color:var(--text3);display:flex;transition:color .15s}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:rgba(13,13,35,.92);border:1px solid var(--glass-border);backdrop-filter:blur(20px);border-radius:var(--radius-lg);width:100%;max-height:90vh;overflow:auto;box-shadow:0 24px 80px rgba(0,0,0,.6),0 0 0 1px rgba(99,102,241,.1);animation:modalIn .22s ease}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700;color:var(--text)}
.modal-close{background:var(--glass);border:1px solid var(--glass-border);cursor:pointer;color:var(--text2);padding:5px;border-radius:7px;display:flex;align-items:center;transition:all .15s}
.modal-close:hover{background:rgba(239,68,68,.15);color:#f87171;border-color:rgba(239,68,68,.3)}
.modal-body{padding:22px}
.toast-container{position:fixed;top:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:11px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;backdrop-filter:blur(16px);animation:slideIn .3s ease;display:flex;align-items:center;gap:8px;border:1px solid}
.toast-success{background:rgba(34,197,94,.15);color:#4ade80;border-color:rgba(34,197,94,.25)}
.toast-error{background:rgba(239,68,68,.15);color:#f87171;border-color:rgba(239,68,68,.25)}
.toast-info{background:rgba(99,102,241,.15);color:var(--accent2);border-color:rgba(99,102,241,.25)}
.login-page{min-height:100vh;background:var(--bg);background-image:radial-gradient(ellipse at 20% 30%,rgba(99,102,241,.18) 0%,transparent 50%),radial-gradient(ellipse at 80% 70%,rgba(139,92,246,.12) 0%,transparent 50%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.login-bubble{position:absolute;border-radius:50%;background:rgba(99,102,241,.05);border:1px solid rgba(99,102,241,.06)}
.login-card{background:rgba(13,13,35,.88);border:1px solid rgba(99,102,241,.2);backdrop-filter:blur(24px);border-radius:24px;padding:44px 38px;width:100%;max-width:420px;box-shadow:0 32px 100px rgba(0,0,0,.5),0 0 0 1px rgba(99,102,241,.1);position:relative;animation:modalIn .4s ease}
.login-card::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:1px;background:linear-gradient(90deg,transparent,rgba(99,102,241,.6),transparent)}
.login-logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 28px rgba(99,102,241,.5);color:#fff;font-size:28px;font-weight:800;animation:glowPulse 2.5s ease-in-out infinite}
.login-title{text-align:center;margin-bottom:28px}
.login-h1{font-size:24px;font-weight:800;color:var(--text);margin-bottom:6px}
.login-sub{color:var(--text2);font-size:13px}
.cashier-grid{display:grid;grid-template-columns:1fr 360px;gap:18px;min-height:calc(100vh - 102px)}
.cart-table-wrap{flex:1;overflow:auto}
.pay-panel{display:flex;flex-direction:column;gap:12px}
.summary-box{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.15);border-radius:var(--radius-sm);padding:14px;display:flex;flex-direction:column;gap:7px}
.summary-row{display:flex;justify-content:space-between;font-size:13px;color:var(--text2)}
.summary-total{display:flex;justify-content:space-between;font-size:18px;font-weight:800;color:var(--accent2)}
.paytype-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.paytype-btn{padding:10px;border-radius:9px;border:1px solid var(--glass-border);background:var(--glass);cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);transition:all .18s;font-family:inherit}
.paytype-btn:hover{background:var(--glass-hover);border-color:rgba(255,255,255,.15)}
.paytype-btn.active-naqd{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.1);color:#4ade80}
.paytype-btn.active-karta{border-color:rgba(56,189,248,.5);background:rgba(56,189,248,.1);color:#38bdf8}
.paytype-btn.active-aralash{border-color:rgba(245,158,11,.5);background:rgba(245,158,11,.1);color:#fbbf24}
.paytype-btn.active-avto{border-color:rgba(167,139,250,.5);background:rgba(167,139,250,.1);color:var(--accent2)}
.toggle-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.toggle{width:52px;height:28px;border-radius:14px;border:1px solid var(--glass-border);cursor:pointer;position:relative;transition:all .3s;background:rgba(255,255,255,.06)}
.toggle-knob{position:absolute;top:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .3s;box-shadow:0 2px 4px rgba(0,0,0,.3)}
.chart-wrap{display:flex;align-items:flex-end;gap:8px;height:160px}
.chart-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.chart-bar{width:100%;border-radius:6px 6px 0 0;transition:height .5s ease}
.chart-label-val{font-size:10px;color:var(--text3);font-weight:500}
.chart-label-day{font-size:11px;color:var(--text2);font-weight:500}
.tab-bar{display:flex;gap:4px;background:rgba(255,255,255,.04);border:1px solid var(--glass-border);border-radius:var(--radius-sm);padding:4px}
.tab-btn{padding:7px 16px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:var(--text2);transition:all .18s;font-family:inherit}
.tab-btn.active{background:linear-gradient(135deg,rgba(99,102,241,.35),rgba(129,140,248,.2));color:var(--accent2);border:1px solid rgba(99,102,241,.3);box-shadow:0 2px 10px rgba(99,102,241,.2)}
.low-stock-item{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:9px;padding:7px 13px;display:inline-flex;align-items:center;gap:8px;margin:4px}
.receipt{font-family:monospace}
.receipt-header{text-align:center;margin-bottom:16px}
.receipt-items{border-top:1px dashed rgba(255,255,255,.1);border-bottom:1px dashed rgba(255,255,255,.1);padding:12px 0;margin-bottom:12px}
.receipt-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.user-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.user-card{border:1px solid var(--glass-border);border-radius:var(--radius);padding:18px;background:var(--glass);backdrop-filter:blur(8px);transition:border-color .18s,box-shadow .18s;cursor:default}
.user-card:hover{border-color:rgba(99,102,241,.3);box-shadow:0 8px 24px rgba(99,102,241,.1)}
.nakleyka{border:1px dashed rgba(255,255,255,.15);border-radius:var(--radius-sm);padding:20px;text-align:center;margin-bottom:16px;background:var(--glass)}
.warn-box{font-size:12px;color:#fbbf24;margin:0 0 14px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);padding:8px 12px;border-radius:8px}
.inv-scan-box{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.inv-item-green{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);border-radius:9px;padding:10px 13px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.inv-item-red{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:9px;padding:10px 13px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.inv-item-neutral{background:var(--glass);border:1px solid var(--glass-border);border-radius:9px;padding:10px 13px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.price-hist-row td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px}
.divider{height:1px;background:var(--glass-border);margin:8px 0}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-8{gap:8px}.gap-10{gap:10px}.gap-12{gap:12px}.gap-16{gap:16px}.flex-1{flex:1}.wrap{flex-wrap:wrap}
.hidden{display:none}.text-center{text-align:center}.mt-auto{margin-top:auto}.w-full{width:100%}
.two-cols{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.spinner{width:32px;height:32px;border:2px solid rgba(99,102,241,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.spinner-sm{width:18px;height:18px;border-width:2px}
.skeleton{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
.loading-overlay{position:fixed;inset:0;background:rgba(7,7,26,.85);backdrop-filter:blur(6px);z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.loading-text{font-size:14px;font-weight:600;color:var(--accent2);animation:pulse 1.5s ease-in-out infinite}
.page-content{animation:slideUp .26s ease}
.stat-card{animation:scaleIn .3s ease both}
.stat-card:nth-child(1){animation-delay:.04s}.stat-card:nth-child(2){animation-delay:.08s}.stat-card:nth-child(3){animation-delay:.12s}.stat-card:nth-child(4){animation-delay:.16s}
.card{animation:scaleIn .22s ease both}.modal{animation:modalIn .2s ease}
.btn-loading{position:relative;pointer-events:none;opacity:.8}
.btn-loading::after{content:"";position:absolute;right:10px;top:50%;transform:translateY(-50%);width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
.chat-fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent3));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 4px 20px rgba(99,102,241,.4);z-index:500;transition:transform .2s}
.chat-fab:hover{transform:scale(1.08)}
.chat-badge{position:absolute;top:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:#ef4444;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}
.chat-panel{position:fixed;bottom:86px;right:22px;width:340px;height:480px;background:rgba(13,13,35,.92);border:1px solid var(--glass-border);backdrop-filter:blur(20px);border-radius:var(--radius);box-shadow:0 12px 48px rgba(0,0,0,.5);z-index:500;display:flex;flex-direction:column;animation:modalIn .2s ease}

const GAS_URL = 'https://script.google.com/macros/s/AKfycbybmGv1pcno46zGVIgXwZE1XkHmuY6uFFumR3ibLVi__oZVQHD_F7xdQpvG0OavDW5QaQ/exec';
// ============================================================

async function gasCall(action, payload={}) {
  if (!GAS_URL) throw new Error('GAS_URL sozlanmagan');

  // Apps Script bilan ishlash uchun eng ishonchli usul:
  // Kichik so'rovlar uchun GET, katta ma'lumotlar uchun POST
  const payloadStr = JSON.stringify(payload);
  const isSmall = payloadStr.length < 1500;

  let text;
  try {
    if (isSmall && ['login','loadAll','getMeta','getOnline','getChat'].includes(action)) {
      // GET so'rovi — redirect muammosi yo'q
      const url = GAS_URL + '?action=' + encodeURIComponent(action) +
                  '&payload=' + encodeURIComponent(payloadStr);
      const res = await fetch(url, { method: 'GET', redirect: 'follow' });
      text = await res.text();
    } else {
      // POST so'rovi FormData bilan
      const formData = new FormData();
      formData.append('action', action);
      formData.append('payload', payloadStr);
      const res = await fetch(GAS_URL, { method: 'POST', body: formData, redirect: 'follow' });
      text = await res.text();
    }
  } catch(netErr) {
    throw new Error('Tarmoq xatosi: ' + netErr.message + '. Internet aloqasini tekshiring.');
  }

  // HTML javob = deploy muammo
  const trimmed = text.trim();
  if (trimmed.startsWith('<') || trimmed.startsWith('<!')) {
    console.error('GAS HTML response:', text.slice(0, 300));
    throw new Error('Apps Script deploy sozlamalarini tekshiring: Execute as "Me", Access "Anyone"');
  }

  let json;
  try { json = JSON.parse(text); }
  catch(e) { throw new Error('GAS javob JSON emas: ' + text.slice(0, 100)); }
  if (!json.ok) throw new Error(json.error || 'GAS xatosi');
  return json.data;
}

// Local cache
function lsGet(key, def) {
  // 1. Avval xotirada (tezkor)
  if (window._gasData && window._gasData[key] !== undefined) return window._gasData[key];
  // 2. localStorage dan (sahifa qayta yuklanganda)
  try {
    const raw = localStorage.getItem('pos_cache_'+key);
    if (raw !== null) {
      const val = JSON.parse(raw);
      if (!window._gasData) window._gasData = {};
      window._gasData[key] = val; // xotiraga ham yozamiz
      return val;
    }
  } catch(e) {}
  return def;
}
function lsSet(key, val) {
  if (!window._gasData) window._gasData = {};
  window._gasData[key] = val;
  // localStorage ga ham saqlaymiz — ishonchli backup
  try { localStorage.setItem('pos_cache_'+key, JSON.stringify(val)); } catch(e) {}
}

let _savePending = {};
let _saveTimer = null;

function save(sections=null) {
  // Local cache yangilash (darhol UI uchun)
  lsSet('users', users); lsSet('products', products); lsSet('orders', orders);
  lsSet('expenses', expenses); lsSet('categories', categories);
  lsSet('inventories', inventories); lsSet('priceHistory', priceHistory);
  lsSet('expCats', expCats); lsSet('smenas', smenas);
  lsSet('debts', debts); lsSet('damages', damages);
  lsSet('payTypes', payTypes); lsSet('importHistory', importHistory);
  lsSet('purchaseOrders', purchaseOrders); lsSet('partners', partners); lsSet('branches', branches);
  lsSet('pendingDelivery', pendingDelivery);
  lsSet('auditLog', auditLog); lsSet('loyaltyCards', loyaltyCards);
  lsSet('bankAccounts', bankAccounts); lsSet('appSettings', appSettings);

  const toSave = sections || ['users','products','orders','expenses','categories','inventories','priceHistory','expCats','smenas','meta','debts','damages','payTypes','importHistory','purchaseOrders','partners','branches','auditLog','loyaltyCards','bankAccounts','appSettings','pendingDelivery'];
  toSave.forEach(s => { _savePending[s] = true; });
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(flushSave, 400);
}

async function flushSave() {
  const pending = {..._savePending};
  _savePending = {};
  if(!GAS_URL){ showSyncIndicator('local'); return; }
  const promises = [];
  if(pending.users)         promises.push(gasCall('saveUsers', users));
  if(pending.products)      promises.push(gasCall('saveProducts', products));
  if(pending.orders)        promises.push(gasCall('saveOrders', orders));
  if(pending.expenses)      promises.push(gasCall('saveExpenses', expenses));
  if(pending.categories)    promises.push(gasCall('saveCategories', categories));
  if(pending.expCats)       promises.push(gasCall('saveExpCats', expCats));
  if(pending.inventories)   promises.push(gasCall('saveInventories', inventories));
  if(pending.priceHistory)  promises.push(gasCall('savePriceHistory', priceHistory));
  if(pending.smenas)        promises.push(gasCall('saveSmenas', smenas));
  if(pending.debts)         promises.push(gasCall('saveDebts', debts));
  if(pending.damages)       promises.push(gasCall('saveDamages', damages));
  if(pending.payTypes)      promises.push(gasCall('savePayTypes', payTypes));
  if(pending.importHistory) promises.push(gasCall('saveImportHistory', importHistory));
  if(pending.purchaseOrders)promises.push(gasCall('savePurchaseOrders', purchaseOrders));
  if(pending.partners)      promises.push(gasCall('savePartners', partners));
  if(pending.branches)      promises.push(gasCall('saveBranches', branches));
  if(pending.pendingDelivery) promises.push(gasCall('savePendingDelivery', pendingDelivery));
  if(pending.auditLog)      promises.push(gasCall('saveAuditLog', auditLog));
  if(pending.loyaltyCards)  promises.push(gasCall('saveLoyaltyCards', loyaltyCards));
  if(pending.bankAccounts)  promises.push(gasCall('saveBankAccounts', bankAccounts));
  if(pending.appSettings)   promises.push(gasCall('saveAppSettings', appSettings));
  if(pending.meta)          promises.push(gasCall('saveMeta', {currentSmenaId}));
  if(promises.length===0) return;
  try {
    showSyncIndicator('saving');
    await Promise.all(promises);
    showSyncIndicator('saved');
    showPushNotif('saved',"Ma'lumotlar saqlandi");
  } catch(e) {
    console.warn('Save error (offline?):', e.message);
    showSyncIndicator('error');
    showPushNotif('error','Saqlashda xatolik! Internet aloqasini tekshiring.');
    // Keyingi urinishda qayta sinab ko'rish
    Object.assign(_savePending, pending);
  }
}

function showSyncIndicator(state) {
  let el = document.getElementById('sync-indicator');
  if (!el) return;
  if (state === 'saved') {
    el.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg> Saqlandi';
    el.style.color = '#16a34a';
    showPushNotif('saved', 'Ma\'lumotlar saqlandi');
    setTimeout(() => { if(el) el.innerHTML = ''; }, 2000);
  } else if (state === 'local') {
    el.innerHTML = 'Oflayn';
    el.style.color = '#f59e0b';
    setTimeout(() => { if(el) el.innerHTML = ''; }, 2000);
  } else if (state === 'saving') {
    el.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin .6s linear infinite"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg> Saqlanmoqda...';
    el.style.color = '#6366f1';
  } else {
    el.innerHTML = 'Xato!';
    el.style.color = '#ef4444';
    showPushNotif('error', 'Saqlashda xatolik! Internet aloqasini tekshiring.');
  }
}

// Push notification (yuqori o'ngda)
let _pushTimer = null;
function showPushNotif(type, msg) {
  let box = document.getElementById('push-notif-box');
  if (!box) {
    box = document.createElement('div');
    box.id = 'push-notif-box';
    box.style.cssText = 'position:fixed;top:16px;right:16px;z-index:99999;display:flex;flex-direction:column;gap:8px;pointer-events:none';
    document.body.appendChild(box);
  }
  clearTimeout(_pushTimer);

  const notif = document.createElement('div');
  const isErr = type === 'error';
  notif.style.cssText = `
    display:flex;align-items:center;gap:10px;
    padding:12px 16px;border-radius:12px;
    background:${isErr ? 'rgba(239,68,68,.95)' : 'rgba(22,163,74,.95)'};
    color:#fff;font-size:13px;font-weight:600;
    box-shadow:0 8px 32px rgba(0,0,0,.25);
    backdrop-filter:blur(12px);
    border:1px solid ${isErr ? 'rgba(255,255,255,.15)' : 'rgba(255,255,255,.2)'};
    pointer-events:auto;cursor:pointer;
    animation:pushIn .25s cubic-bezier(.34,1.56,.64,1) both;
    min-width:220px;max-width:320px;
  `;
  notif.innerHTML = `
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      ${isErr
        ? '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'
        : '<polyline points="20,6 9,17 4,12"/>'}
    </svg>
    <span style="flex:1">${msg}</span>
    <button onclick="this.parentElement.remove()" style="background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;padding:0;font-size:16px;line-height:1">×</button>
  `;
  notif.onclick = () => notif.remove();
  box.appendChild(notif);

  // Avtomatik yo'qolish
  const delay = isErr ? 5000 : 2500;
  setTimeout(() => {
    notif.style.animation = 'pushOut .2s ease-in both';
    setTimeout(() => notif.remove(), 200);
  }, delay);
}

function hasPerm(key){
  if(!currentUser)return false;
  // Admin roli (asosiy yoki qo'shimcha) — to'liq ruxsat
  const roles=currentUser.roles||[currentUser.role];
  if(roles.includes('admin'))return true;
  // Rol bo'yicha avtomatik ruxsatlar
  const rolePerms={
    cashier:   ['dashboard','cashier','orders'],
    warehouse: ['dashboard','warehouse','inventory','warehouse_add','warehouse_bulk','warehouse_edit'],
    supplier:  ['dashboard','warehouse'],
    accountant:['dashboard','operations','orders','debts'],
    viewer:    ['dashboard'],
  };
  for(const r of roles){
    if((rolePerms[r]||[]).includes(key))return true;
  }
  // Individual ruxsatlar
  const p=currentUser.perms||{};
  return !!p[key];
}

function getDeviceInfo(){
  const ua=navigator.userAgent;
  let device='Kompyuter';
  let browser='Noma\'lum';
  let os='Noma\'lum';
  if(/Android/i.test(ua)) device='Android telefon/planshet';
  else if(/iPhone|iPad|iPod/i.test(ua)) device='iPhone/iPad';
  else if(/Windows/i.test(ua)) device='Windows PC';
  else if(/Mac/i.test(ua)) device='Mac';
  else if(/Linux/i.test(ua)) device='Linux';
  if(/Chrome\/[0-9]+/.test(ua)&&!/Chromium|Edge|OPR/.test(ua)) browser='Chrome';
  else if(/Firefox/i.test(ua)) browser='Firefox';
  else if(/Safari/i.test(ua)&&!/Chrome/i.test(ua)) browser='Safari';
  else if(/Edge/i.test(ua)) browser='Edge';
  return {device, browser, os};
}

function getNavOrder(){
  const key='pos_nav_order_'+(window._navUserId||'default');
  try{
    const saved=JSON.parse(localStorage.getItem(key)||'null');
    if(saved&&Array.isArray(saved))return saved;
  }catch(e){}
  return ALL_NAV_ITEMS.map(i=>i.page);
}

function saveNavOrder(order){
  const key='pos_nav_order_'+(window._navUserId||'default');
  localStorage.setItem(key,JSON.stringify(order));
}

function renderSidebarNav(){
  const nav=document.getElementById('sidebar-nav');
  if(!nav)return;
  const order=getNavOrder();
  // Tartiblangan va filtrlangan itemlar
  const sorted=order.map(p=>ALL_NAV_ITEMS.find(i=>i.page===p)).filter(Boolean);
  // Tartibda bo'lmagan yangi itemlarni oxiriga qo'shamiz
  ALL_NAV_ITEMS.forEach(i=>{if(!sorted.find(s=>s.page===i.page))sorted.push(i);});

  nav.innerHTML=sorted.map(item=>`
    <button class="nav-item" data-page="${item.page}" onclick="goPage('${item.page}')"
      draggable="true"

// Drag-drop handlers
let _dragSrcPage=null;
function navDragStart(e,page){
  _dragSrcPage=page;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function navDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drag-over');
}
function navDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}
function navDrop(e,targetPage){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!_dragSrcPage||_dragSrcPage===targetPage)return;
  const order=getNavOrder();
  const from=order.indexOf(_dragSrcPage);
  const to=order.indexOf(targetPage);
  if(from>=0&&to>=0){
    order.splice(from,1);
    order.splice(to,0,_dragSrcPage);
    saveNavOrder(order);
    renderSidebarNav();
    // Active state ni qayta belgilash
    const active=document.querySelector('.page-content')&&document.getElementById('page-title');
    if(active){
      const curPage=Object.entries(pageTitles).find(([k,v])=>v===active.textContent);
      if(curPage)document.querySelectorAll('#sidebar-nav .nav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===curPage[0]));
    }
    toast('Tartib saqlandi!');
  }
}
function navDragEnd(e){
  e.target.classList.remove('dragging');
  document.querySelectorAll('#sidebar-nav .nav-item').forEach(el=>el.classList.remove('drag-over'));
  _dragSrcPage=null;
}

async function doLogin(){
  const l=document.getElementById('login-input').value.trim();
  const p=document.getElementById('pass-input').value;
  const btn=document.querySelector('#login-page .btn-primary');
  if(!l||!p){toast('Login va parolni kiriting!','error');return;}
  if(btn){btn.disabled=true;btn.textContent='Tekshirilmoqda...';}
  try {
    let u=null;
    if(GAS_URL){
      try{
        u = await gasCall('login', {login:l, password:p});
        const allData = await gasCall('loadAll');
        window._gasData = {};
        users=allData.users||users; products=allData.products||products;
        orders=allData.orders||orders; expenses=allData.expenses||expenses;
        categories=allData.categories||categories; expCats=allData.expCats||expCats;
        inventories=allData.inventories||inventories; priceHistory=allData.priceHistory||priceHistory;
        smenas=allData.smenas||smenas; debts=allData.debts||debts; damages=allData.damages||damages;
        importHistory=allData.importHistory||importHistory;
        purchaseOrders=allData.purchaseOrders||purchaseOrders;
        partners=allData.partners||partners; branches=allData.branches||branches;
        payTypes=(allData.payTypes&&allData.payTypes.length)?allData.payTypes:payTypes;
        if((allData.meta||{}).currentSmenaId) currentSmenaId=allData.meta.currentSmenaId;
        // localStorage cache ga ham yozamiz
        lsSet('users',users); lsSet('products',products); lsSet('orders',orders);
        lsSet('expenses',expenses); lsSet('smenas',smenas); lsSet('debts',debts);
        lsSet('importHistory',importHistory); lsSet('purchaseOrders',purchaseOrders);
        lsSet('partners',partners); lsSet('branches',branches);
      }catch(gasErr){
        // GAS ishlamasa — lokal foydalanuvchilardan qidirish
        console.warn('GAS login failed, trying local:', gasErr.message);
        u = users.find(x=>x.login===l&&x.password===p);
        if(!u) throw new Error('Login yoki parol noto\'g\'ri!');
      }
    } else {
      // GAS URL yo'q — faqat lokal
      u = users.find(x=>x.login===l&&x.password===p);
      if(!u) throw new Error('Login yoki parol noto\'g\'ri!');
    }

    currentUser=u;
    sessionStorage.setItem('pos_session', u.id);
    sessionStorage.setItem('pos_loginTime', new Date().toISOString());

    if(u.role!=='admin'){
      const userBranch=branches.find(b=>(b.staffIds||[]).some(sid=>String(sid)===String(u.id))||String(b.managerId)===String(u.id));
      if(userBranch){ currentBranchId=userBranch.id; localStorage.setItem('pos_branch',userBranch.id); }
    }

    if(btn){btn.disabled=false;btn.textContent='Kirish';}
    if(u.mustChangePw){
      document.getElementById('login-page').classList.add('hidden');
      document.getElementById('change-pw-page').classList.remove('hidden');
      return;
    }
    startApp();
  } catch(e) {
    if(btn){btn.disabled=false;btn.textContent='Kirish';}
    toast(e.message||'Login yoki parol noto\'g\'ri!','error');
  }
}

// ===== QO'LDA YANGILASH (avtomatik interval o'chirildi) =====
async function manualRefresh(){
  if(!GAS_URL||!currentUser)return;
  const btn=document.getElementById('refresh-btn');
  const icon=document.getElementById('refresh-icon');
  if(btn)btn.disabled=true;
  if(icon)icon.style.animation='spin .6s linear infinite';
  try{
    const allData=await gasCall('loadAll');
    window._gasData={};
    users=allData.users||users; products=allData.products||products;
    orders=allData.orders||orders; expenses=allData.expenses||expenses;
    categories=allData.categories||categories; expCats=allData.expCats||expCats;
    inventories=allData.inventories||inventories; priceHistory=allData.priceHistory||priceHistory;
    smenas=allData.smenas||smenas; debts=allData.debts||debts; damages=allData.damages||damages;
    importHistory=allData.importHistory||importHistory;
    purchaseOrders=allData.purchaseOrders||purchaseOrders;
    partners=allData.partners||partners; branches=allData.branches||branches;
    payTypes=(allData.payTypes&&allData.payTypes.length)?allData.payTypes:payTypes;
    if((allData.meta||{}).currentSmenaId) currentSmenaId=allData.meta.currentSmenaId;
    const activePage=(document.querySelector('#sidebar-nav .nav-item.active')||{}).dataset.page;
    if(activePage){
      switch(activePage){
        case'dashboard':renderDashboard();break;
        case'cashier':isMobile()?renderMobileCashier():renderCashier();break;
        case'orders':renderDeliveryPage();break;
        case'warehouse':renderWarehouse();break;
        case'inventory':activeInv?renderActiveInventory():renderInventoryList();break;
        case'operations':renderOperations();break;
        case'users':renderUsers();break;
        case'debts':renderDebtsPage();break;
      }
    }
    toast('Ma\'lumotlar yangilandi!');
    updateBranchSelector();
  }catch(e){
    console.warn('Manual refresh error',e);
    toast('Yangilashda xato: '+e.message,'error');
  }finally{
    if(btn)btn.disabled=false;
    if(icon)icon.style.animation='';
  }
}

// ===== REVENUE HELPERS =====
// Haqiqiy tushum: yopilgan smenalar faktual + joriy smena savdo (qaytarilgansiz)
function calcRealRevenue(orderList){
  let rev=0;
  // Yopilgan smena bo'yicha: o'sha smena faktual summasini ishlatamiz
  const closedSmenaIds=new Set(smenas.filter(s=>s.closed).map(s=>s.id));
  // Joriy smena orderlari uchun: to'liq sotilgan summa (qaytarilgan AYIRILMAYDI)
  // Chunki qaytarish — pul kassadan chiqmaydi, faqat tovar qaytadi.
  // Kassadan pul chiqishi faqat "Harajat > Qaytarish" orqali alohida amalga oshiriladi.
  orderList.forEach(o=>{
    if(closedSmenaIds.has(o.smenaId)){
      // Bu smena uchun faktual hisob alohida — smena darajasida (quyida qo'shiladi)
    } else {
      // Joriy/ochiq smena — to'liq sotilgan summa, qaytarilgan ayirilmaydi
      rev+=o.total;
    }
  });
  // Yopilgan smenalar uchun faktual qo'shamiz (faqat shu orderlar tegishli smena faktual)
  const smenaMap={};
  smenas.filter(s=>s.closed&&s.faktual!=null).forEach(s=>{smenaMap[s.id]=s;});
  // Qaysi smena orderlar bor? Orderlar ichida yopilgan smena ID lari
  const coveredSmenas=new Set();
  orderList.forEach(o=>{if(closedSmenaIds.has(o.smenaId))coveredSmenas.add(o.smenaId);});
  coveredSmenas.forEach(sid=>{if(smenaMap[sid])rev+=smenaMap[sid].faktual;});
  return rev;
}

// Savdo summasi (sotilgan summa, qaytarilganni hisobga olmasdan — kassa qoldiqqa mos)
function orderNetTotal(o){
  return o.total;
}

function mobAddProduct(pid){
  const p=products.find(pr=>pr.id===pid);
  if(!p){toast('Topilmadi','error');return;}
  if(p.stock<=0){toast('Tugagan!','error');playBeep('error');return;}
  const ex=cart.findIndex(i=>i.pid===p.id);
  if(ex>=0)cart[ex].qty++;
  else cart.push({pid:p.id,name:p.name,price:p.price,qty:1});
  playBeep('success');
  renderMobileCashier();
}

function updateBranchSelector(){
  const wrap=document.getElementById('branch-selector-wrap');
  const sel=document.getElementById('branch-selector');
  if(!wrap||!sel)return;

  // Admin uchun filial tanlash ko'rsatiladi (2+ filial bo'lsa)
  if(branches.length>0&&currentUser.role==='admin'){
    wrap.style.display='block';
    const opts=branches.map(b=>`<option value="${b.id}" ${currentBranchId===b.id?'selected':''}>${b.name}</option>`).join('');
    sel.innerHTML=`<option value="" ${!currentBranchId?'selected':''}>Barcha filiallar</option>${opts}`;
  } else if(currentBranchId){
    // Xodim o'z filialiga biriktirilgan — ko'rsatish lekin o'zgartirib bo'lmaydi
    const b=branches.find(x=>x.id===currentBranchId);
    wrap.style.display='block';
    sel.innerHTML=`<option value="${currentBranchId}">${b?b.name:'Filial'}</option>`;
    sel.disabled=true;
  } else {
    wrap.style.display=branches.length>0?'block':'none';
  }
}

function switchBranch(branchId){
  currentBranchId=branchId||null;
  if(currentBranchId){
    localStorage.setItem('pos_branch',currentBranchId);
  } else {
    localStorage.removeItem('pos_branch');
  }
  const b=branches.find(x=>x.id===currentBranchId);
  toast(b?`"${b.name}" filiali tanlandi`:'Barcha filiallar ko\'rsatilmoqda');
  // Joriy sahifani qayta render qilish
  const active=document.querySelector('#sidebar-nav .nav-item.active');
  if(active&&active.dataset.page)goPage(active.dataset.page);
}

// Branch-aware data getters
function getOrders(){
  if(!currentBranchId)return orders;
  return orders.filter(o=>o.branchId===currentBranchId||(!o.branchId&&!currentBranchId));
}
function getProducts(){
  if(!currentBranchId)return products;
  // Mahsulotlar global — filial stock alohida saqlanadi
  return products;
}
function getBranchStock(pid){
  // Filial uchun alohida stock
  if(!currentBranchId)return (products.find(p=>p.id===pid)||{}).stock||0;
  const key='branch_stock_'+currentBranchId+'_'+pid;
  const saved=localStorage.getItem(key);
  if(saved!==null)return parseInt(saved)||0;
  return (products.find(p=>p.id===pid)||{}).stock||0;
}
function getExpenses(){
  if(!currentBranchId)return expenses;
  return expenses.filter(e=>e.branchId===currentBranchId||(!e.branchId&&!currentBranchId));
}
function getSmenas(){
  if(!currentBranchId)return smenas;
  return smenas.filter(s=>s.branchId===currentBranchId||(!s.branchId&&!currentBranchId));
}
function getDebts(){
  if(!currentBranchId)return debts;
  return debts.filter(d=>d.branchId===currentBranchId||(!d.branchId&&!currentBranchId));
}

// Yangi smena ochganda branchId qo'shish
function openNewSmena(){
  const sid='SM-'+Date.now().toString(36).toUpperCase();
  currentSmenaId=sid;
  const smena={id:sid,openTime:new Date().toISOString(),openBy:currentUser.name,closed:false};
  if(currentBranchId)smena.branchId=currentBranchId;
  smenas.push(smena);
  save();
  return sid;
}

// completeSell da branchId qo'shish uchun wrapper
function getBranchMeta(){
  return currentBranchId?{branchId:currentBranchId}:{};
}

// Sovg'a va ommaviy chegirma qoidalarini avtomatik hisoblash
function calcAutoDiscount(){
  if(!cart.length) return {giftItems:[], bulkDisc:0, info:[]};
  const giftItems=[];
  const info=[];

  // 1. Sovg'a qoidalari (X olsang Y bepul)
  const activeGifts=(appSettings.giftRules||[]).filter(r=>r.active);
  activeGifts.forEach(rule=>{
    // Mahsulot belgilangan bo'lsa — faqat o'sha mahsulotga, yo'q bo'lsa barchangga
    const matchItems=rule.productId
      ? cart.filter(i=>i.pid===rule.productId)
      : cart;
    matchItems.forEach(item=>{
      const sets=Math.floor(item.qty/rule.buyQty); // nechta to'plam
      if(sets>0){
        const freeQty=sets*rule.freeQty;
        const freeVal=item.price*freeQty;
        giftItems.push({pid:item.pid,name:item.name,qty:freeQty,price:item.price,freeVal});
        info.push(`${rule.name||rule.buyQty+'+'+rule.freeQty}: ${item.name} × ${freeQty} ta bepul`);
      }
    });
  });

  // 2. Ommaviy chegirmalar (kategoriya bo'yicha)
  let bulkDisc=0;
  const activeBulk=(appSettings.bulkDiscounts||[]).filter(d=>d.active);
  activeBulk.forEach(rule=>{
    const catItems=cart.filter(i=>{
      const p=products.find(x=>x.id===i.pid);
      return p&&p.category===rule.category;
    });
    const totalQty=catItems.reduce((s,i)=>s+i.qty,0);
    if(totalQty>=rule.minQty){
      const catTotal=catItems.reduce((s,i)=>s+i.price*i.qty,0);
      const disc=Math.round(catTotal*(rule.discountPct/100));
      bulkDisc+=disc;
      info.push(`${rule.category} kategoriya: ${rule.discountPct}% chegirma (-${fmt(disc)})`);
    }
  });

  return {giftItems, bulkDisc, info};
}

function renderSummary(){
  const disc=parseInt((document.getElementById('discount-input')||{}).value||0)||0;
  const sub=cart.reduce((s,i)=>s+i.price*i.qty,0);

  // Avtomatik qoidalar
  const auto=calcAutoDiscount();
  const giftVal=auto.giftItems.reduce((s,g)=>s+g.freeVal,0);
  const manualDa=Math.round(sub*(disc/100));
  const totalDa=manualDa+auto.bulkDisc+giftVal;
  const total=Math.max(0,sub-totalDa);

  // Qoidalar info
  const infoHtml=auto.info.length>0?`
    <div style="margin:6px 0;padding:6px 8px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:8px">
      ${auto.info.map(t=>`<div style="font-size:11px;color:#4ade80">✓ ${t}</div>`).join('')}
    </div>`:'';

  return`<div class="summary-row"><span>Jami:</span><span>${fmt(sub)}</span></div>
    ${disc>0?`<div class="summary-row"><span>Chegirma (${disc}%):</span><span style="color:#ef4444">-${fmt(manualDa)}</span></div>`:''}
    ${auto.bulkDisc>0?`<div class="summary-row"><span>Ommaviy chegirma:</span><span style="color:#f59e0b">-${fmt(auto.bulkDisc)}</span></div>`:''}
    ${giftVal>0?`<div class="summary-row"><span>Sovg'a (${auto.giftItems.map(g=>g.qty+'ta').join(', ')}):</span><span style="color:#4ade80">-${fmt(giftVal)}</span></div>`:''}
    ${infoHtml}
    <div class="divider"></div>
    <div class="summary-total"><span>To'lash:</span><span>${fmt(total)}</span></div>`;
}

// ===== QR KAMERA SKANER (mobil/desktop kamera orqali QR o'qish) =====
let _qrStream=null;
let _qrAnimFrame=null;

async function openQrScanner(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    toast('Bu qurilma/brauzer kamerani qo\'llamaydi!','error');
    return;
  }
  openModal('QR kod skanerlash',`
    <div style="position:relative;border-radius:14px;overflow:hidden;background:#000;aspect-ratio:1/1;max-width:360px;margin:0 auto">
      <video id="qr-video" playsinline autoplay muted style="width:100%;height:100%;object-fit:cover"></video>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none">
        <div style="width:70%;height:70%;border:3px solid #6366f1;border-radius:16px;box-shadow:0 0 0 9999px rgba(0,0,0,.35)"></div>
      </div>
      <canvas id="qr-canvas" style="display:none"></canvas>
    </div>
    <div id="qr-status" style="text-align:center;margin-top:14px;font-size:13px;color:#64748b">Kamerani QR kodga qarating...</div>
    <button class="btn btn-ghost btn-md w-full" style="justify-content:center;margin-top:12px" onclick="closeQrScanner()">Yopish</button>
  `,400);
  try{
    _qrStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const video=document.getElementById('qr-video');
    if(!video){stopQrStream();return;}
    video.srcObject=_qrStream;
    await video.play();
    scanQrFrame();
  }catch(e){
    console.error('Camera error:',e);
    const st=document.getElementById('qr-status');
    if(st){st.textContent='Kameraga ruxsat berilmadi yoki kamera topilmadi.';st.style.color='#ef4444';}
  }
}

function scanQrFrame(){
  const video=document.getElementById('qr-video');
  const canvas=document.getElementById('qr-canvas');
  if(!video||!canvas||!_qrStream){return;}
  if(video.readyState===video.HAVE_ENOUGH_DATA){
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    try{
      const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
      if(typeof jsQR==='function'){
        const code=jsQR(imgData.data,imgData.width,imgData.height);
        if(code&&code.data){
          onQrDetected(code.data);
          return;
        }
      }
    }catch(e){}
  }
  _qrAnimFrame=requestAnimationFrame(scanQrFrame);
}

function onQrDetected(text){
  playBeep('success');
  const st=document.getElementById('qr-status');
  if(st){st.textContent='Topildi: '+text;st.style.color='#16a34a';}
  const inp=document.getElementById(isMobile()?'mob-id-input':'id-input');
  if(inp){
    inp.value=text.trim();
  }
  stopQrStream();
  setTimeout(()=>{
    closeModal();
    addToCart();
  },350);
}

function stopQrStream(){
  if(_qrAnimFrame){cancelAnimationFrame(_qrAnimFrame);_qrAnimFrame=null;}
  if(_qrStream){
    _qrStream.getTracks().forEach(t=>t.stop());
    _qrStream=null;
  }
}

function closeQrScanner(){
  stopQrStream();
  closeModal();
}

function addToCart(autoTrigger=false){
  if(autoTrigger && !autoMode) return;
  const inp=document.getElementById(isMobile()?'mob-id-input':'id-input');

  if(!id)return;
  const p=products.find(pr=>pr.id.toLowerCase()===id.toLowerCase());
  if(!p){toast('Mahsulot topilmadi: '+id,'error');playBeep('error');inp.value='';return;}
  if(p.stock<=0){toast('Mahsulot tugagan!','error');playBeep('error');inp.value='';return;}
  const ex=cart.findIndex(i=>i.pid===p.id);
  if(ex>=0)cart[ex].qty++;
  else cart.push({pid:p.id,name:p.name,price:p.price,qty:1});
  inp.value='';
  playBeep('success');
  const ca=document.getElementById('cart-area');
  if(ca)ca.innerHTML=renderCartTable();
  updateSummary();
  if(autoMode)inp.focus();
}

  if(payTypes.find(pt=>pt.id===id)){toast('Bu nom bilan to\'lov turi mavjud!','error');return;}
  payTypes.push({id,name,color});
  save();
  toast('To\'lov turi qo\'shildi!');
  openPayTypesModal();
}

function deletePayType(id){
  if(payTypes.length<=1){toast('Kamida 1 ta to\'lov turi bo\'lishi kerak!','error');return;}
  const inUse=orders.some(o=>o.payType===id);
  if(inUse){toast('Bu to\'lov turi buyurtmalarda ishlatilgan, o\'chirib bo\'lmaydi!','error');return;}
  confirmDialog('Bu to\'lov turini o\'chirishni tasdiqlaysizmi?',()=>{
    payTypes=payTypes.filter(pt=>pt.id!==id);
    save();
    renderPayTypesModal();
  });
  openPayTypesModal();
}

function doSell(){
  if(cart.length===0){toast('Savat bo\'m-bo\'sh!','error');return;}
  const disc=parseInt((document.getElementById('discount-input')||{}).value||0)||0;
  const sub=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const auto=calcAutoDiscount();
  const giftVal=auto.giftItems.reduce((s,g)=>s+g.freeVal,0);
  const manualDa=Math.round(sub*(disc/100));
  const da=manualDa+auto.bulkDisc+giftVal;
  const total=Math.max(0,sub-da);
  if(currentPayType==='aralash'){
    const c=parseFloat((document.getElementById('cash-paid')||{}).value)||0;
    const k=parseFloat((document.getElementById('card-paid')||{}).value)||0;
    if(c+k<total){toast('To\'lov yetarli emas!','error');return;}
  }
  // Hamkor to'lov turi — inline selectdan olish
  if(currentPayType==='hamkor'){
    const pid=((document.getElementById('cashier-partner-select')||{}).value||'');
    if(!pid){toast('Hamkorni tanlang!','error');return;}
    const partner=partners.find(p=>p.id===pid);
    if(!partner){toast('Hamkor topilmadi!','error');return;}
    // Hamkor balansiga yozish
    if(!partner.transactions)partner.transactions=[];
    partner.transactions.push({
      id:genId('TXN'),date:new Date().toISOString(),
      amount:total,type:'debt',
      desc:'Kassa savdo',
      by:currentUser.name,paid:false
    });
    partner.balance=(partner.balance||0)+total;
    partners=partners.map(p=>p.id===pid?partner:p);
    completeSell(total,da,pid,'Hamkor hisobiga');
    return;
  }
  completeSell(total,da,null);
}

function completeSell(total,da,partnerId,partnerNote){
  const oid=genId('PND'); // PND = Pending Delivery
  const newEntry={
    id:oid, date:new Date().toISOString(),
    items:cart.map(i=>({...i})), total, discount:da,
    payType:currentPayType, cashier:currentUser.name,
    returnedItems:[], smenaId:currentSmenaId,
    partnerId:partnerId||null, partnerNote:partnerNote||'',
    branchId:currentBranchId||null,
    status:'pending' // pending = topshirilmagan
  };
  // Faqat ombordan ayiriladi — orders ga EMAS, pendingDelivery ga tushadi
  pendingDelivery.push(newEntry);
  products=products.map(p=>{const ci=cart.find(i=>i.pid===p.id);return ci?{...p,stock:p.stock-ci.qty}:p;});
  // Loyalti karta — chiqim bo'lganda yangilanadi, hozir emas
  // Audit log
  addAudit('Sotuv (kutilmoqda)', `${fmt(total)} — ${cart.length} mahsulot`,'Kassa');
  save();
  const receipt={id:oid,items:cart.map(i=>({...i})),total,discount:da,payType:currentPayType,date:new Date().toISOString(),cashier:currentUser.name,partnerId};
  cart=[];
  toast('Sotuv amalga oshirildi! Mahsulot topshirishga yuborildi.');
  showReceipt(receipt);
  isMobile()?renderMobileCashier():renderCashier();
}

function renderOrders(opts={}){
  if(typeof opts==='string') opts={search:opts};
  const search=opts.search||'';
  const fromDate=opts.fromDate||'';
  const toDate=opts.toDate||'';
  const status=opts.status||'';
  const cassirF=opts.cassirF||'';
  const cashierList=[...new Set(orders.map(o=>o.cashier))];
  // Filial filtri
  let filtered=currentBranchId?[...orders].filter(o=>o.branchId===currentBranchId||(branches.length===0&&!o.branchId)):[...orders];
  filtered=filtered.reverse();
  if(search) filtered=filtered.filter(o=>o.id.includes(search.toUpperCase())||o.cashier.toLowerCase().includes(search.toLowerCase()));
  if(fromDate){const fd=new Date(fromDate);filtered=filtered.filter(o=>new Date(o.date)>=fd);}
  if(toDate){const td=new Date(toDate);td.setHours(23,59,59);filtered=filtered.filter(o=>new Date(o.date)<=td);}
  if(cassirF) filtered=filtered.filter(o=>o.cashier===cassirF);
  if(status==='active') filtered=filtered.filter(o=>!(o.returnedItems||{}).length);
  else if(status==='partial') filtered=filtered.filter(o=>(o.returnedItems||{}).length>0&&!o.items.every(item=>(o.returnedItems||[]).filter(r=>r.pid===item.pid).reduce((s,r)=>s+r.qty,0)>=item.qty));
  else if(status==='returned') filtered=filtered.filter(o=>(o.returnedItems||{}).length>0&&o.items.every(item=>(o.returnedItems||[]).filter(r=>r.pid===item.pid).reduce((s,r)=>s+r.qty,0)>=item.qty));

  const rows=filtered.map(o=>{
    const allRet=(o.returnedItems||{}).length>0&&o.items.every(item=>{
      const rq=(o.returnedItems||[]).filter(r=>r.pid===item.pid).reduce((s,r)=>s+r.qty,0);
      return rq>=item.qty;
    });
    const retAmt=(o.returnedItems||[]).reduce((s,r)=>s+r.price*r.qty,0);
    const netAmt=o.total-retAmt;
    const statusBadge=allRet?badge('Qaytarilgan','red'):((o.returnedItems||{}).length>0?badge('Qisman','yellow'):badge('Faol','green'));
    const retBtn=!allRet&&hasPerm('orders_return')?`<button class="btn btn-outline btn-sm" onclick="openReturnModal('${o.id}')">${svgIcon('ret',14)} Qaytarish</button>`:'';
    const itemCount=o.items.length;

    // Har bir mahsulot uchun alohida qator
    return o.items.map((item,idx)=>{
      const itemRetEntries=(o.returnedItems||[]).filter(r=>r.pid===item.pid);
      const itemRet=itemRetEntries.reduce((s,r)=>s+r.qty,0);
      const hasUnexpensed=itemRetEntries.some(r=>!r.expensed);
      const hasExpensed=itemRetEntries.some(r=>r.expensed);
      const itemTotal=item.price*item.qty;
      const isFirst=idx===0;
      let retLabel='';
      if(itemRet>0){
        if(hasUnexpensed) retLabel=` · <span style="color:#ef4444">${itemRet} ta qaytarilgan (kassadan ayrilmagan)</span>`;
        else if(hasExpensed) retLabel=` · <span style="color:#16a34a">${itemRet} ta qaytarilgan (kassadan ayrilgan)</span>`;
      }
      return`<tr style="${idx>0?'border-top:1px dashed #f1f5f9':''}">
        ${isFirst?`<td rowspan="${itemCount}" style="color:#6366f1;font-weight:700;vertical-align:top">${o.id}</td>`:''}
        ${isFirst?`<td rowspan="${itemCount}" style="color:#64748b;vertical-align:top">${fmtDate(o.date)}</td>`:''}
        ${isFirst?`<td rowspan="${itemCount}" style="vertical-align:top">${o.cashier}</td>`:''}
        <td>
          <div style="font-weight:600;font-size:13px">${item.name}</div>
          <div style="font-size:11px;color:#94a3b8">${item.pid} · ${item.qty} ta × ${fmt(item.price)}${retLabel}</div>

function openReturnModal(oid){
  const order=orders.find(o=>o.id===oid);
  if(!order)return;
  returnOrderId=oid;
  const rows=order.items.map(item=>{
    const alrRet=(order.returnedItems||[]).filter(r=>r.pid===item.pid).reduce((s,r)=>s+r.qty,0);
    const maxRet=item.qty-alrRet;
    return`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)">
      <input type="checkbox" id="ret-chk-${item.pid}" ${maxRet<=0?'disabled':''} onchange="toggleRetQty('${item.pid}')" style="width:18px;height:18px;cursor:pointer" />
      <div style="flex:1"><div style="font-size:14px;font-weight:600">${item.name}</div><div style="font-size:12px;color:#94a3b8">Sotilgan: ${item.qty} | Qaytarish mumkin: ${maxRet}</div></div>
      <input type="number" id="ret-qty-${item.pid}" min="1" max="${maxRet}" value="1" style="width:60px;padding:6px 8px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;display:none" />
    </div>`;
  }).join('');
  openModal('Mahsulot qaytarish',`
    <p style="margin:0 0 16px;color:#64748b;font-size:14px">Chek: <b>${order.id}</b></p>
    ${rows}
    <div class="flex gap-10" style="margin-top:20px">
      <button class="btn btn-warning btn-md" onclick="doReturn()">${svgIcon('ret',16)} Qaytarish</button>
      <button class="btn btn-ghost btn-md" onclick="closeModal()">Bekor qilish</button>
    </div>`);
}

function toggleRetQty(pid){
  const chk=document.getElementById('ret-chk-'+pid);
  const qty=document.getElementById('ret-qty-'+pid);
  if(qty)qty.style.display=chk.checked?'block':'none';
}

function doReturn(){
  const order=orders.find(o=>o.id===returnOrderId);
  if(!order)return;
  const toReturn=order.items.filter(item=>{
    const chk=document.getElementById('ret-chk-'+item.pid);
    return chk&&chk.checked&&!chk.disabled;
  }).map(item=>{
    const qEl=document.getElementById('ret-qty-'+item.pid);
    const alrRet=(order.returnedItems||[]).filter(r=>r.pid===item.pid).reduce((s,r)=>s+r.qty,0);
    const maxRet=item.qty-alrRet;
    const qty=Math.min(maxRet,Math.max(1,parseInt((qEl||{}).value||1)));
    return{retId:genId('RET'),pid:item.pid,name:item.name,qty,price:item.price,expensed:false};
  });
  if(toReturn.length===0){toast('Qaytarish uchun mahsulot tanlang!','error');return;}
  const retAmt=toReturn.reduce((s,i)=>s+i.price*i.qty,0);
  // Faqat stock qaytariladi, kassadan summa ayirilmaydi
  // Kassadan ayirish uchun Harajat > "Qaytarish" kategoriyasidan amalga oshiriladi
  orders=orders.map(o=>o.id===returnOrderId?{...o,returnedItems:[...(o.returnedItems||[]),...toReturn]}:o);
  products=products.map(p=>{const ri=toReturn.find(r=>r.pid===p.id);return ri?{...p,stock:p.stock+ri.qty}:p;});
  save();
  toast(`Mahsulot qaytarildi (${fmt(retAmt)}). Kassadan ayirish uchun "Harajat > Qaytarish" dan foydalaning.`,'info');
  closeModal();
  renderOrders();
}

function exportSmenaExcel(){
  const closedSmenas=[...smenas].filter(s=>s.closed).reverse();
  if(closedSmenas.length===0){toast('Smena tarixi bo\'m-bo\'sh!','error');return;}
  const headers=['Smena ID','Ochildi','Yopildi','Kim yopdi','Tushum','Harajat','Foyda','Sotuvlar soni','Izoh'];
  const rows=closedSmenas.map(s=>{
    const smenaOrders=orders.filter(o=>o.smenaId===s.id);
    const smenaRev=calcRealRevenue(smenaOrders);
    const smenaExp=expenses.filter(e=>e.smenaId===s.id&&e.type!=='smena_profit'&&e.type!=='damage'&&e.type!=='partner_income').reduce((sum,e)=>sum+e.amount,0);
    const profit=s.factualProfit||smenaRev-smenaExp;
    return[
      s.id,
      s.openedAt?new Date(s.openedAt).toLocaleString('uz-UZ'):'—',
      s.closedAt?new Date(s.closedAt).toLocaleString('uz-UZ'):'—',
      s.closedBy||s.by||'—',
      smenaRev,smenaExp,profit,
      smenaOrders.length,
      s.note||''
    ];
  });
  const totalRev=rows.reduce((s,r)=>s+r[4],0);
  const totalExp=rows.reduce((s,r)=>s+r[5],0);
  const totalProfit=rows.reduce((s,r)=>s+r[6],0);
  rows.push(['','','','JAMI:',totalRev,totalExp,totalProfit,'','']);
  downloadXlsx('smena_tarixi_'+new Date().toISOString().slice(0,10)+'.xlsx', headers, rows);
  toast('Smena tarixi Excel yuklab olindi!');
}

function exportWarehouseExcel(){
  const search=(document.getElementById('wh-search')||{}).value||'';
  let data=products;
  if(search) data=data.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())||p.id.toLowerCase().includes(search.toLowerCase()));
  if(data.length===0){toast('Mahsulotlar yo\'q!','error');return;}
  const headers=['ID','Nomi','Kategoriya','Sotish narxi','Kirim narxi','Qoldiq','Jami narxi (sotish)','Jami narxi (kirim)','Holat'];
  const rows=data.map(p=>[
    p.id, p.name, p.category, p.price, p.cost||0, p.stock,
    p.price*p.stock, (p.cost||0)*p.stock,
    p.stock>10?'Yetarli':p.stock>0?'Kam':'Tugagan'
  ]);
  // Summary
  const totSell=data.reduce((s,p)=>s+p.price*p.stock,0);
  const totCost=data.reduce((s,p)=>s+(p.cost||0)*p.stock,0);
  const totStock=data.reduce((s,p)=>s+p.stock,0);
  rows.push(['','','','','','','','','']);
  rows.push(['JAMI:','',`${data.length} tur`,'','',totStock,totSell,totCost,'']);
  const fname='ombor_qoldiq_'+new Date().toISOString().slice(0,10)+(search?'_'+search:'')+'.xlsx';
  downloadXlsx(fname, headers, rows);
  toast('Ombor qoldiq Excel yuklab olindi!');
}

function renderPurchaseOrdersHtml(){
  const isSupplier=currentUser.role==='supplier';
  // Yetkazuvchi faqat o'ziga berilgan zakazlarni ko'radi
  let myOrders=isSupplier
    ?purchaseOrders.filter(o=>String(o.assignedTo)===String(currentUser.id))
    :purchaseOrders;

  const pending=myOrders.filter(o=>o.status==='pending');
  const picking=myOrders.filter(o=>o.status==='picking');
  const shipped=myOrders.filter(o=>o.status==='shipped');
  const received=myOrders.filter(o=>o.status==='received');
  const partial=myOrders.filter(o=>o.status==='partial');

  const statusInfo={
    pending:{label:'Kutilmoqda',color:'#a78bfa',bg:'rgba(167,139,250,.12)'},
    picking:{label:'Terib olinmoqda',color:'#fbbf24',bg:'rgba(251,191,36,.12)'},
    shipped:{label:'Yo\'lda',color:'#38bdf8',bg:'rgba(56,189,248,.12)'},
    received:{label:'Qabul qilindi',color:'#4ade80',bg:'rgba(74,222,128,.12)'},
    partial:{label:'Qisman qabul',color:'#fb923c',bg:'rgba(251,146,60,.12)'},
  };

  const rows=[...myOrders].reverse().map(po=>{
    const si=statusInfo[po.status]||statusInfo.pending;
    const totalQty=po.items.reduce((s,i)=>s+i.qty,0);
    const totalCost=po.items.reduce((s,i)=>s+(i.cost||0)*i.qty,0);
    const assignedU=po.assignedTo?users.find(u=>u.id===po.assignedTo):null;

    // Statusga qarab tugmalar
    let actionBtns='';
    if(isSupplier){
      // Yetkazuvchi uchun o'z amallar
      if(po.status==='pending'){
        actionBtns=`<button class="btn btn-warning btn-sm" onclick="updatePoStatus('${po.id}','picking','Terib olinmoqda')" style="white-space:nowrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><circle cx="12" cy="12" r="2"/></svg>
          Terib boshlash
        </button>`;
      } else if(po.status==='picking'){
        actionBtns=`<button class="btn btn-primary btn-sm" onclick="updatePoStatus('${po.id}','shipped','Yo\'lga solindi')" style="white-space:nowrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16,8 20,8 23,11 23,16 16,16 16,8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
          Yo'lga solish
        </button>`;
      }
    } else {
      // Admin/omborchi uchun
      if(po.status==='shipped'||po.status==='picking'||po.status==='partial'){
        actionBtns=`<button class="btn btn-success btn-sm" onclick="openReceiveModal('${po.id}')" style="white-space:nowrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20,6 9,17 4,12"/></svg>
          Qabul qilish
        </button>`;
      } else if(po.status==='pending'){
        actionBtns=`<button class="btn btn-success btn-sm" onclick="openReceiveModal('${po.id}')" style="white-space:nowrap">
          Qabul qilish
        </button>`;
      }
      if(po.status==='pending'){
        actionBtns+=`<button class="btn btn-danger btn-sm" onclick="deletePurchaseOrder('${po.id}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14H6L5 6"/></svg>
        </button>`;
      }
    }

    const itemRows=po.items.map(i=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px">
        <span><b style="color:var(--accent2)">${i.pid}</b> ${i.name} ${i.isNew?badge('Yangi','green'):''}</span>
        <span style="color:var(--text2)">${i.qty} dona${i.receivedQty>0?` <span style="color:#4ade80">(${i.receivedQty} qabul qilindi)</span>`:''}</span>
      </div>`).join('');

    const timelineHtml=(po.timeline||[]).map(t=>`
      <div style="display:flex;gap:8px;align-items:flex-start;font-size:11px">
        <div style="width:6px;height:6px;border-radius:50%;background:${( statusInfo[t.status]||{} ).color||'var(--text3)'};margin-top:4px;flex-shrink:0"></div>
        <div><b style="color:${( statusInfo[t.status]||{} ).color||'var(--text2)'}">${( statusInfo[t.status]||{} ).label||t.status}</b> — ${t.by} · ${fmtDate(t.date)}${t.note?` <span style="color:var(--text3)">(${t.note})</span>`:''}</div>
      </div>`).join('');

    return`<tr>
      <td style="color:var(--accent2);font-weight:700;font-size:12px">${po.id}</td>
      <td style="color:var(--text2);font-size:12px">${fmtDate(po.date)}</td>
      <td style="font-weight:600">${po.supplier||'—'}</td>
      <td>
        ${assignedU?`<div style="display:flex;align-items:center;gap:6px">
          <div style="width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700">${assignedU.avatar}</div>
          <span style="font-size:12px;font-weight:600">${assignedU.name}</span>
        </div>`:'<span style="color:var(--text3);font-size:12px">Belgilanmagan</span>'}
      </td>
      <td style="text-align:center;font-weight:700">${totalQty} dona</td>
      <td style="font-weight:700;color:var(--accent2)">${fmt(totalCost)}</td>
      <td>
        <span style="background:${si.bg};color:${si.color};border:1px solid ${si.color}30;border-radius:8px;padding:3px 10px;font-size:11px;font-weight:700">
          ${si.label}
        </span>
      </td>
      <td><div style="display:flex;gap:5px;flex-wrap:wrap">${actionBtns}</div></td>
      <td>
        <button class="btn btn-ghost btn-sm" onclick="togglePoDetail('${po.id}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,9 12,15 18,9"/></svg>
        </button>
      </td>
    </tr>
    <tr id="po-detail-${po.id}" style="display:none">
      <td colspan="9" style="padding:12px 16px;background:rgba(99,102,241,.04);border-radius:10px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div>
            <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase">Mahsulotlar</div>
            ${itemRows}
          </div>
          <div>
            <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase">Holat tarixi</div>
            <div style="display:flex;flex-direction:column;gap:6px">${timelineHtml||'<span style="color:var(--text3);font-size:11px">Tarix yo\'q</span>'}</div>
            ${po.note?`<div style="margin-top:8px;font-size:12px;color:var(--text3)">${po.note}</div>`:''}
          </div>
        </div>
      </td>
    </tr>`;
  }).join('');

  // Supplier uchun maxsus sarlavha
  const title=isSupplier?`Mening zakazlarim (${myOrders.length} ta)`:'Barcha zakazlar';
  const newBtn=!isSupplier?`<button class="btn btn-primary btn-sm" onclick="openNewPurchaseOrderModal()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Yangi zakaz
  </button>`:'';

  return`<div class="card" style="margin-bottom:0">
    <div class="card-header">
      <span class="card-title" style="display:flex;align-items:center;gap:8px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent2)" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        ${title}
      </span>
      <div style="display:flex;gap:8px;align-items:center">
        ${isSupplier?'':pending.length>0?`<span style="font-size:12px;color:var(--accent2);font-weight:600">${pending.length} ta yangi</span>`:''}
        ${newBtn}
      </div>
    </div>

    <!-- Status kartalari -->
    <div style="display:flex;gap:10px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px">
      ${Object.entries(statusInfo).map(([s,si])=>{
        const cnt=myOrders.filter(o=>o.status===s).length;
        return`<div style="flex-shrink:0;background:${si.bg};border:1px solid ${si.color}30;border-radius:10px;padding:10px 14px;text-align:center;min-width:110px">
          <div style="font-size:18px;font-weight:800;color:${si.color}">${cnt}</div>
          <div style="font-size:11px;color:${si.color};font-weight:600;margin-top:2px">${si.label}</div>
        </div>`;
      }).join('')}
    </div>

    <div style="overflow:auto">
    <table><thead><tr>
      <th>ID</th><th>Sana</th><th>Yetkazuvchi</th><th>Terib beruvchi</th>
      <th>Miqdor</th><th>Summa</th><th>Holat</th><th>Amal</th><th></th>
    </tr></thead>
    <tbody>${rows||`<tr><td colspan="9" style="text-align:center;padding:30px;color:var(--text3)">${isSupplier?'Sizga zakaz belgilanmagan':'Zakazlar yo\'q'}</td></tr>`}</tbody></table>
    </div>
  </div>`;
}

function updatePoStatus(poId, newStatus, note){
  const po=purchaseOrders.find(o=>o.id===poId);
  if(!po)return;
  po.status=newStatus;
  if(!po.timeline)po.timeline=[];
  po.timeline.push({status:newStatus,date:new Date().toISOString(),by:currentUser.name,note});
  purchaseOrders=purchaseOrders.map(o=>o.id===poId?po:o);
  save();
  const statusLabels={picking:'Terib boshlandi!',shipped:'Yo\'lga solindi!'};
  toast(statusLabels[newStatus]||'Status yangilandi!');
  renderWarehouse('orders');
}

function togglePoDetail(id){
  const el=document.getElementById('po-detail-'+id);
  if(el)el.style.display=el.style.display==='none'?'table-row':'none';
}

// Yangi mahsulot uchun avtomatik ID generatsiya
function genAutoPoId(){
  // Mavjud product ID lardan eng katta raqamni topib +1 qilamiz
  const existing=[...products,...(window._poNewItems||[])].map(p=>{
    const m=p.id.match(/(\d+)$/);
    return m?parseInt(m[1]):0;
  });
  const maxNum=existing.length>0?Math.max(...existing):0;
  const prefix=products.length>0?(products[0].id.match(/^([A-Z]+)/)||['P'])[0]:'P';
  let newNum=maxNum+1;
  let newId=prefix+String(newNum).padStart(3,'0');
  // Agar mavjud bo'lsa, keyingisini olish
  while(products.find(p=>p.id===newId)||(window._poNewItems||[]).find(p=>p.pid===newId)){
    newNum++;
    newId=prefix+String(newNum).padStart(3,'0');
  }
  return newId;
}
function autoFillPoId(){
  const inp=document.getElementById('po-new-id');
  if(inp&&!inp.value)inp.value=genAutoPoId();
}

function togglePoQty(pid){
  const chk=document.getElementById('pchk-'+pid);
  const qtyEl=document.getElementById('pqty-'+pid);
  const costEl=document.getElementById('pcost-'+pid);
  if(qtyEl)qtyEl.style.display=chk.checked?'block':'none';
  if(costEl)costEl.style.display=chk.checked?'block':'none';
}

function addNewProductToPo(){
  const id=((document.getElementById('po-new-id')||{}).value||'').trim().toUpperCase();
  const name=((document.getElementById('po-new-name')||{}).value||'').trim();
  const cost=parseFloat((document.getElementById('po-new-cost')||{}).value||0)||0;
  const price=parseFloat((document.getElementById('po-new-price')||{}).value||0)||0;
  const qty=parseInt((document.getElementById('po-new-qty')||{}).value||1)||1;
  const cat=((document.getElementById('po-new-cat')||{}).value||'').trim();
  if(!id||!name){toast('ID va nom majburiy!','error');return;}
  if(products.find(p=>p.id===id)){toast(`"${id}" ID allaqachon mavjud!`,'error');return;}
  if(!window._poNewItems)window._poNewItems=[];
  if(window._poNewItems.find(i=>i.pid===id)){toast('Bu mahsulot allaqachon qo\'shilgan!','error');return;}
  window._poNewItems.push({pid:id,name,cost,price,qty,cat,isNew:true});
  const box=document.getElementById('po-new-items');
  if(box){
    box.innerHTML=`<div style="background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:10px;padding:10px 12px;margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:#4ade80;margin-bottom:6px">Yangi mahsulotlar (zakaz bilan kirim bo'ladi):</div>
      ${window._poNewItems.map((it,i)=>`
        <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:4px 0">
          <span>${badge(it.pid,'green')} ${it.name} × ${it.qty} dona</span>
          <button onclick="window._poNewItems.splice(${i},1);addNewProductToPo.caller" style="background:none;border:none;cursor:pointer;color:#f87171;font-size:11px" onclick="window._poNewItems.splice(${i},1)">✕</button>
        </div>`).join('')}
    </div>`;
  }
  // Clear fields
  ['po-new-id','po-new-name','po-new-cost','po-new-price'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  toast(`"${name}" yangi mahsulot sifatida qo'shildi`);
}

function savePurchaseOrder(){
  const supplier=((document.getElementById('po-supplier')||{}).value||'').trim();
  const expectedDate=(document.getElementById('po-date')||{}).value||'';
  const note=((document.getElementById('po-note')||{}).value||'').trim();
  const items=[];

  // Mavjud mahsulotlardan tanlangan
  products.forEach(p=>{
    const chk=document.getElementById('pchk-'+p.id);
    if(chk&&chk.checked){
      const qty=parseInt((document.getElementById('pqty-'+p.id)||{}).value||1)||1;
      const cost=parseFloat((document.getElementById('pcost-'+p.id)||{}).value||p.cost||p.price)||0;
      items.push({pid:p.id,name:p.name,qty,cost,receivedQty:0});

  });

    window._poNewItems.forEach(it=>{
      items.push({pid:it.pid,name:it.name,qty:it.qty,cost:it.cost,receivedQty:0,isNew:true,newPrice:it.price,newCat:it.cat});
    });
  }

  if(items.length===0){toast('Kamida 1 ta mahsulot tanlang!','error');return;}
  const assignedTo=parseInt((document.getElementById('po-assigned')||{}).value||0)||null;
  const assignedUser=assignedTo?users.find(u=>u.id===assignedTo):null;
  const po={
    id:genId('PO'),
    date:new Date().toISOString(),
    by:currentUser.name,
    supplier,expectedDate,note,items,
    status:'pending',
    assignedTo:assignedTo||null,
    assignedName:assignedUser?assignedUser.name:null,
    timeline:[{status:'pending',date:new Date().toISOString(),by:currentUser.name,note:'Zakaz yaratildi'}]
  };
  purchaseOrders.push(po);
  window._poNewItems=[];
  save();
  toast(`Zakaz yaratildi: ${po.id}${assignedUser?' → '+assignedUser.name+' ga yuborildi':''}`);
  closeModal();
  renderWarehouse('orders');
}

function confirmReceive(poId){
  const po=purchaseOrders.find(o=>o.id===poId);
  if(!po)return;
  const impItems=[];
  let anyReceived=false;
  po.items.forEach(item=>{
    const remaining=item.qty-(item.receivedQty||0);
    if(remaining<=0)return;
    const inp=document.getElementById('recv-'+item.pid);
    const qty=Math.min(remaining,Math.max(0,parseInt((inp||{}).value||0)||0));
    if(qty>0){
      item.receivedQty=(item.receivedQty||0)+qty;
      // Agar yangi mahsulot bo'lsa — omborga yangi sifatida qo'shamiz
      if(item.isNew&&!products.find(p=>p.id===item.pid)){
        products.push({
          id:item.pid,name:item.name,
          price:item.newPrice||item.cost||0,
          cost:item.cost||0,
          category:item.newCat||'Boshqa',
          stock:qty
        });
      } else {
        products=products.map(p=>p.id===item.pid?{...p,stock:p.stock+qty}:p);
      }
      impItems.push({pid:item.pid,name:item.name,qty,cost:item.cost||0,price:(products.find(p=>p.id===item.pid)||{}).price||0});
      anyReceived=true;
    }
  });
  if(!anyReceived){toast('Qabul miqdorini kiriting!','error');return;}
  const allReceived=po.items.every(i=>i.qty<=(i.receivedQty||0));
  po.status=allReceived?'received':'partial';
  po.receivedDate=new Date().toISOString();
  importHistory.push({id:genId('IMP'),date:new Date().toISOString(),by:currentUser.name,items:impItems,source:'zakaz',poId:po.id,supplier:po.supplier||''});
  purchaseOrders=purchaseOrders.map(o=>o.id===poId?po:o);
  save();
  toast(allReceived?'Zakaz to\'liq qabul qilindi! Ombor yangilandi.':'Qisman qabul qilindi. Ombor yangilandi.');
  closeModal();
  renderWarehouse('orders');
}

function generateAutoId(){
  // Find max numeric part from existing IDs
  let maxNum=0;
  products.forEach(p=>{
    const m=p.id.match(/(\d+)$/);
    if(m)maxNum=Math.max(maxNum,parseInt(m[1]));
  });
  const next=maxNum+1;
  return 'P'+String(next).padStart(3,'0');
}

  const container=canvas.parentElement;
  if(!container)return;
  // QRCode.js div ichiga chiqaradi, canvas o'rniga div ishlatamiz
  const qrDiv=document.createElement('div');
  qrDiv.id=canvasId+'-qr';
  qrDiv.style.display='inline-block';
  canvas.style.display='none';
  canvas.insertAdjacentElement('afterend', qrDiv);
  try{
    new QRCode(qrDiv, {
      text: text,
      width: 128,
      height: 128,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  }catch(e){
    qrDiv.innerHTML='<div style="font-size:11px;color:#ef4444">QR xato</div>';
  }
}
